<html>
<head>
<title>New Avatar</title>
<link rel=stylesheet href=global.css>
<script language=vbs src=scripts/NoSelection.vbs></script>
<script language=vbs src=scripts/NewAvatar.vbs></script>
</head>
<body scroll=no style="margin:7px 18px;">
	<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
		<tr>
			<td colspan=2 class=vwHead1>
				Enter a name for your new avatar.
			</td>
		</tr>
		<tr>
			<td colspan=2 class=vwSubHead1 valign=top>
				(Must be 3 to 12 characters.)
			</td>
		</tr>
		<tr style=padding-top:2px;>
			<td class=vwText width=10px>
				Avatar&nbsp;name:
			</td>
			<td style=padding-left:3px;padding-bottom:2px;>
				<input id=txtName class=vwInput width=100% maxlength=12>
			</td>
		</tr>
		<tr>
			<td colspan=2 align=right valign=bottom style="border-top:1 solid gray;padding-top:2px;">
				<button id=btnOK class=vwButton>OK</button>&nbsp;&nbsp;
				<button id=btnCancel onclick=window.close class=vwButton>Cancel</button>
			</td>
		</tr>
	</table>
	<div style=color:gray;position:absolute;left:18;top:25;>
	</div>
</body>
</html>
