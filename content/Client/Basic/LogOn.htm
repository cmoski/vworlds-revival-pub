<html>
<head>
<title>Microsoft Virtual Worlds Log On</title>
<link rel=stylesheet href=global.css>
<script language=vbs src=scripts/NoSelection.vbs></script>
<script language=vbs src=scripts/Sorting.vbs></script>
<script language=vbs src=scripts/LogOn.vbs></script>
</head>
<body scroll=no style="margin:7px 18px;">
	<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
		<tr style=padding-bottom:2px;>
			<td class=vwText style=width:10px;padding-top:2px;>
				Avatar&nbsp;name:
			</td>
			<td style=padding-left:3px;padding-top:2px;>
				<select id=lstAvatars class=vwInput style=width:100%;></select>
			</td>
			<td style=padding-left:3px;width:10px;>
				<button id=btnDelete class=vwButton style=width:70px;>Delete...</button>
			</td>
		</tr>
		<tr>
			<td class=vwText>
				Previous world:
			</td>
			<td style=padding-left:3px;>
				<select id=lstPreviousWorlds class=vwInput style=width:100%><option>&nbsp;</option></select>
			</td>
				<td style=padding-left:3px;width:10px;>
				<button id=btnLogon class=vwButton style=width:70px;>Go</button>
			</td>
		</tr>
		<tr>
			<td class=vwText>
				New world:
			</td>
			<td style=padding-left:3px;>
				<input id=txtNewWorld class=vwInput style=width:100%;font-family:arial;font-size:8pt;font-weight:normal; type=text value="(Enter servername/worldname here)"></input>
			</td>
				<td style=padding-left:3px;width:10px;>
				<button id=btnLogonNew class=vwButton style=width:70px;>Go</button>
			</td>
		
		</tr>

		<tr>
			<td>
			</td>
			<td colspan=2>
				<table cellpadding=3 cellspacing=0 height=100% width=100%>
					<tr valign=top>
						<td style=padding-right:0px;>
							<button id=btnDirectory class=vwButton style=width:100%;>Worlds...</button>
						</td>
						<td style=padding-right:0px;>
							<button id=btnOptions class=vwButton style=width:100%;>Options...</button>
						</td>  
					</tr>
				</table
			</td>
		</tr>
		<tr>
			<td colspan=3 align=right valign=bottom style="border-top:1 solid gray;padding-top:4px;">
				<button id=btnCancel onclick=window.close class=vwButton>Cancel</button>
			</td>
		</tr>
	</table>
</body>
</html>
