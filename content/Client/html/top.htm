<HTML>
<HEAD>
<META NAME="GENERATOR" Content="Microsoft Developer Studio">
<META HTTP-EQUIV="Content-Type" content="text/html; charset=iso-8859-1">
<TITLE>Split Top View</TITLE>
</HEAD>

<SCRIPT LANGUAGE="VBScript">

sub Initialize()
	BtnBarFrame.Initialize()
	WorldViewFrame.Initialize()
	DoPosition
end sub

dim iReadyCount
iReadyCount = 0

sub ChildReady(theWin)
	iReadyCount = iReadyCount + 1
	if iReadyCount >= 3 then
		iReadyCount = 3
		parent.ChildReady(window)
	end if
end sub

sub window_onload
	DoPosition
	ChildReady(window)
end sub

sub window_onresize
	DoPosition
end sub

sub DoPosition
	dim viewElement
	viewHeight = document.body.offsetHeight - 23
	set viewElement = document.all("WorldViewFrame")
	if viewHeight < 10 then
		viewHeight = 10
	end if
	viewElement.style.height=viewHeight
end sub

</SCRIPT>

<BODY LEFTMARGIN=0 TOPMARGIN=0  RIGHTMARGIN=0  BOTTOMMARGIN=0 SCROLL=NO>
<IFRAME ID="BtnBarFrame" SRC="btnbar.htm" HSPACE=0 BORDER=0 FRAMESPACING=0 VSPACE=0 MARGINHEIGHT=0 MARGINWIDTH=0 scrolling="no" noresize  height=23 width=100% frameborder="no">
</IFRAME>
<IFRAME NAME="WorldViewFrame" ID="WorldViewFrame" SRC="3dview.htm" HSPACE=0 BORDER=0 FRAMESPACING=0 VSPACE=0 MARGINHEIGHT=0 MARGINWIDTH=0 scrolling="no" noresize width=100% frameborder="no">
</IFRAME>
</BODY>


</HTML>
