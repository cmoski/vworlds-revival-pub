<html>
<head>
<title>Virtual Worlds-Change Password</title>
<link rel=stylesheet href=../shared/global.css>
<object id=Helper classid="clsid:7E3832CF-4F4E-11D0-89AB-00A0C9054129"></object>
<script language=vbs>

'Initialize textbox to last name a user entered in case of invalid name

sub window_onload
	oldpass.focus
end sub

sub document_OnMouseOver
	if window.event.srcElement.className = "bEnabled" then
		window.event.srcElement.className = "bHighlight"
	end if
end sub

sub document_OnMouseOut
	if window.event.srcElement.className = "bHighlight" then
		window.event.srcElement.className = "bEnabled"
	end if
end sub

sub OnCancel
	Helper.closeWindow
end sub

sub document_onkeypress
	select case window.event.keycode
	case 27
		OnCancel
	case 13
		if window.event.srcElement.tagname <> "BUTTON" then
			if not finish.disabled then OnFinish
		end if
	case 9
		select case window.event.srcElement.id
		case "oldpass"
			window.event.returnValue = false
			if window.event.shiftkey then
				cancelbtn.focus
			else
				newpass.focus
				newpass.select
			end if
		case "newpass"
			window.event.returnValue = false
			if window.event.shiftkey then
				oldpass.focus
				oldpass.select
			else
				confirmpass.focus
				confirmpass.select
			end if
		case "confirmpass"
			window.event.returnValue = false
			if window.event.shiftkey then
				newpass.focus
				newpass.select
			else
				if not finish.disabled then
					finish.focus
				else
					cancelbtn.focus
				end if
			end if
		case "finish"
			if window.event.shiftkey then
				confirmpass.focus
				confirmpass.select
			else
				cancelbtn.focus
			end if
		case "cancelbtn"
			if window.event.shiftkey then
				if not finish.disabled then
					finish.focus
				else
					confirmpass.focus
					confirmpass.select
				end if
			else
				oldpass.focus
				oldpass.select
			end if
		case else
				oldpass.focus
				oldpass.select
		end select
	case else
	end select
end sub

sub OnFinish
	set profile = helper.arg.profile
	bHasPassword = profile.isvalid("Password")
	if bHasPassword = true then
		oldpasstext = profile.keyvalue("Password")
	else
		oldpasstext = ""
	end if
	if oldpasstext = oldpass.value then
		if newpass.value = confirmpass.value then
			if bHasPassword = true then
				profile.keyvalue("Password") = newpass.value
			else
				profile.addkey "Password", newpass.value, "", 2, helper.arg
			end if
			Helper.CloseWindow
		else
			msgbox "New password was not confirmed." & vbcrlf & vbcrlf & "Re-enter the new password.", vbExclamation, "Microsoft Virtual Worlds"
			newpass.value = ""
			confirmpass.value = ""
			newpass.focus
		end if
	else
		msgbox "Old password is invalid." & vbcrlf & vbcrlf & "Re-enter the old password.", vbExclamation, "Microsoft Virtual Worlds"
		oldpass.value = ""
		newpass.value = ""
		confirmpass.value = ""
		oldpass.focus
	end if
end sub

</script>
</head>
<BODY class=vBody>
	<div class=vLabel style=left:18;top:10;>
		Old Password:
	</div>
	<input class=vInput type=password id=oldpass maxlength=12 style=left:160;top:7;width:100;>
	<div class=vLabel style=left:18;top:30;>
		New Password:
	</div>
	<input class=vInput type=password id=newpass maxlength=12 style=left:160;top:27;width:100;>
	<div class=vLabel style=left:18;top:50;>
		Confirm New Password:
	</div>
	<input class=vInput type=password id=confirmpass maxlength=12 style=left:160;top:47;width:100;>
	<button class=bEnabled id=finish onclick=OnFinish style=left:270;top:7;>
		<span style=position:relative;top:-1;>OK</span>
	</button>
	<button class=bEnabled id=cancelbtn onclick=OnCancel style=left:270;top:33;>
		<span style=position:relative;top:-1;>Cancel</span>
	</button>
</BODY>
</HTML>
