<html>
<head>
<title>Whisper</title>
<link rel=stylesheet href=..\shared\global.css>
<script language=vbs src=NoSelection.vbs></script>
<script language=vbs src=Sorting.vbs></script>
<script language=vbs src=Whisper.vbs></script>
</head>
<body scroll=no style="margin:7px 18px;">
	<table cellpadding=0 cellspacing=0 height=100% width=100%>
		<tr height=10px>
			<td class=vwText>
				Avatars:
			</td>
			<td>
			</td>
			<td class=vwText>
				Whisper to:
			</td>
		</tr>
		<tr height=10px>
			<td width=10px>
				<select id=lstNames size=6 class=vwInput style=width:105px; multiple disabled onchange=UpdateButtons></select>
			</td>
			<td align=center>
				<button class=bDisabled id=btnAdd onclick=DoAdd style=position:static;width:80px;margin-bottom:5; disabled>
					<span style=position:relative;top:-2;left:3;>Add<font face=Webdings style=position:relative;top:-1;>4</font></span>
				</button><br>
				<button class=bDisabled id=btnRemove onclick=DoRemove style=position:static;width:80px; disabled>
					<span style=position:relative;top:-2;left:0;><font face=Webdings style=position:relative;top:-1;>3</font>Remove</span>
				</button>
				<hr size=1px width=81px>
				<button class=bDisabled id=btnRefresh onclick=DoRefresh style=position:static;width:80px; disabled>Refresh</button>
			</td>
			<td width=10px>
				<select id=lstTargets size=6 class=vwInput style=width:105px; multiple disabled onchange=UpdateButtons></select>
			</td>
		</tr>
		<tr height=10px>
			<td colspan=3>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td width=5px>
							<input type=checkbox id=chkShow onClick=DoShow disabled>
						</td>
						<td>
							<label class=vwText for=chkShow>
								Show avatars in all rooms in this world
							</label>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td colspan=3>
				<iframe src=WhispHist.htm id=fraWhispHist style=width:100%;height:100%;></iframe>
			</td>
		</tr>
		<tr height=10px>
			<td colspan=3 style=padding-bottom:2px;>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td>
							<input class=vwInput id=txtWhisper maxlength=200 style=width:100%; disabled>
						</td>
						<td width=10px>
							<img alt=Whisper
									 id=btnWhisper
									 src=say.gif
									 class=vwChatButton
									 mOver=sayo.gif
									 mOut=say.gif
									 enabled=false
									 align=middle>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr height=10px>
			<td colspan=3 align=center valign=bottom style="border-top:1 solid gray;padding-top:4px;">
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td align=left>
							<a id=lnkHelp onclick=OnHelp href="">
								<img src=../shared/help.gif id=imgHelp class=vwHelp style=position:relative;top:2;>
							</a>
						</td>
						<td align=right>
							<button class=bEnabled id=btnClose onclick=window.close style=position:static;>Close</button>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
