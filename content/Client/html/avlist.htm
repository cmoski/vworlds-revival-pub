<html>
<head>
<link rel=stylesheet href=..\shared\global.css>
<STYLE ID=SpeakingStyles>
.menuStyle {
	position: relative;
	left: -6;
	list-style-type: none;
	line-height: 10pt;
	font-size: 8pt;
	cursor: default;
	margin-top: 0;
	padding-top: 0;
	margin-bottom: 0;
	padding-bottom: 0;
	font-weight: normal;
}
.submenuStyle {
	position: relative;
	left: -30;
	list-style-type: none;
	line-height: 10pt;
	font-size: 8pt;
	cursor: default;
	margin-top: 0;
	padding-top: 0;
	margin-bottom: 0;
	padding-bottom: 0;
	font-weight: normal;
}
.ThumbNailImage {cursor: default; margin-left: 4; margin-right: 4; border: 0; width: 24; height: 24}
</STYLE>
<SCRIPT LANGUAGE="VBSCRIPT">

dim bShowedErrorOnce

sub ApproachTarget
	on error resume next
	dim curUser, curWorld, objID
	set curWorld = top.theclient.vwclient.world
	set curUser = curWorld.user
	dim targetObj
	set targetObj = Nothing
	objID = clng(window.event.srcElement.linkedUserID)
	if objID > 0 then
		set targetObj = curWorld.objectByID(objID)
		if targetObj is Nothing then
			msgbox "This avatar has left the room.", vbInformation, "Microsoft Virtual Worlds"
		elseif targetObj is curUser then
			curuser.editprofile
		else
			targetObj.lookat
		end if
	end if
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

sub document_onClick
	on error resume next
	dim curElement
	set curElement = window.event.srcElement
	curElType = typeName(curElement)
	select case curElType
		case "HTMLImg"
			if curElement.name = "Thumbnail" then
				ApproachTarget
			end if
		case "HTMLSpanElement"
			DoShowHideMenu curElement
		case "HTMLLIElement"
			curObjID = -1
			curObjID = clng(curElement.linkedObj)
			if curObjID > -1 then
				DoMenuSelect curElement
			end if
		case else
			if window.event.srcElement.id = "divLI" Then
				curObjID = -1
				curObjID = clng(window.event.srcElement.parentElement.parentElement.linkedObj)
				if curObjID > -1 then
					DoMenuSelect window.event.srcElement.parentElement.parentElement
				end if
			End If
	end select
end sub

sub DoMenuSelect(byVal srcElement)
	dim curWorld
	dim curObj
	set curWorld = top.theClient.vwClient.world
	curObjID = clng(srcElement.linkedObj)
	set curObj = curWorld.objectByID(curObjID)
	if curObj is Nothing then
		msgbox "Error:  Virtual Worlds could not find this object in the room.", vbInformation, "Microsoft Virtual Worlds"
	else
		curMenuNum = clng(srcElement.whichMenu)
		parentNum = clng(srcElement.whichParent)
		dim curMenuItem
		if parentNum > -1 then
			set curMenuItem = curObj.GetMenuList.property(parentNum).subMenu.property(curMenuNum)
		else
			set curMenuItem = curObj.GetMenuList.property(curMenuNum)
		end if
		if curMenuItem is nothing then
			msgBox "Error: Invalid menu item.", vbInformation, "Microsoft Virtual Worlds"
		else
			curMenuItem.Execute
		end if
	end if
end sub

sub document_onMouseOver
	on error resume next
	curElType = typeName(window.event.srcElement)
	if curElType = "HTMLSpanElement" or curElType = "HTMLLIElement" or window.event.srcElement.id = "divLI" then
		window.event.srcElement.style.textdecoration = "underline"
	end if
end sub

sub document_onMouseOut
	on error resume next
	curElType = typeName(window.event.srcElement)
	if curElType = "HTMLSpanElement" or curElType = "HTMLLIElement" or window.event.srcElement.id = "divLI" then
		window.event.srcElement.style.textdecoration = "none"
	end if
end sub

sub DoMouseDown(theObj)
	dim curWorld
	dim curPerson
	set curWorld = top.theclient.vwclient.world
	curName = theObj.parentElement.name
	curID = clng(right(curName, len(curName)-4))
	set curPerson = curWorld.objectbyid(curID)
	if curPerson is nothing then
		exit sub
	else
		top.webhelper.TrackThingMenu curPerson
	end if
end sub

function MenuHTML(byVal curMenuItem, byVal curPerson, curItmCnt, curParentCnt)
	newHTML = ""
	bSubMenu = false
	if typename(curMenuItem.subMenu) <> "Nothing" then
		bSubMenu = true
		if curMenuItem.subMenu.count = 0 then
			MenuHTML = newHTML
			exit function
		end if
	end if
	if curMenuItem.menuText = "" then
		newHTML = ""
	elseif clng(curMenuItem.flags) AND 1 then
		newHTML = ""
	elseif clng(curMenuItem.flags) AND 2 then
		newHTML = ""
	elseif clng(curMenuItem.flags) AND 4 then
		newHTML = ""
	elseif clng(curMenuItem.flags) AND 8 then
		newHTML = ""
	elseif clng(curMenuItem.flags) AND 2048 then
		newHTML = ""
	else
		' update the menu
		newHTML = newHTML & "<LI linkedObj=" & cstr(curPerson.id) & " whichMenu=" & cstr(curItmCnt) & " whichParent=" & cstr(curParentCnt) & "><nobr><div id=divLI style=position:relative;left:3;overflow:hidden;width:115; title=""" & _
		curMenuItem.menuText & """>" & curMenuItem.menuText & "</div></nobr></LI>"
		' now, check to see if it is a sub-menu
		if bSubMenu then
			newHTML = newHTML & ObjMenuHTML(curMenuItem.subMenu, curPerson, "subMenuStyle", curItmCnt)
		end if
	end if
	MenuHTML = newHTML
end function

function ObjMenuHTML(byVal curMenuList, byVal curPerson, overStyle, parentNum)
	on error resume next
	dim curMenuItem
	curItmCnt = 0
	newHTML = ""
	newHTML = "<UL class=""" & overStyle & """ name=""ObjMenu"">"
	for each curMenuItem in curMenuList
		newHTML = newHTML & MenuHTML(curMenuItem, curPerson, curItmCnt, parentNum)
		curItmCnt = curItmCnt+1
	next
	newHTML = newHTML + "</UL>"
	ObjMenuHTML = newHTML
end function

sub InsertObjMenu(byVal parentEl, byVal curPerson)
	newHTML = ObjMenuHTML(curPerson.getMenuList, curPerson, "menuStyle", -1)
	parentEl.InsertAdjacentHTML "BeforeEnd", newHTML
end sub

sub DoShowHideMenu(theObj)
	on error resume next
	dim curWorld
	dim curPerson
	dim parentEl
	set parentEl = theObj.parentElement.parentElement.parentElement
	set curWorld = top.theclient.vwclient.world
	curName = parentEl.name
	curID = clng(right(curName, len(curName)-4))
	set curPerson = curWorld.objectbyid(curID)
	' set the control manager
	if top.ControlManager is Nothing and curWorld.IsValidTool("ControlManager") then
		set top.ControlManager = curWorld.tool("ControlManager")
	end if
	if curPerson is nothing then
		exit sub
	else
		dim lastEl
		set lastEl = parentEl.children(parentEl.children.length-1)
		if lastEl.tagName = "UL" then
			if lastEl.name = "ObjMenu" then lastEl.outerHTML = ""
		else
			InsertObjMenu parentEl, curPerson
			if not top.ControlManager is Nothing then
				top.ControlManager.select(curPerson)
			end if
		end if
		If parentEl.offsetHeight > document.body.clientHeight Then
			parentEl.scrollIntoView
		ElseIf parentEl.offsetTop + parentEl.offsetHeight > document.body.scrollTop + document.body.clientHeight Then
			parentEl.scrollIntoView False
		ElseIf parentEl.offsetTop - document.body.scrollTop < 0 Then
			parentEl.scrollIntoView
		End If
	end if
end sub

sub window_onload()
	top.AddToEventList window
	DoPosition
	window.settimeout "RegenerateAvatarTable", 2000, "VBScript"
end sub

' ========================================
' HandleUIEvent
'

Sub HandleUIEvent(byval who, what, byval args)
	Select Case what
	Case "OnNameChanged", "OnUIElementChanged", "OnGeometryChanged"
		RefreshListItem who
	Case "Befriended", "Unbefriended", "IgnoredUser", "UnignoredUser", "IgnoredByUser", "UnignoredByUser"
		RefreshListItem args
	Case "OnEnterWorld"
		HandleEnterRoom who
	Case "OnEnterRoom"
		HandleEnterRoom args
	Case "OnLeaveRoom"
		HandleLeaveRoom args
	Case "OnLeaveWorld"
		HandleLeaveRoom who
	Case "OnFinishSceneComposite"
		window.settimeout "RegenerateIcons", 3000, "VBScript"
	Case "OnHostStatusChanged"
		RefreshListItem args
	Case Else
	End Select
End Sub

' ========================================
' objectImage
' returns the HTML for a thumbnail image of
' the object

function objectImage(byval curObj)
	dim imgFile

	if curObj.IsOfType("Host") then
		objectImage = "host.gif"
	else
		err.clear
		on error resume next
		imgFile = curObj.geometry.thumbnailname
		imgFile = curObj.world.Tool("INetFile").GetFile(imgFile, true)
		If Err.Number <> 0 Then imgFile = "../shared/tdefault.gif"
		objectImage = imgFile
	end if

end function

function Spanify(theText, theClass)
	theHTML = "<" + "SPAN class="
	theHTML = theHTML + theClass + ">"
	theHTML = theHTML + theText + "</SPAN>"
	Spanify = theHTML
end function

Sub window_onUnLoad()
	top.RemoveFromEventList window
end sub

sub HandleOnConnect(theWorld)
	bShowedErrorOnce = false
end sub

sub HandleUserDisconnect(byVal theUser)
	RemoveUserFromList(theUser)
end sub

sub HandleEnterRoom(byval what)
	dim curWorld, curSpan
	set curWorld = top.theClient.vwclient.world
	if what is curWorld.user then
		RegenerateAvatarTable
	elseif curWorld.isAvatar(what) and what.isValidProperty("isConnected") then
		spanName = "USER" + cstr(what.id)
		set curSpan = document.all("AvatarList").children(spanName)
		if not curSpan is nothing then
			curSpan.outerHTML = ""
		end if
		AddUserToList(what)
	end if
end sub

sub HandleLeaveRoom(byval what)
	dim curWorld
	set curWorld = top.theClient.vwclient.world
	if what is curWorld.user then
		ClearAvatarTable
	elseif curWorld.isAvatar(what) then
		RemoveUserFromList(what)
	end if
end sub

function ObjectImageHTML(byval theObj)
	on error resume next
	newHTML = ""
	imgFile = objectImage(theObj)
	quote = chr(34)
	imgHTML = "<IMG class=" & quote & "ThumbNailImage" & quote & " linkedUserID = " & quote & cstr(theObj.id) & quote + " name=" & quote & "Thumbnail" & quote & " SRC=" & quote & imgFile & quote & "></IMG>"
	newHTML = imgHTML
	ObjectImageHTML = newHTML
end function

function IsObjLessThan(curTop, newObj)
	if strcomp(newObj.name, curTop.name, 1) = -1 then
		IsObjLessThan = true
	else
		IsObjLessThan = false
	end if
end function

sub InsertSpanSorted(theSpan, byval theRefObj)
	dim curSpan
	dim curObj
	dim curWorld
	dim curUser
	set curWorld = top.theclient.vwclient.world
	set curUser = curWorld.user
	isFriend = false
	isIgnored = false
	if curUser is theRefObj then
		AvatarList.insertAdjacentHTML "AfterBegin", theSpan
		exit sub
	else
		' note that if someone is ignored, it doesn't matter if they are
		' a friend or not
		isIgnored = curUser.isinuserprofilelist(theRefObj, "Ignoring")
		if isIgnored = false then
			isFriend = curUser.isinuserprofilelist(theRefObj, "Friends")
		end if
		for each curSpan in document.all("AvatarList").children
			curClass = curSpan.className
			if curClass = "vAvSelf" then
				' do nothing - always at the top
			elseif isFriend = true and curClass <> "vAvFriend" then
				curSpan.InsertAdjacentHTML "BeforeBegin", theSpan
				exit sub
			elseif curClass = "vAvFriend" then
				' do nothing - this non-friend always comes after any friend
			elseif isIgnored = true and curClass <> "vAvIgnore" then
				' do nothing - this ignore always comes after any non-ignored
			elseif isIgnored = false and curClass = "vAvIgnore" then
				' force insert - this unignore always comes before the ignore
				curSpan.InsertAdjacentHTML "BeforeBegin", theSpan
				exit sub
			else
				curID = clng(right(curSpan.name, len(curSpan.name)-4))
				set curObj = curWorld.objectbyid(curID)
				if IsObjLessThan(curObj, theRefObj) = true then
					curSpan.InsertAdjacentHTML "BeforeBegin", theSpan
					exit sub
				end if
			end if
		next
	end if
	' if we got here, we are at the end of the list
	AppendHTML theSpan
end sub

sub RefreshListItem(byval whichObj)
	on error resume next
	dim curSpan
	spanName = "USER" + cstr(whichObj.id)
	set curSpan = document.all("AvatarList").children(spanName)
	if curSpan is nothing then
		exit sub
	end if
	curSpan.outerHTML = ""
	newHTML = GenerateObjectHTML(whichObj)
	InsertSpanSorted newHTML, whichObj
end sub

function ObjSpan(byVal whichObj)
	dim curUser
	set curUser = top.theclient.vwclient.world.user
	spanStyle = "vAvOther"
	if whichObj is curUser then
		spanStyle = "vAvSelf"
	elseif curuser.isinuserprofilelist(whichObj, "Ignoring") = true then
		spanStyle = "vAvIgnore"
	elseif curuser.isinuserprofilelist(whichObj, "Friends") = true then
		spanStyle = "vAvFriend"
	end if
	ObjSpan = spanStyle
end function

function GenerateObjectHTML(byVal whichUser)
	on error resume next
	spanStyle = ObjSpan(whichUser)
	newHTML = ""
	newHTML = Spanify(whichUser.name, spanStyle)
	newHTML = ObjectImageHTML(whichUser) & newHTML
	newHTML = "<LI class=" & spanStyle & " style=list-style-type:none; id=""USER" & cstr(whichUser.id) & _
		""" Name=""USER" & cstr(whichUser.id) & """ ><nobr><div style=overflow:hidden;width:155; title=""" & _
		whichUser.name & """>" & newHTML & "</div></nobr></LI>"
	GenerateObjectHTML = newHTML
end function

sub AppendHTML(newHTML)
	AvatarList.insertAdjacentHTML "BeforeEnd", newHTML
end sub

sub AddUserToList(byval whichUser)
	on error resume next
	newHTML = GenerateObjectHTML(whichUser)
	InsertSpanSorted newHTML, whichUser
end sub

sub RemoveUserFromList(byval whichUser)
	on error resume next
	dim curSpan
	spanName = "USER" + cstr(whichUser.id)
	set curSpan = document.all("AvatarList").children(spanName)
	curSpan.outerHTML = ""
end sub

sub RegenerateAvatarTable()
	on error resume next
	dim curPerson
	dim curUser
	dim peerList
	dim curWorld
	dim bFoundErr
	bFoundErr = false
	set curWorld = top.theClient.vwclient.world
	ClearAvatarTable
	if typename(curWorld) = "IWorld" then
		set curUser = curWorld.user
		if typename(curUser) = "IThing" then
			set peerList = curUser.container.contents
			if typename(peerlist) = "Empty" then
				' This message is misleading and the list sorts itself out later anyway. Skip it.
				'if top.bLoggedIn = true then
					' msgbox "Unable to connect to a room in this world.  Try logging in again.", vbExclamation, "Microsoft Virtual Worlds"
				'end if
				exit sub
			end if
			for each curPerson in peerlist
				curName = "  <*ERR*>  "
				' ignore stub
				if Not curPerson.IsStub then
					curName = curPerson.name
					if curName <> "  <*ERR*>  " then
						if curPerson.isValidProperty("isConnected") = true then
							if curWorld.isAvatar(curPerson) = true then
								AddUserToList curPerson
							end if
						elseif curPerson.IsValidProperty("IsAvatar") = true then
							if curPerson.IsAvatar = true then
								AddUserToList curPerson
							end if
						end if
					else
						' handle the error case
						if bFoundErr = false then
							bFoundErr = true
							if bShowedErrorOnce = false then
								bShowedErrorOnce = true
								window.setTimeout "RegenerateAvatarTable", 2000, "VBScript"
								exit sub
							else
								bShowedErrorOnce = false
								' reenak: comment out for now (see Raid 5998)
								' msgbox "There was an error with one or more of the objects in this world.  Try logging in again.", vbExclamation, "Microsoft Virtual Worlds"
							end if
						end if
					end if
				end if
			next
			window.setTimeOut "RegenerateIcons", 1000, "VBScript"
		end if
	end if
end sub

sub RegenerateIcons
	on error resume next
	' ok, walk the image DIVs and redo their icons
	dim imgList
	dim curImg
	dim curObj
	dim curID
	dim curUser, curWorld
	set curWorld = top.theClient.vwclient.world
	set curUser = curWorld.user
	set imgList = document.all("AvatarList").all("Thumbnail")
	select case typename(imgList)
		case  "HTMLImg"
			curID = clng(imgList.linkedUserID)
			set curObj = curWorld.objectByID(curID)
			imgList.src = objectImage(curObj)
		case "IHTMLElementCollection"
			for each curImg in imgList
				curID = clng(curImg.linkedUserID)
				set curObj = curWorld.objectByID(curID)
				curImg.src = objectImage(curObj)
			next
		case "DispHTMLElementCollection"
			for each curImg in imgList
				curID = clng(curImg.linkedUserID)
				set curObj = curWorld.objectByID(curID)
				curImg.src = objectImage(curObj)
			next
	end select
end sub

sub ClearAvatarTable()
	AvatarList.innerHTML = ""
end sub

sub window_onresize
	DoPosition
end sub

sub DoPosition
exit sub
	newH = document.body.offsetHeight - 50
	newV = document.body.offsetWidth
	if newH > 0 then
		document.all("AvatarList").style.height = newH
		document.all("AvatarList").style.width = newv
	end if
end sub
