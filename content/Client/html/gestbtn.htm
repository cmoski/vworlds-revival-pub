<HTML>
<HEAD>
<META NAME="GENERATOR" Content="Microsoft Developer Studio">
<META HTTP-EQUIV="Content-Type" content="text/html; charset=iso-8859-1">
<TITLE>Generic Button Layout Test</TITLE>
</HEAD>

<SCRIPT LANGUAGE="VBScript">

dim currentBtnName
dim currentBtn

sub Initialize()
	currentBtnName=""
end sub

sub window_onload
	parent.ChildReady(window)
end sub

sub DoMouseEnter
	window.event.srcElement.src = window.event.srcElement.HiliteImg
	window.status = "Perform " + window.event.srcElement.alt + " gesture"
end sub

sub DoMouseOut
	if currentBtnName = "" then
		window.event.srcElement.src = window.event.srcElement.DefaultImg
	elseif currentBtnName = window.event.srcElement.name then
		currentBtn.src = currentBtn.StuckImg
	else
		window.event.srcElement.src = window.event.srcElement.DefaultImg
	end if
	window.status = ""
end sub

sub DoDblClk
	SetDefaultBtn(window.event.srcElement)
end sub

sub SetDefaultBtn (whichBtn)
	if currentBtnName <> "" then
		currentBtn.src = currentBtn.DefaultImg
	end if
	set currentBtn = whichBtn
	if whichBtn is nothing then
		currentBtnName = ""
	else
		currentBtnName = currentBtn.name
		currentBtn.src = currentBtn.StuckImg
	end if
end sub

sub DoBtnClick
	DoBtnAction (window.event.srcElement)
	SetDefaultBtn (Nothing)
end sub


sub DoBtnAction (whichBtn)
	gestureText = whichBtn.GestureText
	theText = parent.parent.frames(0).frames(1).frames(1).frames(0).TextBox.value
	if (theText = "")  or (theText =  "Type here and press Enter to speak") then
		top.theclient.VWClient.World.User.Emote gestureText
	else
		top.theclient.VWClient.World.User.Emote gestureText, theText
	end if
	parent.parent.frames(0).frames(1).frames(1).frames(0).TextBox.value = ""
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

</SCRIPT>

<BODY TOPMARGIN=0 LEFTMARGIN=0 BGCOLOR=#F4F4EB>
<IMG	BORDER=0 SRC="wave.gif" NAME="Wave" STYLE="position:absolute; left:10; top:0"
			OnClick=DoBtnClick OnMouseOver="DoMouseEnter" OnMouseOut="DoMouseOut"
			GestureText="WAVE" DefaultImg="wave.gif" HiliteImg="waveh.gif"  Alt="Wave">

<BR>

			GestureText="BLUSH" DefaultImg="blush.gif" HiliteImg="blushh.gif" Alt="Blush">
