'////////////////////////////////////////////////////////////////////////
'//  Sub:  		LoadTopic
'//  Purpose:	To build the help menu
'//	 Params:
'//		strId	- <string> id of the topic
'//		strURL	- <string> url of the topic
'//  Called by:	window_onLoad
'////////////////////////////////////////////////////////////////////////
sub LoadTopic(strID, strURL)
	if strURL <> "" then
		document.InfoIFrame.location = strURL
	end if

	dim srcElem
	set srcElem = window.document.all.item(strID)
	dim elem
	for each elem in document.all
		select case LCase(srcElem.getAttribute("origClass"))
		case "menui"
			if elem.getAttribute("origClass") = srcElem.getAttribute("origClass") or _
			  (InStr(elem.id, strID) > 0 and _
			  InStr(LCase(elem.className),"menuii_help") > 0) then
				elem.style.display = "inline"				
			elseif InStr(LCase(elem.className),"menui") > 0 then 
				elem.style.display = "none"
			end if

		case LCase(srcElem.getAttribute("origClass")) = "menuii_help" 
			if LCase(elem.getAttribute("origClass")) = "menui" then
				elem.style.display = "inline"
			elseif elem.getAttribute("origClass") = srcElem.getAttribute("origClass") and _ 
			  Left(elem.id,InStr(elem.id,"_")) = Left(srcElem.id,InStr(elem.id,"_")) then
				elem.style.display = "inline"		
			elseif InStr(elem.id, strID) > 0 and _
			  InStr(LCase(elem.className),"menuiii_help") > 0 then
				elem.style.display = "inline"
			elseif InStr(LCase(elem.id), "pad") > 0 and _
			  Left(elem.id,InStr(elem.id,"_")) = Left(srcElem.id,InStr(elem.id,"_")) then
				elem.style.display = "inline"
			elseif InStr(LCase(elem.className),"menui") > 0 then
				elem.style.display = "none"
			end if
		end select			
	next
	set srcElem = nothing
end sub
