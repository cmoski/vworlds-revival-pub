'////////////////////////////////////////////////////////////////////////
'//  Sub:		checkSleep
'//  Purpose:	Put the client to sleep after a certain amount of inactivity time
'//  Called by:	Window_onLoad; self-retriggering
'////////////////////////////////////////////////////////////////////////
sub checkSleep
	' If the user is not not already asleep and the minutes since last action exceeds world.sleepIdleTime, fall asleep.
	' Note: Normally the avatar.geometry.currentGesture property contains the internal VWorlds number of the
	' gesture currently being performed. For most gestures this is until their sprite graphics finish performing
	' the gesture, but sleep is a special case which VWorlds persists until another gesture is started.
	' For multi-part avatars it is the bodyparts that do the actual gesturing, the avatar's currentGesture
	' is always 0 (idle). So to check if an avatar is asleep we check the currentGesture of the hair bodypart.
	if not ClientUserPtr.hair.geometry.currentGesture = vwSleepGesture then
		if dateDiff("n", lastActionTime, Now) > ClientWorldPtr.sleepIdleTime then
			ClientUserPtr.emote "SLEEP"
			ClientWorldPtr.FireUIEvent ClientUserPtr, "FallAsleep"
			if document.activeElement is ClientRendererIFrame then ClientChatBoxIFrame.focus
		end if
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		wakeUp
'//  Purpose:	Put the client to sleep after a certain amount of inactivity time
'//  Called by:	theclient_OnUIEvent
'//				ClientRendererIFrame_onFocus
'//				chatbox.htm:DoSay
'//				myProfile.htm:document_onClick
'//				people.htm:document_onClick
'//				whisperBox.htm:DoSay
'////////////////////////////////////////////////////////////////////////
sub wakeUp
	' if sleep timer has not been started yet, start it;
	' if asleep wake up
	lastActionTime = Now
	if ClientUserPtr.hair.geometry.currentGesture = vwSleepGesture then
		ClientUserPtr.emote "IDLE", "...wakes up"
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		window_onresize
'//  Purpose:	OnResize event handler; adjust dimensions of iframes and other elements
'//  Called by:	user clicking resize buttons or manually resizing the window
'////////////////////////////////////////////////////////////////////////
sub window_onresize

	document.recalc true

	with leftMoulding.style
		.top = document.body.style.edge4Pos
		.left = document.body.style.edge2Pos + Edge2Size
		.height = document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom -15
		.width = mouldingWidth
	end with
	
	with rightMoulding.style
		.top = document.body.style.edge4Pos
		.left = document.body.clientWidth - ClientMarginRight - mouldingWidth
		.height = document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom -15
		.width = mouldingWidth
	end with	
	
	with RightPanel.style
		.top = document.body.style.edge4Pos
		.left = document.body.style.edge2Pos + Edge2Size
		.height = document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom
		.width = document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight
	end with

	with ClientMainToolsIFrame.document.body.style
		.top = 0
		.left = mouldingWidth
		.height = buttonBarHeight
		.width = document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight - mouldingWidth * 2
	end with
	
	with ClientAddressBarIFrame.document.body.style
		.top = buttonBarHeight
		.left = mouldingWidth
		.height = addressBarHeight
		.width = document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight - mouldingWidth * 2
		
	end with
	
	' the document in the browser frame can change, so to avoid script errors
	' make sure there is a document at the moment we do the resize
	if isObject(ClientBrowserIFrame.document) then
	  with ClientBrowserIFrame.document.body.style
		.top = buttonBarHeight + addressBarHeight
		.left = mouldingWidth
		.height = document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom - buttonBarHeight - addressBarHeight - 15
		.width = document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight - mouldingWidth * 2
	  end with
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		Window_OnLoad
'//  Purpose:	Initialize the page
'////////////////////////////////////////////////////////////////////////
sub window_onLoad
	' The login page that opens this page must pass the world location, username,
	' and optionally the path back to the login page. If passed, the login page will be
	' reinvoked in the case of unintentional disconnects, etc.
	dim args
	args = split(mid(document.location.search,2,255), "&")
	sWorld = args(0)
	sUser = args(1)
	if uBound(args) > 1 then
		sLogonURL = args(2)
	else
		sLogonURL = ""
	end if
	htmlpopup.Initialize window.theclient.vwclient

	bIntentionalDisconnect = false

	if (sUser = "" or sWorld = "") Then
		logonAgain
	end if

	DoAutoLogin
	window_onresize
	sleepTimer = window.setInterval("checkSleep",sleepCheckInterval, "vbscript")
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		window_OnUnload
'//  Purpose:	Disconnect from the world and clean up when the page unloads
'////////////////////////////////////////////////////////////////////////
sub window_OnUnload
	htmlpopup.CloseAll
	if Not window.theClient.VWClient.World Is Nothing then
		bIntentionalDisconnect = true
		window.theClient.VWClient.World.Disconnect
	end if
end sub


'////////////////////////////////////////////////////////////////////////

		window.event.returnValue = strExit

'////////////////////////////////////////////////////////////////////////
'//  Notes:	Partitioning of the client page	
'////////////////////////////////////////////////////////////////////////
' Excluding the narrow header, the client window is divided into 4 iframes:
'	3D renderer
'	status line
'	chat
'	main panel
' Positioning and sizing are defined in the iframe styles, using IE5 expressions that
' depend on 6 imaginary edges. Each edge is represented by an EdgePct value between 0 and 1,
' representing a percentage of the client window, and an EdgeSize value in pixels. 
' Changing EdgePct and EdgeSize values causes IE5 to recalc everything, rearranging
' the iframes. There are 4 predefined arrangements:
'
'       LeftShort           LeftTall              LeftShort            RightMax
'       RightTall           RightShort            RightShort
'                           3                                           6      
'    |      +-------     +------+      |       |             |      +--------------
'    |      |   4               |      |       |             |      |   3      4
'   5|   6  |1                 5|   6  |1     5|   6         |1    5|1
'    +------+                   +------+       +------+------+      |
'        3  |                   |   4  |           3  |   4         |
'           |2                  |2     |              |2            |2
'           |                   |      |              |             |'
'
' When an edge is in the interior of the app window, its Size defines the gutter between panes.
' When an edge is at the outer edge of the app window, its Size is set to 0.

' The default view is LeftShort/RightTall. The "main panel" is on the right; the left 
' side from top to bottom contains the Renderer, status line and Chat pane, with edge 6
' defining the bottom of the status line and edge 3 the top of the Chat. 

' In RightMax view the main panel is expanded to take up the full window. 


'////////////////////////////////////////////////////////////////////////
'//  Sub:		ResizePane
'//  Purpose:	Adjust the size and position of the sub-frames in the client
'//  Args:		How - which configuration to change to
'//	 Called by:	chatbox.htm:ResizeUpDown
'//				clientMainToolsIFrame.htm:ResizeUp
'//				clientMainToolsIFrame.htm:ResizeMax
'////////////////////////////////////////////////////////////////////////
sub ResizePane (how)
'	Move the edges that divide the panes, causing their dependent styles to resize them.
	select case how
		case LeftTall
			Edge3Pct = 0.0
			Edge3Size = 0
			Edge5Pct = ClientLeftPanePct
			Edge5Size = VerticalGutterSize
		case LeftShort
			Edge3Pct = ClientUpperPanePct
			Edge3Size = HorizontalGutterSize
			Edge5Pct = 0.0
			Edge5Size = 0
		case RightTall
			Edge1Pct = ClientLeftPanePct
			Edge1Size = VerticalGutterSize
			Edge2Pct = ClientLeftPanePct
			Edge2Size = VerticalGutterSize
			Edge4Pct = 0.0
		case RightShort
			Edge1Pct = 1.0
			Edge1Size = 0
			Edge2Pct = ClientLeftPanePct
			Edge2Size = VerticalGutterSize
			Edge4Pct = ClientUpperPanePct
			Edge4Size = HorizontalGutterSize
		case RightMax
			Edge1Pct = 0.0
			Edge1Size = 0
			Edge2Pct = 0.0
			Edge2Size = 0
			Edge4Pct = 0.0
			Edge4Size = 0
	end select
	if Edge1Pct <= Edge5Pct then
		' the renderer and status panes are squeezed down to Zero width
		document.all("ClientRendererIFrame").style.display = "none"
		document.all("ClientStatusBarIFrame").style.display = "none"
	else
		document.all("ClientRendererIFrame").style.display = ""
		document.all("ClientStatusBarIFrame").style.display = ""
	end if
	window_onresize
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		IsZero(n) and IsNonZero
'//  Purpose:	Style expression workarounds; style expressions in IE5 cannot handle  
'//				a boolean term like "expression(5 * (n=0))" or a NOT operator; these
'//				functions return a numerical value that can be used as a multiplier 
'//				to include or exclude another value in a resizing expression.
'//	 Called by:	dynamic positioning expressions (see <BODY> below)
'////////////////////////////////////////////////////////////////////////
function IsZero(n)
	if n = 0 then
		IsZero = -1
	else
		IsZero = 0
	end if
end function

function IsNonZero(n)
	if n = 0 then
		IsNonZero = 0
	else
		IsNonZero = -1
	end if
end function

'////////////////////////////////////////////////////////////////////////
'//  Sub:		GetHex(numVal,digits)
'//  Purpose:	Convert a number to a hex color string,
'//				left-padded with 0's to the specified # of digits.
'//				if digits = 6 then assume the input is a numeric BGR value and
'//				reverse the first and last pairs of hex digits to give an RGB string.
'//  Called by:	WaitForObjects_Then_insertThumbnailElement
'////////////////////////////////////////////////////////////////////////
function GetHex(numVal,digits)
	' this function is used by insertThumbnailElement (below).
	GetHex = hex(numVal)
	if len(GetHex) < digits then GetHex = string(digits-len(GetHex),"0") & GetHex
	if digits = 6 then GetHex = mid(GetHex,5,2) & mid(GetHex,3,2) & mid(GetHex,1,2)
end function


'////////////////////////////////////////////////////////////////////////
'//  Sub:		getAvatarModelName (avatar)
'//  Purpose:	get the model name of an avatar based on its hair geometry file name;
'//				for example, geometry name "worlds/DesktopWorld/models/betty5.gif"
'//				means the avatar model is "betty".
'//  Called by:	WaitForObjects_Then_insertThumbnailElement
'//				MyAppearance.htm:Window_onLoad
'////////////////////////////////////////////////////////////////////////
function getAvatarModelName (avatar)
	' Get the current model name from the person's hair geometry name;
	' modelName starts after the last slash and ends 2 chars before the last dot,
	' as in "...path...\modelName5.spr"
	' Used by ColorPicker.htm and insertThumbnailElement (below).
	dim objHair,iSlash,iDot
	set objHair = avatar.hair
	
	if IsObject(objHair) then
		iSlash = instrRev(objHair.GeometryName,"\")
		iDot = instrRev(objHair.GeometryName,".")
		getAvatarModelName = mid(objHair.GeometryName, iSlash+1, iDot - iSlash - 2)
	else
		getAvatarModelName = ""
	end if
	set objHair = nothing
end function

'////////////////////////////////////////////////////////////////////////
'//  Sub:		isIgnoring (avName)
'//  Purpose:	return true if avName is on the user's ignore list, false if not
'//  Called by:	WaitForObjects_Then_insertThumbnailElement
'////////////////////////////////////////////////////////////////////////
function isIgnoring (avName)
	dim ignoredList
	on error resume next
	set ignoredList = clientUserPtr.profile.keyValue("customIgnoreList")
	if isObject(ignoredList) then
		dim n
		for n = 0 to ignoredList.count - 1
			if avName = ignoredList.property(n).name then
				isIgnoring = true
				exit function
			end if
		next
	end if
	isIgnoring = false
	set ignoredList = nothing
end function

'////////////////////////////////////////////////////////////////////////
'//  Sub:		insertThumbnailElement (avatar, intoDocument, intoElement)
'//  Purpose:	generate a span element containing a avatar's thumbnail image and name,
'//				and append it to the specified HTML element of the specified document object.
'//	 Args:	avatar: an avatar object
'//			intoDocument: a document object on a web page
'//			intoElement: an HTML element object that is within intoDocument
'//  Called by:	WaitForObjects_Then_insertThumbnailElement
'////////////////////////////////////////////////////////////////////////
sub WaitForObjects_Then_insertThumbnailElement()
	' In order to colorize the thumbnail image, we must insert the span containing
	' the image into an existing HTML document before applying color filters to it.
	' Color filters cannot be applied to element objects that are not in documents.
	' (In general, setting property values on elements before inserting them in documents
	' is not guaranteed to work, and Filter is one property that definitely does not.)
	' The thumbnail is composed of 2 images; the second one uses relative positioning
	' because if it uses absolute positioning any element added after it with relative
	' positioning will overlay it.
	
	' make sure objects have been remoted to the user's client before referencing them
	on error resume next
	dim avatar, intoDocument, intoElement
	set avatar = global_avatar
	set intoDocument = global_intoDocument
	set intoElement = global_intoElement
	dim test
	test = avatar.skin.color
	if Err.number <> 0 then
		Err.Clear
		window.setTimeout "WaitForObjects_Then_insertThumbnailElement", 500
		exit sub
	end if
	
	dim newElem, elem, thumb1, thumb2, thumbColor, model, ignore
	model = getAvatarModelName(avatar)
	set elem = intoDocument.createElement("SPAN")
	elem.id = "thumb" & avatar.id
	intoElement.insertAdjacentElement "BeforeEnd", elem
	elem.style.position = "relative"
	elem.style.cursor = "hand"
	set thumb1 = intoDocument.createElement("SPAN")
	thumb1.id = "thumb1"
	' to create a stack of images followed by something else to the right, 
	' use absolute positioning on all images except the last one; use relative for the last.
	thumb1.className = "imgThumb1"
	thumb1.innerHTML = "<IMG class=ThumbNailImage linkedUser =" & avatar.name & " name=Thumbnail height=16 width=16 SRC='" & AvatarGifPath & model & "1thumb.gif'></IMG>"
	elem.insertAdjacentElement "BeforeEnd", thumb1
	ignore = isIgnoring(avatar.name)
	if ignore then
		thumbColor = ignoredGray
	else
		thumbColor = GetHex(avatar.skin.color,6)
	end if
	thumb1.filters.light.addAmbient cint("&H" & mid(thumbColor,1,2)), cint("&H" & mid(thumbColor,3,2)), cint("&H" & mid(thumbColor,5,2)), 255

	set thumb2 = intoDocument.createElement("SPAN")
	thumb2.id = "thumb2"
	thumb2.className = "imgThumb2"
	dim strThumb2
	strThumb2 = "<IMG class=ThumbNailImage linkedUser =" & avatar.name & " name=Thumbnail height=16 width=16 SRC='" & AvatarGifPath & model & "2thumb.gif'"
	if InStr(Lcase(intoDocument.location),"chatbox.htm") then
		strThumb2 = strThumb2 & " ALT='Your Avatar'></IMG>"
	else
		strThumb2 = strThumb2 & "></IMG>"
	end if
	thumb2.innerHTML = strThumb2
	elem.insertAdjacentElement "BeforeEnd", thumb2
	if ignore then
		thumbColor = ignoredGray
	else
		thumbColor = GetHex(avatar.hair.color,6)
	end if
	thumb2.filters.light.addAmbient cint("&H" & mid(thumbColor,1,2)), cint("&H" & mid(thumbColor,3,2)), cint("&H" & mid(thumbColor,5,2)), 255
	set elem = nothing
	set Thumb1 = nothing
	set Thumb2 = nothing
	
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		GetRenderControl()
'//  Purpose:	return a pointer to the renderer control
'//	 Called by:	chatBox.htm:TextBox_OnKeyUp
'//				chatBox.htm:EnableKeyboardNav
'//				chatBox.htm:TextBox_onblur
'//				whisperBox.htm:TextBox_OnKeyUp
'//				whisperBox.htm:EnableKeyboardNav
'//				whisperBox.htm:TextBox_onblur
'////////////////////////////////////////////////////////////////////////
function GetRenderControl()
	if not IsEmpty(RenderControl) then

'////////////////////////////////////////////////////////////////////////
'//  Sub:		AddToArray and RemoveFromArray
'//  Purpose:	Do array maintenance for AddToEventList and RemoveFromEventList
'////////////////////////////////////////////////////////////////////////
sub RemoveFromArray(pArray, byval val)
	Dim i, nUB, bFound
	nUB = UBound(pArray)
	bFound = false
	if (nUB < 0) or Not IsObject(val) then exit sub	
	for i = 0 to nUB
		if (IsObject(pArray(i))) then
			if (bFound) then
				if (i < nUB) then set pArray(i) = pArray(i+1)
			elseif pArray(i) Is val then
				if (i < nUB) then set pArray(i) = pArray(i+1)
				bFound = true
			end if
		end if
	next
	' sometimes windows collide with an "array locked" error; repeat until we get through
	on error resume next
	ReDim Preserve pArray(nUB - 1)
end sub

sub LinkTo(toURL)

	strWebContentPath = top.ClientWorldPtr.WebContentPath
	if len(toURL) > 0 then
		if InStr(LCase(toURL), "http://") _
		and UCase(Left(toURL,Len(strWebContentPath))) <> UCase((strWebContentPath)) then
			if IsEmpty(ExternalWindow) then

				lngWidth = window.screen.availWidth * .5
				lngHeight = window.screen.availHeight * .7
				lngLeft =  (window.screen.availWidth/2)-(lngWidth/2)-(lngWidth*.1)
				lngTop = window.screen.availHeight * .1
				set ExternalWindow = window.open(toURL, "_scurl", "width=" & lngWidth &_
					", height=" & lngHeight & ", left=" & lngLeft & ", top=" & lngTop &_
					", location=1, menubar=1, resizable=1, scrollbars=1, status=1, titlebar=1, toolbar=1")
			else
				ExternalWindow.navigate toURL
			end if
		else

'////////////////////////////////////////////////////////////////////////
'//  Sub:		Logon(name, vws_url)
'//  Purpose:	connect the client control to the VWorlds server and 
'//				log the user into the world.
'//	 Called by:	DoAutoLogin
'////////////////////////////////////////////////////////////////////////
function logon(name, vws_url)
	dim world
	dim user
	dim errNum, errMsg

	on error resume next
	err.Clear
	' connect the client to the VWorlds server
	set world = window.theclient.VWClient.Connect(vws_url)
	errNum = err.number
	errMsg = err.description

	if world is nothing then
		select case errNum
		case -2147220901
			MsgBox "Failed to connect to " & vws_url & ".  The World Server and your client are running different versions of VWorlds.", vbCritical, "Sample World"
		case else
			MsgBox "Failed to connect to " & vws_url & ".  Please try again later. If the problem persists, contact the World administrator.", vbCritical, "Sample World"
		end select
		logon = FALSE
		logonAgain
	else
		err.Clear
		' log the user into the world
		set user = world.Connect(name, "")		' password = ""
		errNum = err.number
		errMsg = err.description

		if typename(user) <> "IThing" then
			if err.number = -2147220949 then
				MsgBox "Connection attempt failed.  This username is already connected to the World.", vbExclamation, "Sample World"
			elseif err.number = -2147220917 then
				MsgBox "Connection attempt canceled.", vbExclamation, "Sample World"
			else
				MsgBox "Connection attempt failed: " & errMsg & ".", vbCritical, "Sample World"
			end if
			bIntentionalDisconnect = true
			' disconnect the client from the VWorlds server
			window.theclient.VWClient.Disconnect
			logon = FALSE
			logonAgain
		else
			world.EnableTrace False
			UpdateAvatarProfile vws_url

			' Using the htmlpopup object as opposed to msgbox avoids having "VBScript:" added to the title bar
			htmlpopup.Initialize window.theclient.vwclient

			logon = TRUE
			bIntentionalDisconnect = false
			bLoggedIn = true
		end if

		set ClientWorldPtr = world
		set ClientUserPtr = user
		AvatarGifPath = world.ContentPath & "Worlds\DesktopWorld\Models\Lobby\"
		ClientSamplePage = world.WebContentPath & "overview.htm"
		isWorldLoaded = true
	end if
	set World = nothing
	set user = nothing
end function

'//  Called by:	window_onLoad

	if sLogonURL > "" then window.open sLogonURL & "?clientPath=" & clientPath, "DesktopWorldStart", _
		"toolbar=no,location=no,status=no,menubar=no,resizable=no,width=495,height=370,top=" & _
		(screen.availHeight - 370) / 2 & ",left=" & (screen.availWidth - 495) / 2

end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		theclient_OnDisconnect
'//  Purpose:	event handler for the Disconnect event, 
'//				which fires when the connection to the world has been closed or lost.
'////////////////////////////////////////////////////////////////////////
sub theclient_OnDisconnect(theworld)
	' Note: this only executes if the client is disconnected by some external event,
	' such as the server going down. If the user closes the window then it never handles
	' the OnDisconnect event.
	htmlpopup.CloseAll
	if top.theclient.vwclient.isConnected = false then
		if msgbox(now & " -- The connection to Sample World has been unexpectedly terminated.  Attempt to reconnect?", vbYesNo + vbQuestion, "Sample World") = vbYes then
			top.navigate "client.htm" & document.location.search
		else
			bReconnecting = true	' prevent IE from displaying the "You are about to navigate away..." message
			logonAgain
		end if
	else
		bLoggedIn = false
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		theclient_OnUIEvent
'//  Purpose:	event handler for UI events, which are caused when a VWorlds object calls
'//				the FireUIEvent method. This is the principal way for objects in the world
'//				to communicate to the UI.
'////////////////////////////////////////////////////////////////////////
sub theclient_OnUIEvent(who, what, args)
' The world passes information to the UI through UI events. Some UI events are fired 
' automatically by VWorlds, others are fired explicitly by objects calling FireUIEvent.
' This sub passes UI events to all windows on WantsEventsList. Windows individually
' add themselves to WantsEventsList by calling AddToEventList in their window_OnLoad.

	dim world, strWorld
	if ClientIsLoading then CheckLoadProgress
	if window.theClient.vwclient.world Is Nothing then exit sub
	set world = window.theclient.vwclient.world
	
	
	' wake the avatar up when the user performs any 3d-world action
	select case what 
		case "ClickToy", "avatarRButtonDown", "ShowProfile", "MakeFriendRequest", _
			 "Unbefriended", "IgnoredUser", "UnignoredUser", "WhisperTo", "ViewUserWebPage", _
			 "SendNote", "SurfToURL", "SurfToSampleURL" 
			wakeUp
	end select
	
	' handle individual events
	select case what
		case "Help"
			HandleHelp who, what, args
		case "OnProfileChanged" 
			if who is world.user then HandleUserProfileChanged
		case "SetCamera" 
			DoSetCamera who, args
		case "OnReconnect" 
			bIntentionalDisconnect = True
		case "OnFinishSceneComposite" 
			window.status = ""
			clientIsLoading = false
			strWorld = theClient.vwclient.world.servername & "/" & theClient.vwclient.world.worldName

			'if this is the persons first time into the world
			if world.lastVisitDate.isValid(ClientUserPtr.name) = false then
				'send them this little gretting from "admin", NOTE: this is hard coded. so there must be a user called admin
				ClientUserPtr.receiveNote "Note", "VWorlds Dev Team", "Welcome to the World! We hope you enjoy the people, information and games available " & _
				"here. If you would like to send others a note, go to People and click on another person's name. Then click Send Note and type " & _
				"your message.<p>Have fun!", "Sun"
			end if

			logonMessage.style.display = "none"
			document.all("divWholeClient").style.visibility = "visible"
			if world.user.container.name = "Lobby Room" then world.user.container.findwithin("Phebe").greetUser(world.user)
			' use a timeout because this errors if it happens before the 3d renderer is initialized
			window.setTimeout "DoSetCamera top.ClientWorldPtr.global.overview_point, array(0)", 1000, "VBScript"
		case "EventRequest" 
			' fired by popups that want to handle UI events (for example, the command window)
			AddToEventList args
			exit sub
		case "EventRequestCancel" 
			RemoveFromEventList args
			exit sub
		case "OnLogOff" 
			HandleLogOff args.property(0), args.property(1), args.property(2)
		case "SurfToURL" 
			LinkTo args(0)
		case "SurfToSampleURL" 
			LinkToSample args(0)
		case "SendNote" 
			currentAvatarId = args(0)
			currentPeoplePage = "NoteSend.htm"
			top.ClientMainToolsIFrame.btnPeople.click
		case "ViewUserWebPage" 
			LinkTo world.UserPagesServer & world.UserPagesPath & "webPageView.asp?user=" & who.name
		case "ShowProfile" 
			currentAvatarId = args(0)
			top.ClientMainToolsIFrame.btnPeople.click
		case "OnLeaveWorld"
			if isobject(ClientUserPtr) and isobject(who) then
				ClientUserPtr.clientCancelFriendPending who
			else
				stop		'bad stuff happend
			end if
	end select

	dim wind, i, bDispatchEvent
	if bLoggedIn then 
		bDispatchEvent = true
	else
		select case theEvent
			case "OnEnterRoom", "OnEnterWorld", "OnFinishSceneComposite"
				bDispatchEvent = true
			case else
				bDispatchEvent = false
		end select
	end if

	if bDispatchEvent then
		on error resume next
		for each wind in wantsEventsList
			wind.HandleUIEvent who, what, args
		next
	end if
	set world = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		HandleLogOff
'//  Purpose:	Handler for the UI Event "OnLogOff"
'//	 Called by:	theclient_OnUIEvent
'////////////////////////////////////////////////////////////////////////
sub HandleLogOff(Host, Target, Reason)
	dim MsgString
	dim User
	set User = top.theclient.vwclient.world.user
	if User is Target then
		bForcedLogOffByHost = true
		MsgString = "Host " & Host.Name & " is logging you off for the following reason:  " & Reason
		MsgBox MsgString, vbInformation, "Sample World"
		logonAgain
	end if
	set User = nothing
end sub

			left:expression(document.body.style.edge2Pos + Edge2Size);
			height:expression(document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom +15);
			width:expression(mouldingWidth);
			background:url(Lstriptile.gif);"><img src="../Images/Lstrip.gif"></div>

<div style="position:absolute;display:;
			top:expression(document.body.style.edge4Pos);
			left:expression(document.body.clientWidth - ClientMarginRight - mouldingWidth);
			height:expression(document.body.clientHeight - document.body.style.edge4Pos - Edge4Size - ClientMarginBottom);
			width:expression(mouldingWidth);
			background:url(../Images/Rstriptile.gif);"><img src="../Images/Rstrip.gif"></div>

<div id=BottomBorder
	style="position:absolute;
		display:block;
		height:expression(mouldingWidth -1);
		top:expression(document.body.clientHeight - ClientMarginBottom - mouldingWidth);
		left:expression(document.body.style.edge2Pos + Edge2Size);
		line-height:5px;
		width:expression(document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight + 1);
		background:#84A2A5;
		border-Left:1px solid #C4D2D2;
		border-Right:1px solid #C4D2D2;
		border-Bottom:1px solid #C4D2D2;">&nbsp;</div>

<div id=BottomMargin
	style="position:absolute;
		display:block;
		height:expression(ClientMarginBottom);
		top:expression(document.body.clientHeight - ClientMarginBottom);
		left:expression(document.body.style.edge2Pos + Edge2Size);
		line-height:5px;
		width:expression(document.body.clientWidth - document.body.style.edge2Pos - Edge2Size - ClientMarginRight);
		background:#5A7B7D;">&nbsp;</div>

<div id=ClientHeaderIFrame
		style="position:absolute;display:;
			top:expression(ClientMarginTop);
			left:expression(ClientMarginLeft);
			height:expression(ClientHeaderHeight);
			width:expression(document.body.clientWidth
				- ClientMarginLeft 
				- ClientMarginRight);">

	<table border=0 cellspacing=0 cellpadding=0 width=100%>
	<tr>
		<td valign=left class=vH1><span>Desktop World</span></td>
	</tr>
	</table>
</div>

</div>	<!-- divWholeClient -->

</body>
</html>
