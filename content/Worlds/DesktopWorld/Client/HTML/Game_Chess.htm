<script language="vbscript">
option explicit

'//////////////////////////////////////////////////////////////////////////
'////  Global constants (to this file)
'//////////////////////////////////////////////////////////////////////////
const numVWRow1Z = .6		' the worlds z position value for row 1
const numVWColAX = -19.8	' the worlds X position value for col A
const numVWRow8Z = 11.05	' the worlds z position value for row 8
const numVWColHX = -9.8		' the worlds x position value for col H
const intAscA = 65			' the ascii val for the char "A"
const numPieceFloat = 3		' the level at which pieces will float once discarded
const intRowsCt = 12		' the number of rows including discard
const intColsCt = 8			' the columns on the board
const intMoveDiv = 8 		' the divisor for breaking a piece move into several moves

'//////////////////////////////////////////////////////////////////////////
'////  Global Variables (to this file)
'//////////////////////////////////////////////////////////////////////////
dim World			' the client control's "World" object
dim User			' the client control's "User" object
dim strStatus		' the login status message
dim intZind		 	' the current max zindex 
dim intSquareWd		' the current size of a side of a board square
dim blnSwapped		' has the board been turned 180 degrees
dim numLastX		' the last object clicked down on x cood
dim numLastY 		' the last object clicked down on y cood
dim objEventElem	' the window.event.srcElement
dim numVWSquareX	' the width of a vwchess square
dim numVWSquareZ	' the height of a vwchess square

intZInd = 0
intSquareWd = 32
blnSwapped = false
numVWSquareX = (numVWColHX-numVWColAX)/7
numVWSquareZ = (numVWRow1Z-numVWRow8Z)/7

dim m_bGameOn
m_bGameOn = false

'////////////////////////////////////////////////////////////////////////
'//  Sub:	 	Window_OnLoad
'//  Purpose:	Initialize the version of the chessboard and add this
'//				page to the list of windows that want to receive UI events
'////////////////////////////////////////////////////////////////////////
sub Window_OnLoad
	set User = top.ClientUserPtr
	SyncPieces
	divPieces.style.display = "block"
	top.AddToEventList window
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:  		window_OnUnload
'//  Purpose:	Remove this window from the list of windows that want to receive UI events
'////////////////////////////////////////////////////////////////////////
sub window_OnUnload
	top.RemoveFromEventList window
	set user = nothing
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:	 	document_OnClick()
'//  Purpose:  	Push a clicked img to the back of the pieces zorder
'////////////////////////////////////////////////////////////////////////
sub document_OnClick

	dim objEventElem
	set objEventElem = window.Event.srcElement
	' reset the zindex to the next negative
	if IsPiece(objEventElem) then
		objEventElem.style.zIndex = intZInd
	    intZInd = intZInd - 1 
	end if
	set objEventElem = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		document_OnMouseDown
'//  Purpose:  	Record the former coordinates for future use, to test to 
'//             see if the img actually moved.
'////////////////////////////////////////////////////////////////////////
sub document_OnMouseDown
	
	set objEventElem = window.Event.srcElement
	' just set the current position of the piece for eval when mouse is up
	if IsPiece(objEventElem) then
		numLastX = objEventElem.style.pixelLeft
		numLastY = objEventElem.style.pixelTop
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:  		document_OnMouseUp
'//  Purpose:  	Move the inworld piece to match the web page piece
'////////////////////////////////////////////////////////////////////////
sub document_OnMouseUp
	dim numX
	dim numY
	dim numZ
	dim strEndPos
	dim objVWPiece
	dim numLeft
	dim numTop


	if not IsPiece(objEventElem)then exit sub
	
	m_bGameOn = true
	
	numX = objEventElem.style.pixelLeft
	numY = objEventElem.style.pixelTop

	' do nothing if the touched piece was not moved
	if (numX = numLastX) and (numY = numLastY) then exit sub

	' find the in-world chess piece corresponding to the one clicked in the web page
	set objVWPiece = top.ClientUserPtr.container.findwithin(objEventElem.id)

	' if a piece is moved off the board, move it to it's discard home
	if numY < intSquareWd or numY > (10*intSquareWd) then
			
		dim intTopOff	 ' offset caused by being on different ends of the board

		intTopOff = intRowsCt
		if objEventElem.className <> "PieceBlk" then 
			intTopOff = intColsCt
		end if

		' find the coord that corresponds to the home given, based on col and rows
		numX = (asc(Left(objEventElem.home,1))-intAscA)*intSquareWd
		numY = (intTopOff-Right(objEventElem.home,1))*intSquareWd			
		
		' if the board has been reversed, swap these new coordinates to send to the world
		if blnSwapped then
			numX = SwapX(numX) 
			numY = SwapY(numY)
		end if

		numZ = objVWPiece.OrigY + numPieceFloat
		
		objEventElem.style.pixelLeft = numX
		objEventElem.style.pixelTop	= numY	
	else
		' if the piece was brought back from the discard area, make it not float anymore
		if objVWPiece.position.Y = (numPieceFloat + objVWPiece.OrigY) then
			numZ = objVWPiece.OrigY
		else
			'non discarded, regular move
			numZ = objVWPiece.position.Y
		end if
	end if		
		
	' convert the coords to world coords
	numX = ToVWCoordX(numX)
	numY = ToVWCoordY(numY)

	
	' tell the in-world piece to move, and to remember who moved it
	objVWPiece.setPosition numX, numZ, numY, top.ClientUserPtr, true

	set objEventElem = nothing
	set objVWPiece = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Function:	IsPiece(objElement)
'//  Purpose:  	To see if the object is a chess piece
'//  Arguments:	objElement - the object in question
'//  Returns:	true or false
'//  Called by:	SyncPieces
'//				ChangeGameSize
'//				SwapSides
'//				ResetBoard
'//				document_OnClick
'//				document_OnMouseUp
'//				document_OnMouseDown
'////////////////////////////////////////////////////////////////////////
function IsPiece(objElement)
	
	if objElement is nothing then
		IsPiece = false
		exit function
	end if
	
	if objElement.ClassName = "PieceBlk" _
	or objElement.ClassName = "PieceWht" then
		IsPiece = true
	else
		IsPiece = false
	end if
end function


'//////////////////////////////////////////////////////////////////////////
'//  Function:	ToVWCoordX and ToVWCoordY
'//  Purpose:  	To convert the web coords to World coords
'//  Args:		numCoord - web coordinate in numeric form
'//  Returns:	The world equivalent 
'//  Called by:	ResetBoard, document_OnMouseUp
'//////////////////////////////////////////////////////////////////////////
function ToVWCoordX(numCoord)
	if blnSwapped then numCoord = SwapX(numCoord)
	ToVWCoordX = numVWColAX + (((numCoord)/intSquareWd)*numVWSquareX)	
end function

function ToVWCoordY(numCoord)
	if blnSwapped then numCoord = SwapY(numCoord)
	ToVWCoordY = numVWRow8Z - 2*numVWSquareZ + (((numCoord)/intSquareWd)*numVWSquareZ)		
end function


'//////////////////////////////////////////////////////////////////////////
'//  Functions:	ToWebX and ToWebY
'//  Purpose:  	To convert the World coords to web coords
'//  Args:		numCoord - World coordinate in numeric form
'//  Returns:	The web X or Y coord 
'//  Called by:	SyncPieces
'//				HandleUIEvent, for ChessPieceMoved event
'//////////////////////////////////////////////////////////////////////////
function ToWebX(numCoord)
	ToWebX = Cint(intSquareWd*((CInt(10*numCoord)/10 - numVWColAX)/numVWSquareX))
	' if this board is swapped then unswap before sending
	if blnSwapped then ToWebX = SwapX(ToWebX)
end function

function ToWebY(numCoord)
	ToWebY = Cint(((((CInt(10*numCoord)/10) - numVWRow8Z + 2*numVWSquareZ)/numVWSquareZ)*intSquareWd))
	if blnSwapped then ToWebY = SwapY(ToWebY)
end function


'////////////////////////////////////////////////////////////////////////
'//  Sub:		SyncPieces()
'//  Purpose:  	Set all the pieces up on the client as they are in the world
'//  Called by: 
'////////////////////////////////////////////////////////////////////////
sub SyncPieces()
	dim objPiece, objVWPiece, roomFrame, pieceFrame, pos
	' for each web piece, find it's corresponding world piece, and relocate the web piece to match 
	set roomFrame = top.ClientUserPtr.container.getFrame
	for each objPiece in document.all
		if IsPiece(objPiece) then
			set objVWPiece = user.container.findwithin(objPiece.id)
			objPiece.style.pixelLeft = ToWebX(objVWPiece.Position.X)
			objPiece.style.pixelTop = ToWebY(objVWPiece.Position.Z)
			
			set pieceFrame = objVWPiece.getFrame
			set pos = objVWPiece.position
			pieceFrame.setPosition roomFrame, pos.x, pos.y, pos.z
		end if			
	next
	set objPiece = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		ChangeGameSize()
'//  Purpose:  	Size the game according to the size of the right pane.  
'//	 Called by:	NOT USED IN CURRENT VERSION.
'//	 Notes:		Would be called in OnLoad and OnResize.
'////////////////////////////////////////////////////////////////////////
sub ChangeGameSize()

	Pieces.style.display = "none"
	dim intOldWd
	intOldWd = intSquareWd
	dim objElem

	' figure out whether the pane is wider or taller, and set the
	' board square's widths to the next lowest multiple of 10, that will fit
	if document.body.clientWidth <= document.body.clientHeight then
		intSquareWd = CInt(document.body.clientWidth/100)*10
	else
		intSquareWd = CInt(document.body.clientHeight/100)*10
	end if

	' if the size of the pane creates a board that is too small, override it
	if intSquareWd < intMinWd then intSquareWd = intMinWd
	
	' for each piece recalc all properties
	for each objElem in document.all
		if IsPiece(objElem) then
			dim intElemX
			dim intElemY
			intElemX = objElem.style.pixelLeft
			intElemY = objElem.style.pixelTop
			objElem.style.mvBoundary = "0 " & 8*intSquareWd & " " & 12*intSquareWd & " 0"
			objElem.style.pixelTop = intElemY/intOldWd*intSquareWd
			objElem.style.pixelLeft = intElemX/intOldWd*intSquareWd
			objElem.style.width = intSquareWd
			objElem.style.height = intSquareWd
			objElem.style.zIndex = 1
		' recalc the invisible gifs that help hold the width of each
		' square, when the pane is extremely small 	
		elseif objElem.ClassName = "Square3" then
			objElem.style.width = intSquareWd	
		' recalc the discard areas
		elseif objElem.ClassName = "Square4" then
			objElem.style.height = intSquareWd*2
		end if
	next
	Pieces.style.display = "block"
end sub


'//////////////////////////////////////////////////////////////////////////
'//  Functions: SwapX and SwapY
'//  Purpose:  	To convert coords to mirror across both axis
'//  Args:		numCoord - the x or y coordinate
'//  Returns:	The swapped x or y coord
'//  Called by:	SwapSides
'//				document_onMouseUp
'//				ToVWCoordX
'//				ToWebX
'//				ToVWCoordY
'//				ToWebY
'//////////////////////////////////////////////////////////////////////////
function SwapX(numCoord)
	' intColsCt or intRowsCt measures the number of rows or cols on the board,
	' including the discard area
	SwapX = intSquareWd*intColsCt - intSquareWd * (numCoord/intSquareWd) - intSquareWd
end function

function SwapY(numCoord)
	SwapY = intSquareWd*intRowsCt - intSquareWd * (numCoord/intSquareWd) - intSquareWd
end function


'////////////////////////////////////////////////////////////////////////
'//  Sub:		SwapSides
'//  Purpose:  	Turn the board and pieces 180 degrees
'//  Called by:	onClick handler for btnSwapSides
'////////////////////////////////////////////////////////////////////////
sub SwapSides
	' bln to record the current swapped state
	if blnSwapped = 1 then
		blnSwapped = 0
	else 
		blnSwapped = 1
	end if
	dim objElem
	' for every piece, swap the coords to simulate moving the board 180 degrees
	for each objElem in document.all
		if IsPiece(objElem) then
			objElem.style.pixelLeft = SwapX(objElem.style.pixelLeft)
			objElem.style.pixelTop = SwapY(objElem.style.pixelTop)
		end if
	next
	set objElem = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:		ResetBoard
'//  Purpose:  	Restore all pieces to their original positions
'//  Called by:	
'////////////////////////////////////////////////////////////////////////
sub ResetBoard
	dim objVWPiece, objElem, numX, numZ, numY
	
	if m_bGameOn then
		if msgbox("Are you sure you want to reset the board?", vbYesNo+vbQuestion, "Chess") <> vbYes then
			exit sub
		end if
	end if
	
	blnSwapped = false
	for each objElem in document.all
		if IsPiece(objElem) then
		
			numX = (asc(Left(objElem.home,1))-intAscA)*intSquareWd
			numY = (Right(objElem.home,1)+1)*intSquareWd	

			set objVWPiece = top.ClientUserPtr.container.findwithin(objElem.id)

			objElem.style.pixelLeft = numX
			objElem.style.pixelTop = numY

			numX = ToVWCoordX(numX)
			numZ = ToVWCoordY(numY)
			
			objVWPiece.setPosition numX, objVWPiece.OrigY, numZ, top.ClientUserPtr, false
		end if
	next
	
	m_bGameOn = false
	SyncPieces
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub:	 	HandleUIEvent
'//  Purpose:  	To handle the movement of pieces from other clients
'//	 Args:		who  - which piece
'//				what - "ChessPieceMoved" is what we are looking for here
'//				args - args(0): new world x coord
'//					args(1): new world y coord
'//					args(2): new world z coord
'//					args(3): the mover
'//  Called by:	client.htm:theclient_OnUIEvent
'////////////////////////////////////////////////////////////////////////
sub HandleUIEvent(byVal who, what, byVal arrXtras)
	if what = "ChessPieceMoved" then
		dim objMover		' the mover's user/avatar object 
		dim strMover		' the mover's name
		set objMover = arrXtras(3)	
		strMover = objMover.Name
		' if the mover is not the user
		if strMover <> user.name then
			dim objPiece	' the web piece to move
			dim objVWPiece	' the world piece that already moved
			dim intX		' the current X coord
			dim intY		' " " " Y
			dim intDiffX	' the difference between current X and new X
			dim intDiffY	' " " " Y
			set objPiece = document.all.item(who.name)
			set objVWPiece = user.container.findwithin(objPiece.id)
	
			intX = objPiece.style.pixelLeft
			intY = objPiece.style.pixelTop
			intDiffX = ToWebX(arrXtras(0))
			' arrXtras(1) contains the z value
			intDiffY = ToWebY(arrXtras(2))			
			' this adjusts for negative moves
			
			if intX >= intDiffX then 
			 	intDiffX = -(intX - intDiffX)/intMoveDiv
			else			
				intDiffX = (intDiffX - intX)/intMoveDiv
			end if
			if intY >= intDiffY then 
				intDiffY = -(intY - intDiffY)/intMoveDiv
			else
				intDiffY = (intDiffY - intY)/intMoveDiv
			end if
			dim i
			
			'do this multiple times, and increment the move by total move/moves 
			for i = 1 to intMoveDiv
				window.setTimeout "MovePiece " & objPiece.id & "," & (intX+i*intDiffX) & _
				"," & (intY+i*intDiffY), 100*i
			next			

			for i = 1 to intMoveDiv
				MovePiece objPiece, intDiffX, intDiffY
			next			

		else
			strMover = "You"
		end if
		' record the move in the display box
'		divFeedback.innerHTML = strMover & " moved the " & who.name & "."			
	end if
	set objMover = nothing
	set objVWPiece = nothing
	set objPiece = nothing
end sub


'//////////////////////////////////////////////////////////////////////////
'//  Sub:		MovePiece
'//  Purpose:  	Move the piece from where it is to the new coords
'//  Arguments:	objPiece - the piece to move
'//		intNewX - the new X coord
'//		intNewY - the new Y coord
'//  Called by:	HandleUIEvent, for the ChessPieceMoved event
'//////////////////////////////////////////////////////////////////////////
sub MovePiece(objPiece,intX,intY)
	objPiece.style.pixelLeft = intX
	objPiece.style.pixelTop = intY
end sub
