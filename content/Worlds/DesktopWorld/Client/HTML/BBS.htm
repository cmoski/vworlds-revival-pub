<SCRIPT language="VBScript">
Option Explicit

const intTop = 80
const intNewMsgHt = 160 
const adcFetchUpFront = 1
const adcFetchBackground = 2
const adcFetchAsync = 3

const maxMsgSize = 5000
const adcReadyStateLoaded = 2
const adcReadyStateInteractive = 3
const adcReadyStateComplete = 4

const hiColor = "lemonChiffon"
const selectedTopicColor = "#bad2ce"
const topicBlockColor = "#ECF5F5"
const selectedMsgColor = "#bad2ce"
const normalColor = "#FFFFFF"

const strReTitle = "Re:"
const strRowClass1 = "TableRow_Even"
const strRowClass2 = "TableRow_Odd"
const strInitText = "Type your message here."

const arrowRight = "4"	' webding characters
const arrowDown = "6"

dim strRowClass
dim strRowColor
dim BBSServer
dim topicRow
dim msgRow

'////////////////////////////////////////////////////////////////////////
'//  Sub:		window_onLoad
'//  Purpose:	Initialize the page
'////////////////////////////////////////////////////////////////////////
Sub window_onLoad
	set topicRow = Nothing
	set msgRow = Nothing
	BBSServer = top.ClientWorldPtr.bbsServer
	tblAllTopics.dataSrc = ""
	tblAllTopics.dataSrc = "#dsoAllTopics"
	dsoAllTopics.server = BBSServer
	dsoSingleTopic.server = BBSServer

	BBSSave.location = "BBSSave.htm"
	btnAll.Click
	Author.innerHTML = top.ClientUserPtr.Name
end sub

sub window_onresize
	btnAll.Click
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		document_onClick
'//  Purpose:	Handle clicks on elements in the page
'////////////////////////////////////////////////////////////////////////
sub document_onClick
	dim objElem
 	set objElem = window.event.srcElement
	select case objElem.id
	case "topicAuthor", "msgAuthor"
		ShowProfile (objElem.innerText)
	case "topicTitle"
		ButtonClick
	case "msgBrief"
		dsoSingleTopic.recordset.AbsolutePosition = objElem.recordNumber
		ButtonClick
	end select
	set objElem = nothing	
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:  		DoOnMouseOver()
'//  Purpose:  	Highlight a row when the mouse is over it.
'////////////////////////////////////////////////////////////////////////
sub document_OnMouseOver()
	dim objElem, rowElem
	set objElem = window.event.srcElement
	if objElem.className = "tblCell" then 
		set rowElem = objElem.ParentElement
	elseif objElem.ParentElement.className = "tblCell" then
		set rowElem = objElem.ParentElement.ParentElement
	else
		set objElem = nothing
		exit sub
	end if
	if rowElem.style.backgroundColor <> hiColor then					
		rowElem.style.backgroundColor = hiColor
	end if
	set rowElem = nothing
	set objElem = nothing
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:  		DoOnMouseOut()
'//  Purpose:  	Unhighlight a row when the mouse leaves it.
'////////////////////////////////////////////////////////////////////////
sub Document_OnMouseOut()
	dim objElem, rowElem, saveColor
	set objElem = window.event.srcElement
	if objElem.className = "tblCell" then 
		set rowElem = objElem.ParentElement
	elseif objElem.ParentElement.className = "tblCell" then
		set rowElem = objElem.ParentElement.ParentElement
	else
		set objElem = nothing
		exit sub
	end if
	if rowElem.style.backgroundColor <> normalColor then					
		saveColor = rowElem.getAttribute("saveColor")
		if saveColor <> "" then
			rowElem.style.backgroundColor = saveColor
		else
			rowElem.style.backgroundColor = normalColor
		end if
	end if
	set rowElem = nothing
	set objElem = nothing
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		ShowProfile
'//  Purpose:	Show the message author's profile
'//  Arguments:	strAv - the avatar   
'//  Called by:	document_onClick
'////////////////////////////////////////////////////////////////////////
sub ShowProfile (strAv)
	dim strMsg
	if strAv = "Anon." then
		strMsg = "The contributor for this message was anonymous.  The profile cannot be retrieved."
		ShowDialog strMsg, ""	
	else
		dim theAvatar
		'set theAvatar = Nothing
		if strAv <> "" then
			set theAvatar = top.ClientUserPtr.container.findwithin(strAv)
			if theAvatar is Nothing then
				strMsg = strAv & " is no longer an avatar in this world.  The profile cannot be retrieved."
				ShowDialog strMsg, ""	
			else
				' Click the People button, setting CurrentAvatarId so people.htm will know who to display
				top.CurrentAvatarId = theAvatar.id
				top.ClientMainToolsIFrame.btnPeople.click
			end if			
		end if
		set theAvatar = nothing
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		DoRefresh
'//  Purpose:	Refresh the topics list from the database
'//  Called by:	bbsSave.htm:Window_OnLoad
'//  Notes: bbsSave.htm is loaded into a hidden iframe initially. Its window_onLoad
'//			calls DoRefresh which refreshes the topics list. Each time a topic is saved
'//			bbsSave.htm is reloaded, which refreshes the topic list again.
'////////////////////////////////////////////////////////////////////////
sub DoRefresh
	if tblAllTopics.readyState = "complete" then
	    on error resume next
		divAllTopics.style.display = "none"
		divLoading.style.top = intTop
		divLoading.style.display = "block"
		dsoAllTopics.Refresh
	else
		Window.SetTimeout "DoRefresh", 100
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		ShowElem and HideElem
'//  Purpose:	Display or hide an element
'//  Arguments:	objElem: HTML element object  
'//	 Called by:	ButtonClick, SaveMessage
'////////////////////////////////////////////////////////////////////////
sub ShowElem (objElem)
	objElem.style.display = ""
end sub

sub HideElem (objElem)
	objElem.style.display = "none"
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		max
'//  Purpose:	return the larger of two values
'//  Arguments:	val1, val2: variants of compatible types
'//	 Called by:	ButtonClick
'////////////////////////////////////////////////////////////////////////
function max (val1, val2)
	if val1 >= val2 then 
		max = val1
	else
		max = val2
	end if
end function

'////////////////////////////////////////////////////////////////////////
'//  Sub:		ButtonClick
'//  Purpose:	OnClick event handler for buttons, messages and topics
'////////////////////////////////////////////////////////////////////////
sub ButtonClick()
	Select Case Window.Event.srcElement.id
	Case "btnAll"
		ViewTitle.InnerText = "All Messages"
		if divMessage.style.display = "" then HideElem divMessage
		if divNewMessage.style.display = "" then HideElem divNewMessage
		HideElem btnAll
		HideElem btnReply
		ShowElem btnNew
		divAllTopics.style.display = "none"
		divAllTopics.style.height = MsgHt
		divAllTopics.style.top = intTop
		divAllTopics.style.display = "block"
	Case "btnSave"
		ViewTitle.InnerText = "All Messages"
		isAnon.checked = false
		if divMessage.style.display = "" then HideElem divMessage
		if divNewMessage.style.display = "" then HideElem divNewMessage

		HideElem btnAll
		HideElem btnReply
		ShowElem btnNew
		divAllTopics.style.display = "none"
	Case "btnReply"
		ViewTitle.InnerText = "Reply"
		isAnon.checked = false
		if divMessage.style.display = "" then HideElem divMessage
		if divNewMessage.style.display = "" then HideElem divNewMessage
		ShowElem btnAll
		HideElem btnReply
		ShowElem btnNew
		divNewMessage.style.top = intTop
		divNewMessage.style.height = intNewMsgHt
		ShowElem divNewMessage
		divAllTopics.style.height = max(MsgHt - intNewMsgHt - 10, 100)
		divAllTopics.style.top = intTop + intNewMsgHt + 10
		ShowElem divAllTopics
		newIsTopic.value = "false"
		newTopicId.value = CInt(topicRow.firstChild.firstChild.innerText)
		if isAnon.checked then isAnon.click		' default to non-anonymous
		Title.readonly = true
		Title.value = topictopic.innerText
		Content.Value = strInitText
		Content.select
		Content.focus
	Case "btnNew"
		ViewTitle.InnerText = "New Message"
		isAnon.checked = false
		if divMessage.style.display = "" then HideElem divMessage
		ShowElem btnAll
		HideElem btnReply
		HideElem btnNew
		divNewMessage.style.top = intTop
		divNewMessage.style.height = intNewMsgHt
		ShowElem divNewMessage
		divAllTopics.style.display = "none"
		divAllTopics.style.height = max(MsgHt - intNewMsgHt - 10, 100)
		divAllTopics.style.top = intTop + intNewMsgHt + 10
		divAllTopics.style.display = "block"
		ShowElem divAllTopics
		newIsTopic.value = "true"
		newTopicId.value = "0"
		Title.readonly = false
		Title.value = ""
		Title.focus
	Case "topicTitle"
		' collapse the current topic; if it is not the clicked topic then expand the clicked topic
		unExpandTopic
		if window.event.srcElement.parentElement.parentElement is topicRow then
			' we clicked on the current topic, so just collapse it
			set topicRow = Nothing
		else
			' get the TR that contains the clicked element
			set topicRow = window.event.srcElement.parentElement.parentElement
			expandTopic
		end if
	Case "msgBrief"
		' unhighlight the current message row, if any
		if not (msgRow is nothing) then
			msgRow.setAttribute "saveColor",topicBlockColor
			msgRow.style.backgroundColor = topicBlockColor
		end if
		' display the selected message
		ViewTitle.InnerText = "Message"
		divMessage.style.height = max(MsgHt/2 - 10, 100)
		divMessage.style.top = intTop
		ShowElem divMessage
		if divNewMessage.style.display = "" then HideElem divNewMessage
		ShowElem btnAll
		ShowElem btnReply
		ShowElem btnNew
		divAllTopics.style.display = "none"
		divAlltopics.style.height = max(MsgHt/2,100)
		divAllTopics.style.top = intTop + MsgHt/2
		divAllTopics.style.display = "block"
		window.event.srcElement.parentElement.parentElement.setAttribute "saveColor",selectedMsgColor
		set msgRow = window.event.srcElement.parentElement.parentElement
		msgRow.setAttribute "saveColor",selectedMsgColor
		msgRow.style.backgroundColor = selectedMsgColor
		ShowElem divAllTopics
		window.event.srcElement.parentElement.parentElement.scrollIntoView false
	end select
	Content.Value = strInitText
	
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		ExpandTopic
'//  Purpose:	displays a list of messages within a topic
'//	 Called by:	ButtonClick
'////////////////////////////////////////////////////////////////////////
sub ExpandTopic
	dim eventElement
	dim newTable, newRow, newCell, newSpan, findTopicId
	set eventElement = window.event.srcElement
	' the TopicId element is the first SPAN in the first TD in the TR containing the topic
	topicRow.nextSibling.firstChild.firstChild.dataSrc = ""
	topicRow.setAttribute "saveColor",selectedTopicColor
	findTopicId = topicRow.firstChild.firstChild.innerText
	' requery the database to get all messages within this topic;
	' "expandTopic" is the name of a stored query that takes topicID as both of its 2 args. 
	' The queries are stored in c:\winnt\msdfmap_desktopWorld.ini on the BBS webserver.
	dsoSingleTopic.SQL = "expandTopic(" & findTopicId & "," & findTopicId & ")"
	topicRow.nextSibling.firstChild.firstChild.dataSrc = "#dsoSingleTopic"
	dsoSingleTopic.Refresh
	topicRow.firstChild.firstChild.nextSibling.innerText = arrowDown
	topicRow.nextSibling.style.display = ""
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		unExpandTopic
'//  Purpose:	hides the list of messages for the topic
'//	 Called by:	ButtonClick
'////////////////////////////////////////////////////////////////////////
sub unExpandTopic
	' collapse the currently expanded topic, if any
	if not (topicRow is Nothing) then
		topicRow.setAttribute "saveColor",normalColor
		topicRow.style.backgroundColor = normalColor
		topicRow.nextSibling.firstChild.firstChild.dataSrc = ""
		topicRow.nextSibling.style.display = "none"
		topicRow.firstChild.firstChild.nextSibling.innerText = arrowRight
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		tblAllTopics_onreadystatechange
'//  Purpose:	event handler to display the table when it has finished rendering
'////////////////////////////////////////////////////////////////////////
sub tblAllTopics_onreadystatechange
	dim row
	if tblAllTopics.readyState = "complete" then
		divLoading.style.display = "none"
		divAllTopics.style.display = ""
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		MsgHt
'//  Purpose:	Return the vertical space available for the topic list area
'//	 Called by:	ButtonClick, SaveMessage
'////////////////////////////////////////////////////////////////////////
function MsgHt()
	MsgHt = document.body.offsetHeight - 90
end function

'////////////////////////////////////////////////////////////////////////
'//  Sub:		isAnon_onPropertyChange
'//  Purpose:	Event handler to toggle the author input between author's name and Anonymous
'//	 Called by:	user checking or unchecking the isAnon box
'////////////////////////////////////////////////////////////////////////
sub isAnon_onPropertyChange
	if isAnon.checked then 
		Author.innerHTML = "Anon."		
	else
		Author.innerHTML = top.ClientUserPtr.Name
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		SaveMessage
'//  Purpose:	onclick event handler for btnSave button; save a message to the db
'//	 Called by:	user clicking on the btnSave button
'////////////////////////////////////////////////////////////////////////
sub SaveMessage
	if Trim(Title.value) = "" or Trim(Content.value) = "" or Trim(Content.value) = strInitText then
		dim strMsg
		strMsg = "You must fill in all fields to submit a message."
		ShowDialog strMsg, ""
		exit sub
	end if
 	dim objSaveFrm
	set objSaveFrm = document.frames(0).Form1
	objSaveFrm.Title.value = Trim(WordBreak(Title.value,16))
	objSaveFrm.Content.value = replace(Trim(WordBreak(ParseURLs(Content.value),30)), vbCrLf, "<br>")
	objSaveFrm.Author.value = Author.innerHTML
	objSaveFrm.IsTopic.value = newIsTopic.value
	objSaveFrm.TopicId.value = newTopicId.value
	objSaveFrm.submit()
	Content.value = ""
	Title.value = ""
 	btnAll.click

	ViewTitle.InnerText = "All Messages"
	HideElem divNewMessage
	HideElem btnAll
	HideElem btnReply
	ShowElem btnNew
	divAllTopics.style.height = MsgHt
	divAllTopics.style.top = intTop
	divAllTopics.style.display = "none"

	set topicRow = nothing
	set objSaveFrm = nothing
end sub 

'////////////////////////////////////////////////////////////////////////
'//  Sub:		Content_OnFocus
'//  Purpose:	Select the entire content text when focused
'//	 Called by:	user clicking on or tabbing to the Content field
'////////////////////////////////////////////////////////////////////////
sub Content_OnFocus
	if Trim(Content.value) = strInitText then
		Content.select
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub:		checkContentLength
'//  Purpose:	onChange event handler for the Content field; validates the content length
'//	 Called by:	user changing data in the Content field and exiting the field
'////////////////////////////////////////////////////////////////////////
sub checkContentLength
	if len(Content.value) >= maxMsgSize then
		msgbox "Your message cannot exceed " & maxMsgSize & " characters."
		Content.value = left(Content.value,maxMsgSize)
	end if
end sub

</script>
