<script language=vbs>
option explicit

'//////////////////////////////////////////////////////////////////////////
'////  Global constants (to this file)
'//////////////////////////////////////////////////////////////////////////
const strBtnBehavior = "url(../htc/DialogButtons.htc)"
const strSelectedBorderStyle = "2px solid #4977F9"	
const strNormalBorderStyle = "2px solid #BBD1D0"

'//////////////////////////////////////////////////////////////////////////
'////  Global Variables (to this file)
'//////////////////////////////////////////////////////////////////////////
dim ColorTable()
dim bColorPickerActive	' true if the user selected a bodypart to colorize
dim blnOnPicker 	' is the click on the picker
dim intPickerTp		' the top edge of the picker
dim intPickerLt		' " " " left
dim intPickerRt		' " " " right
dim intPickerBtm	' " " " bottom
dim strAvModel
dim world
dim user
dim arrMoods
dim arrMoodInts
dim arrMoodGifs
dim intSwatchZOrd
dim strSelectedBodyPart
dim blnChange
dim blnModelFocus
dim blnMoodFocus
dim elem
dim doingLabel

set world = top.ClientWorldPtr
set user = top.ClientUserPtr
strSelectedBodyPart = ""
intSwatchZOrd = 100

' moods must correspond to moods.spr 
arrMoods = array("None","Cheerful","Fair","Melancholy","Upset")
arrMoodGifs = array("","happy","neutral","sad","angry")
arrMoodInts = array(0,1,2,4,5)


'////////////////////////////////////////////////////////////////////////
'//  Sub:  		Window_onLoad
'//  Purpose:   Initializing dynamic elements on the page
'////////////////////////////////////////////////////////////////////////
sub Window_onLoad()
	CreateColorTable
	DoPosition
	bColorPickerActive = false
	' get the current avatar model, based on the name of the hair geometry file
	setModel top.getAvatarModelName(user)
	LoadAvList
	LoadMoodList

	LoadPart(user.Shoes)
	LoadPart(user.Pants)
	LoadPart(user.Shirt)
	LoadPart(user.Skin)
	LoadPart(user.Hair)

	LoadPresets "shirt"
	window_onresize
	ChangeMood
	blnChange = false
	RevertButton.tabIndex = 0
	ApplyButton.tabIndex = 0
	NameLabel.innerHTML = user.name
	selModels.focus
end sub

sub window_onresize
	window.setTimeout "DoPosition", 100, "VBScript"
	bColorPickerActive = false
end sub

'////////////////////////////////////////////////////////////////////////
'//  Subs: 		document_onMouseDown
'//  Purpose:   Make the colorpicker active to enable mouse motion trapping,
'//				or select an item to colorize
'////////////////////////////////////////////////////////////////////////
sub document_onMouseDown
	if window.event.srcElement.id = "ColorPicker" then 
		' mouse pressed on the colorpicker
		bColorPickerActive = true
	elseif (instr(window.event.srcElement.id, "Swatch") = 0) _
	  and (instr(window.event.srcElement.id, "Preset") = 0) then
		' mouse is somewhere other than a swatch, color preset or color picker
		bColorPickerActive = false
		strSelectedBodyPart = ""
		SetSwatchBordersNormal
	elseif window.event.srcElement.id = "NameLabelBox" then
		bColorPickerActive = true
	end if
end sub

'////////////////////////////////////////////////////////////////////////
'//  Subs: 		document_onMouseUp
'//  Purpose:   Deactivate the colorpicker; stops trapping of mouse movement
'////////////////////////////////////////////////////////////////////////
sub document_onMouseUp
	if bColorPickerActive then bColorPickerActive = false
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		document_onMouseMove
'//  Purpose:   Colorize the currently selected item according to the mouse position
'////////////////////////////////////////////////////////////////////////
sub document_onMouseMove
	if bColorPickerActive then GetPickerColor
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		document_onKeyPress
'//  Purpose:   Hitting return is the same as pressing the apply btn
'////////////////////////////////////////////////////////////////////////
sub document_onKeyPress
	if window.event.keycode = 13 then ApplyChanges
end sub


'////////////////////////////////////////////////////////////////////////
'//  Subs: 		document_onDragStart
'//  Purpose:   Prevent the user from dragging items on this page
'////////////////////////////////////////////////////////////////////////
sub document_onDragStart
	window.event.returnValue = false
end sub

'////////////////////////////////////////////////////////////////////////
'//  Functions: RedPart and BluePart and GreenPart
'//  Purpose:	Chops up the 6 digit RGB value into the selected part
'//  Arguments:	strColor
'//  Returns:	The appropriate 2 digits
'//	 Called by:	UpdateColor
'//				PresetClick
'//				LoadPart
'//				ApplyChanges
'////////////////////////////////////////////////////////////////////////
function RedPart(strColor)
	if len(strColor) > 6 then strColor = right(strColor, 6)
	RedPart = left(strColor, 2)
end function

function GreenPart(strColor)
	if len(strColor) > 6 then strColor = right(strColor, 6)
	GreenPart = mid(strColor, 3, 2)
end function

function BluePart(strColor)
	if len(strColor) > 6 then strColor = right(strColor, 6)
	BluePart = right(strColor, 2)
end function


'////////////////////////////////////////////////////////////////////////
'//  Functions:	GetHex and GetDecimal
'//  Purpose:   Handles regular to hex numbers or hex to dec
'//  Arguments: numColor - the colors dec or hex number 
'//  Returns:	The value in hex or dec
'//	 Called by:	avatarSampler_onClick
'//				loadPresets
'//				loadPart
'////////////////////////////////////////////////////////////////////////
function GetHex(numColor)
	GetHex = Hex(numColor)
	' add leading 0's if too few digits
	if len(GetHex) < 6 then GetHex = string(6-len(GetHex),"0") & GetHex
	' swap first and last pairs of hex chars for a color value
	GetHex = mid(GetHex,5,2) & mid(GetHex,3,2) & mid(GetHex,1,2)
end function

function GetDecimal(numColor)
	GetDecimal = CInt("&H" & numColor)
end function


'////////////////////////////////////////////////////////////////////////
'//  Sub:  		UpdateColor
'//  Purpose:   To change the selected part to that color
'//  Args:		numColor - the color in hex format
'//  Called by:	PresetClick
'//				GetPickerColor
'////////////////////////////////////////////////////////////////////////
sub UpdateColor(numColor)
	if strSelectedBodyPart > "" then
		document.all("sampler" & strSelectedBodyPart).filters.Light.changeColor 0, GetDecimal(RedPart(numColor)), GetDecimal(GreenPart(numColor)), GetDecimal(BluePart(numColor)), true
		document.all.item("swatch" & strSelectedBodyPart).style.background = numColor
		blnChange = True
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		SetSwatchBordersNormal
'//  Purpose:   Set all swatch borders to normal style
'//  Args:		none
'//  Called by:	SwatchClick
'//				NameLabelBox_onClick
'//				document_onMouseDown
'////////////////////////////////////////////////////////////////////////
sub SetSwatchBordersNormal
	HairSwatchDiv.style.border = strNormalBorderStyle
	SkinSwatchDiv.style.border = strNormalBorderStyle 
	ShirtSwatchDiv.style.border = strNormalBorderStyle
	PantsSwatchDiv.style.border = strNormalBorderStyle
	ShoesSwatchDiv.style.border = strNormalBorderStyle
	NameLabelBox.style.border = strNormalBorderStyle
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		SwatchClick
'//  Purpose:   To highlight the swatch box for the part selected
'//  Args:		strPart
'//  Called by:	onClick handler for HairSwatchDiv, SkinSwatchDiv, etc
'////////////////////////////////////////////////////////////////////////
sub SwatchClick(strPart)
    dim theElement, theColor
	set theElement = document.all.item(strPart & "SwatchDiv")
	doingLabel = false
	if (strPart <> "Moods") then
		SetSwatchBordersNormal
		strSelectedBodyPart = strPart
		TheColor = theElement.style.backgroundColor
		theElement.style.border = strSelectedBorderStyle
		theElement.style.zIndex = intSwatchZOrd
		intSwatchZOrd = intSwatchZOrd + 1
		if strPart = "Character" then
			if not blnModelFocus then
				selModels.focus
			end if
		elseif strPArt = "Moods" then
			if not blnMoodFocus then
				selMoods.focus
			end if
		else
			LoadPresets (strSelectedBodyPart)
		end if
	end if
end sub

'//		the color picker to select a color for the in-world avatar name label.
'//
'////////////////////////////////////////////////////////////////////////
sub avatarSampler_onClick
	dim labelColor
	if window.event.ctrlKey and window.event.shiftKey then
		if NameLabelBox.style.display = "none" then
			set labelColor = user.hair.labelFontColor	
			NameLabel.style.color = getHex(labelColor.x * 255 + labelColor.y * 255 * 256 + labelColor.z * 255 * 65536)
			NameLabelBox.style.display = ""
		else
			NameLabelBox.style.display = "none"
			doingLabel = false
		end if
	end if
end sub

sub NameLabelBox_onClick
	SetSwatchBordersNormal
	doingLabel = true
	NameLabelBox.style.border = strSelectedBorderStyle
end sub

'////////////////////////////////////////////////////////////////////////
'//  Sub: 		PresetClick
'//  Purpose:   To update the color when clicking on a preset cell 
'//  Called By:	Clicking on one of the color presets (the cluster of 4 small color squares)
'////////////////////////////////////////////////////////////////////////
sub PresetClick()
    dim theColor
	if strSelectedBodyPart <> "" then
		TheColor = window.event.srcElement.style.backgroundColor
	    document.all("sampler" & strSelectedBodyPart).filters.Light.changeColor 0, GetDecimal(RedPart(TheColor)), GetDecimal(GreenPart(TheColor)), GetDecimal(BluePart(TheColor)), true
		UpdateColor TheColor
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		ColorPickerClick
'//  Purpose:   calls GetPickerColor
'//  Called by:	clicking on the colorPicker
'////////////////////////////////////////////////////////////////////////
sub ColorPickerClick()
	bColorPickerActive = false 
	GetPickerColor
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		GetPickerColor
'//  Purpose:   gets the color at the current mouse position over the colorPicker
'//  Called by:	ColorPickerClick, and onMouseMove while over the colorPicker
'////////////////////////////////////////////////////////////////////////
sub GetPickerColor()
	dim intMouseX, intMouseY
	intMouseX = window.event.x
	intMouseY = window.event.y
	dim NewColor
	if intMouseX >= intPickerLt _
	  and intMouseX < intPickerRt _
	  and intMouseY >= intPickerTp _
	  and intMouseY < intPickerBtm then
		if strSelectedBodyPart > "" then
			NewColor = ColorTable((intMouseX - intPickerLt)/2, (intMouseY - intPickerTp)/.7)
			document.all("swatch" & strSelectedBodyPart).style.backgroundColor = NewColor
			UpdateColor NewColor
		elseif doingLabel then
			NewColor = ColorTable((intMouseX - intPickerLt)/2, (intMouseY - intPickerTp)/.7)
			nameLabel.style.Color = NewColor
			blnChange = true
		end if
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		LoadPresets
'//  Purpose:   To 
'//  Args:		cellNum
'//  Notes:		Set the color presets for the currently selected body part.
'//  world.avatarModels is a propertyMap containing a color list for each avatar model.
'//  Each color list contains 25 body part colors in groups of 5:
'//	 0-4=shoes, 5-9=Pants, 10-14=Shirt, 15-19=Skin, 20-24=Hair
'//  Each group consists of a default color and 4 presets:
'//  shoes: 0 = default, 1-4 = presets, pants: 5 = default, 6-9 = presets, etc.	
'//  Called by:	window_onLoad
'//				changeAvatar
'//				swatchClick
'////////////////////////////////////////////////////////////////////////
sub LoadPresets (bodyPartName)
	dim colorList, defaultColorPos, n
	defaultColorPos = world.bodyPartNames.find(LCase(bodypartName)) * 5
	set colorList = world.avatarModels.property("Colors" & strAvModel)
	for n = 1 to 4
		document.all.item("colorPreset" & n).style.backgroundColor = getHex(colorList.property(defaultColorPos + n))
	next
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		LoadPart
'//  Purpose:   Loads a part of the avatar, (i.e. shirt, hear, etc..)
'//  Args:		objPart
'//  Called by:	window_onLoad
'////////////////////////////////////////////////////////////////////////
sub LoadPart (objPart)
	dim objSwatch,sampler
	set objSwatch = document.all.item("Swatch" & objPart.partName)
	objSwatch.style.backgroundColor = GetHex(objPart.Color)
	objSwatch.style.borderTopColor = "345a59"
	objSwatch.style.borderLeftColor = "345a59"
	objSwatch.style.borderRightColor = "ffffff"
	objSwatch.style.borderBottomColor = "ffffff"
	set sampler = document.all.item("sampler" & objPart.partName)
	sampler.filters.Light.addAmbient 255, 255, 255, 255
	sampler.filters.Light.changeColor 0, GetDecimal(RedPart(objSwatch.style.backgroundColor)), GetDecimal(GreenPart(objSwatch.style.backgroundColor)), GetDecimal(BluePart(objSwatch.style.backgroundColor)), true
	set sampler = nothing
	set objSwatch = nothing
end sub



'////////////////////////////////////////////////////////////////////////
'//  Sub: 		DoPosition
'//  Purpose:   places everything correctly
'//  Called by:	window_onLoad
'//				window_onResize
'////////////////////////////////////////////////////////////////////////
sub DoPosition
	dim colorpicker
	set colorpicker = document.all.item("ColorPicker")

	intPickerTp = ColorPicker.offsetParent.offsetTop + ColorPicker.offsetTop
	intPickerLt = ColorPicker.offsetParent.offsetLeft + ColorPicker.offsetLeft
	intPickerRt = intPickerLt + ColorPicker.style.pixelWidth
	intPickerBtm = intPickerTp + ColorPicker.style.pixelHeight

	SamplerHair.style.zIndex = -10
	SamplerSkin.style.zIndex = -9
	SamplerShirt.style.zIndex = -8
	SamplerPants.style.zIndex = -7
	SamplerShoes.style.zIndex =  -6
	MoodIcon.style.zIndex = -5
	set colorpicker = nothing
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		LoadAvList
'//  Purpose:   load the list of avatars
'//  Called by:	window_onLoad
'////////////////////////////////////////////////////////////////////////
sub LoadAvList
	dim elem, item, modelName, modelArray(20), modelCount, n, m, stTemp, smallest
	modelCount = 0
	
	' Get the existing model names from the color list names "ColorsXXXXX" in avatarModels
	for each item in world.avatarModels
		if mid(item,1,6) = "Colors" then
			modelArray(modelCount) = mid(item,7,255)
			modelCount = modelCount + 1
		end if
	next
	set item = nothing
	
	' sort them alphabetically
	for n = 0 to modelCount - 1
		' find the smallest from where we are to the end of the array
		smallest = n
		for m = n+1 to modelCount - 1
			if LCase(modelArray(m)) < LCase(modelArray(smallest)) then smallest = m
		next
		' switch the smallest and the one where we are 
		stTemp = modelArray(n)
		modelArray(n) = modelArray(smallest)
		modelArray(smallest) = stTemp
	next
	
	' add them to the dropdown
	for n = 0 to modelCount - 1
		set elem = document.CreateElement("OPTION")
		elem.value = modelArray(n)
		elem.text = modelArray(n)
		' select the current model
		if LCase(elem.value) = LCase(strAvModel) then elem.selected = true
		selModels.add elem
		set elem = nothing
	next
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		LoadMoodList
'//  Purpose:   To populate the mood select list 
'//  Called by:	window_onLoad
'////////////////////////////////////////////////////////////////////////
sub LoadMoodList
	dim elem, n
	for n = 0 to ubound(arrMoods)
		set elem = document.CreateElement("OPTION")
		elem.value = arrMoodInts(n)
		elem.text = arrMoods(n)
		elem.setAttribute "gifName", arrMoodGifs(n)
		' select the current mood
		if LCase(CStr(arrMoodInts(n))) = Lcase(user.mood.CurrentMood) then elem.selected = true
		selMoods.add elem
		set elem = nothing
	next
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		SetModel
'//  Purpose:   To change the gifs for the avatar model 
'//  Called by:	window_onLoad
'//				changeAvatar
'////////////////////////////////////////////////////////////////////////
sub SetModel (strModel)
	strAvModel = strModel
	model1.src = top.AvatarGifPath & strAvModel & "1static.gif"
	model2.src = top.avatarGifPath & strAvModel & "2static.gif"
	model3.src = top.avatarGifPath & strAvModel & "3static.gif"
	model4.src = top.avatarGifPath & strAvModel & "4static.gif"
	model5.src = top.avatarGifPath & strAvModel & "5static.gif"
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		ChangeAvatar
'//  Purpose:   To change the avatar graphics
'//  Called By:	selModels_OnChange
'////////////////////////////////////////////////////////////////////////
sub ChangeAvatar	
	SetModel selModels.options.item(selModels.selectedIndex).value
	if strSelectedBodyPart <> "" then LoadPresets (LCase(strSelectedBodyPart))
	blnChange = true
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		ChangeMood
'//  Purpose:   To change the mood graphics
'//  Called By:	selMoods_OnChange
'////////////////////////////////////////////////////////////////////////
sub ChangeMood	
	dim moodValue
	moodValue = selMoods.options.item(selMoods.selectedIndex).value
	if moodValue = 0 then
		MoodIcon.style.display = "none"	
	else
		imgMood.src = "../images/Mood_" & selMoods.options(selMoods.selectedIndex).getAttribute("gifName") & ".gif"
		MoodIcon.style.display = ""
	end if
	blnChange = true
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		ApplyChanges
'//  Purpose:   To apply changes to the actual avatar
'//  Called By:	Apply Button onClick
'////////////////////////////////////////////////////////////////////////
sub applyChanges
	dim strMsg
	dim HairColor, SkinColor, ShirtColor, PantsColor, ShoesColor
	if blnChange then
		HairColor = RGB(GetDecimal(RedPart(SwatchHair.style.backgroundColor)), GetDecimal(GreenPart(SwatchHair.style.backgroundColor)), GetDecimal(BluePart(SwatchHair.style.backgroundColor)))
		SkinColor = RGB(GetDecimal(RedPart(SwatchSkin.style.backgroundColor)), GetDecimal(GreenPart(SwatchSkin.style.backgroundColor)), GetDecimal(BluePart(SwatchSkin.style.backgroundColor)))
		ShirtColor = RGB(GetDecimal(RedPart(SwatchShirt.style.backgroundColor)), GetDecimal(GreenPart(SwatchShirt.style.backgroundColor)), GetDecimal(BluePart(SwatchShirt.style.backgroundColor)))
		PantsColor = RGB(GetDecimal(RedPart(SwatchPants.style.backgroundColor)), GetDecimal(GreenPart(SwatchPants.style.backgroundColor)), GetDecimal(BluePart(SwatchPants.style.backgroundColor)))
		ShoesColor = RGB(GetDecimal(RedPart(SwatchShoes.style.backgroundColor)), GetDecimal(GreenPart(SwatchShoes.style.backgroundColor)), GetDecimal(BluePart(SwatchShoes.style.backgroundColor)))
		user.setBodyColors HairColor, SkinColor, ShirtColor, PantsColor, ShoesColor, selMoods.options.item(selMoods.selectedIndex).value
		user.setAvatarModel selModels.options.item(selModels.selectedIndex).value
		user.mood.CurrentMood = selMoods.options.item(selMoods.selectedIndex).value
		if doingLabel then user.hair.labelFontColor.set GetDecimal(RedPart(NameLabel.style.color))/255, GetDecimal(GreenPart(NameLabel.style.color))/255, GetDecimal(BluePart(NameLabel.style.color))/255
		blnChange = false
		strMsg = "Your changes have been applied."
		ShowDialog strMsg, ""	
	else		
		strMsg = "You have not made any changes to your Avatar's appearance."
		ShowDialog strMsg, ""	
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		ResetChanges
'//  Purpose:   To cancel changes to the avatar and reset to the previous save
'//  Called By:	Reset button onClick
'////////////////////////////////////////////////////////////////////////
sub ResetChanges
	if blnChange then
		document.location = document.location
		blnChange = false
	else
		dim strMsg
		strMsg = "You have not made any changes to your Avatar's appearance."
		ShowDialog strMsg, ""	
	end if
end sub


'////////////////////////////////////////////////////////////////////////
'//  Sub: 		CircularTab
'//  Purpose:   Capture the tab keystroke to keep focus on this page
'//	 Called by:	key click while the Apply button has focus;
'//	 Notes: the Apply button is the last control in the tab order;
'//		when the user presses the Tab key while the Apply button has focus
'//		we focus on selModels, the first control in the tab order.
'////////////////////////////////////////////////////////////////////////
sub CircularTab
	if (window.event.keyCode = 9) then		' tab key
		window.event.returnValue = false
		selModels.focus
	end if
end sub
