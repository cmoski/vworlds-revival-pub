'//  Description:	Allows a single player to play SwapSides.
'//  System:		Desktop World

<html>
<head>
<TITLE>Game: SwapSides</TITLE> 

<link rel=stylesheet href=../shared/global.css>

<!--include scripts-->
<script language="vbscript" src="../vbs/document_OnSelectStart.vbs">
</script>
<!--end include scripts-->

<script language="vbscript">

dim freeCellNum, nMoves

sub window_onLoad
	resetGame
end sub

sub resetGame
	' for each image tag, if it is not in the right cell remove it and put it where it belongs
	dim n, cell, img
	for n = 1 to 7
		set cell = document.all("cell_" & n)
		set img = document.all("img_" & n)
		if not (img.parentElement is cell) then
			set img = img.removeNode
			cell.insertAdjacentElement "BeforeEnd", img
		end if
	next
	freeCellNum = 4
	nMoves = 0
	moveCount.innerHTML = "Number of moves: 0"
end sub

sub cellClick
	' move to the free cell if the clicked cell is 1 or 2 cells away from it
	dim cell, cellNum, distanceFromFreeCell, img
	if window.event.srcElement.tagName <> "IMG" then exit sub	' ignore clicks on table borders etc 
	set cell = window.event.srcElement.parentElement	' the td containing the img
	cellNum = CInt(mid(cell.id,6,1))
	if cellNum = freeCellNum then exit sub
	distanceFromFreeCell = abs(cellNum - freeCellNum)
	if (distanceFromFreeCell = 1) or (distanceFromFreeCell = 2) then
		' swap the spacer image and the game piece image
		set img = document.all("img_4")
		cell.insertAdjacentElement "BeforeEnd", img
		set img = window.event.srcElement.removeNode
		set cell = document.all("cell_" & freeCellNum)
		cell.insertAdjacentElement "BeforeEnd", img
		freeCellNum = cellNum
		nMoves = nMoves + 1
		document.all("moveCount").innerHTML = "Number of moves: " & nMoves
	end if
	if isGameOver then 
		document.all("moveCount").innerHTML = "You finished in " & nMoves & " moves."
		if nMoves = 15 then document.all("moveCount").insertAdjacentHTML "AfterBegin", "<B>WAY TO GO !!!</B> "
	end if
end sub

function isGameOver
	' Compare img numbers with cell numbers.
	' Game is over if all low-numbered images are in high-numbered cells and vice versa.
	dim n, loc
	isGameOver = false
	for n = 1 to 3
		if CInt(mid(document.all("img_" & n).parentElement.id,6,1)) < 5 then exit function
	next
	for n = 5 to 7
		if CInt(mid(document.all("img_" & n).parentElement.id,6,1)) > 3 then exit function
	next
	isGameOver = true
end function

</script>
</head>
<body bgcolor=#FFFFFF>

<!--Start Heading Section-->
<div id=bkgPageHeadingPatch
	class=bkgPageHeadingPatch>
</div>
<div id=bkgPageHeading
	class=bkgPageHeading
	style="background-image:url(../images/bkgGameRoom.gif);">
</div>

<span id=groupName class=PageHeading>Swap Sides</span>
<hr class=PageHeadingHR>


<!--CONTENT AREA-->

<div class=ParaText>
Move all bears to the right and all cakes to the left in <B>15 moves</B>, by moving items into the
empty space. <br>
Click an item to move it. Pieces can move sideways one square or can jump over one piece.
</div>
<div id=moveCount class=ParaText style="position:relative;"></div>
<div class=ParaText align=center style="position:relative;">
	<table border=1 cellspacing=2><tr>
		<td id="cell_1" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_1" src="../Images/gift_tbear.gif"></td>
		<td id="cell_2" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_2" src="../Images/gift_tbear.gif"></td>
		<td id="cell_3" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_3" src="../Images/gift_tbear.gif"></td>
		<td id="cell_4" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_4" src="../Images/spacer.gif"></td>
		<td id="cell_5" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_5" src="../Images/gift_cake.gif"></td>
		<td id="cell_6" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_6" src="../Images/gift_cake.gif"></td>
		<td id="cell_7" align=center style="width:40;height:40;" onClick="cellClick"><img id="img_7" src="../Images/gift_cake.gif"></td>
	</tr></table>
</div>

<div class=ParaText align=center>
<input id=btnNewGame type=BUTTON value="New Game" onClick=resetGame>
</div>
