sub Window_OnLoad
	iCountPrevWords = 0
	prevwords = ""
	
 	Startup
end sub

sub startup

	iCountPrevWords = iCountPrevWords + 1
	if iCountPrevWords = (NUM_WORDS-1) then	'fix/hack for end of words condition 'a-jclegg, the -1 is for safefy. i don't have time to test it
		prevwords = ""
		iCountPrevWords = 0
	end if

	do  
	    answer = GetWord()
	loop until InStr(prevwords,answer) = 0 
	prevwords = prevwords & "," & answer
	
    fill_frames Len(answer)
end sub

sub restart
    restore_captions
    guessed = ""
    next_cell = 1
    num_filled = 0
    startup
    'divNumFilled.innerHTML = num_filled															'''******DEBUG*******

	Pic.src = "../images/s1.gif"

		else
			current_string = current_string & "_ "
		end if
    Next

' writes the underscore characters

function return_next_cell()
    next_cell = next_cell + 1
    return_next_cell =  CStr(next_cell) & ".gif"
end function

sub fill_letters(ByVal pos, ByVal letter)
	'fillletters.innerHTML =  current_string
    do
        if pos = 1 then
            current_string = letter & mid(current_string,2)
        else
            current_string = Left(current_string,(2*pos-2)) & letter & mid(current_string,(2*pos))
        end if

        num_filled = num_filled + 1
        pos = Instr(pos + 1, LCase(answer), letter)
    Loop Until pos = 0
    'divCurrentString.innerHTML = current_string
    'divNumFilled.innerHTML = num_filled
    
end sub

sub guess(ByVal letter)
    dim pos

	'this is an end game condition.
	if guessed = "abcdefghijklmnopqrstuvwxyz" then
		exit sub
	end if 
    If Instr(guessed,letter) Then 
		msgbox "Error: Letter was already picked, this should never happen"
        Exit Sub
    end if
        
    guessed = guessed & letter
    erase_caption letter

    pos = Instr(LCase(answer), letter)
    If pos Then
        fill_letters pos, letter
		If num_filled = Len(answer) Then 
            end_game 1
        Else
			ReplaceMe.innerHTML = current_string
        end if
    Else
		Pic.src = "../images/S" & return_next_cell
        If next_cell = 7 Then 
            end_game 0
        End If
    End If
end sub

sub end_game (ByVal winner)
    If winner Then
   		num_won = num_won + 1
		ReplaceMe.innerHTML = answer & "<BR>you win!"
    else    
        num_lost = num_lost + 1
	 	ReplaceMe.innerHTML = "you lost!<BR>(" & answer & ")"
    End If

	ReplaceMe2.innerHTML = "won:&nbsp " & num_won & "&nbsp &nbsp lost:&nbsp " & num_lost
    guessed = "abcdefghijklmnopqrstuvwxyz"
end sub
