<html>
<head>
<TITLE>Login to Chess World - JScript Version</TITLE>

<SCRIPT LANGUAGE="jscript">

//////////////////////////////////////////////////////////////////////////
//  Global variables (local to this file)
//////////////////////////////////////////////////////////////////////////
var strClient = "Client_JS.htm";			// the client page to transfer to 
var strUserInp = "<username>";				// the default for the username input
var strWorldInp = "localhost/<worldname>";	// the default for the server and world name input


//////////////////////////////////////////////////////////////////////////
//  Function:	WinOnLoad
//  Purpose:  	To set the default values for the inputs
//////////////////////////////////////////////////////////////////////////
function WinOnLoad()
{
	txtWorld.value = strWorldInp;
	txtUser.value = strUserInp;
}


//////////////////////////////////////////////////////////////////////////
////  Function:	 	Login
////  Purpose:  	Connect the client to the world and login the user
//////////////////////////////////////////////////////////////////////////
function Login()
{
	// check the inputs
	if ((txtWorld.value == "")
	|| (txtUser.value == "")
	|| (txtWorld.value == strWorldInp)
	|| (txtUser.value == strUserInp))
	{
		alert("The provided server, world or user names are incorrect. "
			+ "  Please reenter the names and try again.");
		return false;
	}
	document.location = strClient + "?" + txtWorld.value + "&" + txtUser.value;
}

</SCRIPT>
</head>
<body onLoad="WinOnLoad();">
<font face="verdana, arial" size=4>
	<b>Login to Chess World - Jscript Version</b>
</font>
<br>
<table width=400>
	<tr>
		<td width=300>
			<font face="verdana, arial" size=2>
				<b>Server & World Names:</b>
			</font>
		</td>
		<td width=100>
			<input id="txtWorld" type=text value="">
		</td>
	</tr>
	<tr>
		<td>
			<font face="verdana, arial" size=2>
				<b>User Name:</b>
			</font>
		</td>
		<td>
			<INPUT ID="txtUser" type=text value="">
		</td>
	</tr>
	<tr>
		<td colspan=2>
			<font face="verdana, arial" size=3>
		  		Please enter a worldname and username for your sample world.  Note that the Virtual
				Worlds server must be running either locally ("localhost") or remotely ("&lt;servername&gt;")
				to login the world.			
			</font>
			<div align=center>
				<input id=btnLogin type=button value="Login" onClick="Login();">
			</div>
		</td>
	</tr>
</table>
<br>

</body>
</html>
