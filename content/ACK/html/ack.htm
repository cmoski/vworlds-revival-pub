' *************************** LIBRARY ************************* '
sub RepaintLibraryList
	dim i

	LibraryListView.ClearImages
	if LibraryImageList.CountImages > 0 then
		for i = 0 to LibraryImageList.CountImages - 1
			LibraryListView.AddImage i, CStr(i + 1) & "/" & CStr(LibraryImageList.CountImages)
		next
	end if
end sub

sub LibraryListView_mouseDownOnImage(whichImage)
	LibraryListView.CurrentImage = whichImage
end sub

sub DoLibraryLoad
	dim newname, count, i, numExisting

	if DefaultPath <> "" then
		newname = LoadImageList.dlgchooseimage (DefaultPath & "*.gif", false)
	else
		newname = LoadImageList.dlgchooseimage (DefaultPath, false)
	end if

	if newname <> "" then
		LoadImageList.ImageFile = newName
		count = LoadImageList.CountImages
		if count < 1 then
		    msgbox "Invalid gif file!", vbExclamation, sMsgTitle 'same error for gesture view
			'msgbox newName & vbcrlf & "This file contains no images or is invalid!", vbExclamation, sMsgTitle
		else
			numExisting = LibraryImageList.CountImages
			for i = 0 to count - 1
				LibraryImageList.AddImage LoadImageList.ImageList, i
			next
			RepaintLibraryList
			LibraryListView.CurrentImage = LibraryListView.CurrentImage +1
			LibScrolltoImage numExisting +1,TOP_ROW
			fLibLoaded = true
			SetLiveHelp 2
			LibraryFullMenu
			DefaultPath = "" 'will not overide user set folder
		end if
	end if
end sub

sub DoLibAvatarLoad
	dim newname, i, numExisting

	if DefaultPath <> "" then
		newname = LoadAvatar.DlgChooseAvatar (DefaultPath & "*.spr", false)
	else
		newname = LoadAvatar.DlgChooseAvatar (DefaultPath, false)
	end if

	if newname <> "" then	'check for cancel of dialog
		if LoadAvatar.SetSpriteFilename(newName) = true then
			LoadImageList.ImageFile = LoadAvatar.ImageFilename
			if LoadImageList.CountImages < 1 then
			    msgbox "Invalid gif file!", vbExclamation, sMsgTitle 'same error for gesture view
				'msgbox newName & vbcrlf & "This file contains no images or is invalid!", vbExclamation, sMsgTitle
			else
				numExisting = LibraryImageList.CountImages
				for i = 0 to LoadImageList.CountImages - 1
					LibraryImageList.AddImage LoadImageList.ImageList, i
				next
				RepaintLibraryList
				LibScrolltoImage numExisting +1,TOP_ROW
				fLibLoaded = true
				SetLiveHelp 2
				LibraryFullMenu
				DefaultPath = "" 'will not overide user set folder
			end if
		else
			' handle error case
			msgbox "Failed to load avatar!", vbExclamation, sMsgTitle
		end if
	end if
end sub

sub LibraryListView_MenuSelected(strMenu)
	Select Case strMenu
		Case "Paste"
			ACKbase.paste TempImageList.ImageList, 0
			LibraryImageList.AddImage TempImageList.Imagelist, 0
			RepaintLibraryList
			LibraryListView.CurrentImage = LibraryImageList.CountImages - 1
			LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
			if fLibLoaded = false then
				fLibLoaded = true
					SetLiveHelp 3
				LibraryFullMenu
			end if
		Case else
			doAction strMenu
	End Select
end sub

sub LibScrolltoImage (imagenum, ToporBot)
	dim newoffset, row
'	the image indicated by imagenum will be scrolled into view
'	ToporBot indicates which row to scroll it to

	row = cint(imagenum\5.5)+ ToporBot
	newoffset = (row * (LibraryListView.ImageHeight + LibraryListView.vSpacing))
	LibraryListView.OffsetV = newoffset
end sub

sub LibScrollDownOne
	'validity must be checked before making this call!
	LibraryListView.OffsetV = LibraryListView.OffsetV + LibraryListView.ImageHeight + LibraryListView.vSpacing
end sub

sub LibScrollUpOne
	'validity must be checked before making this call!
	LibraryListView.OffsetV = LibraryListView.OffsetV - LibraryListView.ImageHeight - LibraryListView.vSpacing
end sub

' ******** Image library key press stuff ********
sub LibraryListView_keypress(keycode)
	Select Case keycode
		Case 52 'left
			libleft
		Case 54 'right
			libright
		Case 56 'up
			libup
		Case 50 'down
			libdown
		Case 46 'delet
			dolibrarydelete
	End Select
end sub

sub LibraryListView_keyup(keycode, shift)
	Select Case keycode
		Case 8	'delete
			dolibrarydelete
		Case 37 'left
			libleft
		Case 39 'right
			libright
		Case 38 'up
			libup
		Case 40 'down
			libdown
		Case 46 'delet
			dolibrarydelete
	End Select
end sub

sub libup
	dim row, newoffset

	if LibraryListView.CurrentImage > 5 then
		row = cint(LibraryListView.CurrentImage\5.5)-1
		LibraryListView.CurrentImage = LibraryListView.CurrentImage - 6
		if 	LibraryListView.OffsetV > row * (LibraryListView.ImageHeight + LibraryListView.vSpacing) then
			' must scroll down one
			newoffset = (row * (LibraryListView.ImageHeight + LibraryListView.vSpacing))
			LibraryListView.OffsetV = newoffset
		end if
	else
		'beep
	end if
end sub

sub libdown
	dim row

	if LibraryListView.CurrentImage < LibraryImageList.CountImages-6 then
		'scroll new current to the bottom visible row
		row = cint(LibraryListView.CurrentImage\5.5)
		LibraryListView.CurrentImage = LibraryListView.CurrentImage + 6
		if 	LibraryListView.OffsetV < row * (LibraryListView.ImageHeight + LibraryListView.vSpacing) then
			' must scroll down one
			LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
		end if
	else
		'beep
	end if
end sub

sub libleft
	if LibraryListView.CurrentImage > 0 then
		LibraryListView.CurrentImage = LibraryListView.CurrentImage - 1
	else
		'beep
	end if

end sub

sub libright
	if LibraryListView.CurrentImage < LibraryImageList.CountImages-1 then
		LibraryListView.CurrentImage = LibraryListView.CurrentImage + 1
	else
		'beep
	end if
end sub

sub DoLibraryDelete
	LibraryImageList.RemoveImage LibraryListView.CurrentImage
	RepaintLibraryList
	if LibraryImageList.CountImages = 0 then
		fLibLoaded = false
		LibraryEmptyMenu
		SetLiveHelp 1
	elseif LibraryListView.CurrentImage = LibraryImageList.CountImages then
		LibraryListView.CurrentImage = LibraryListView.CurrentImage - 1

	end if
	LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
end sub

sub DoLibraryDeleteAll
	LibraryImageList.ImageFile = ""
	LibraryListView.OffsetV = 0
	RepaintLibraryList
	fLibLoaded = false
	LibraryEmptyMenu
end sub

sub DoResetView

	CurHcenter = AVATAR_WIDTH / 2
	LastHpos   = 0
	CurVcenter = AVATAR_HEIGHT / 2
	LastVpos   = 0

	CropTool.ResetView
	CropTool.ViewHPos = cint((CropTool.ImageWidth/2.0)-64.0)
	CropTool.viewVpos = cint((CropTool.ImageHeight/2.0)-64.0)
end sub

sub CropTool_MenuSelected(strMenu)
	dim curWidth
	dim curHeight
	dim HPos
	dim VPos
	dim result

	Select Case strMenu
		Case "Paste"
			ACKbase.paste TempImageList.ImageList, 0
			LibraryImageList.AddImage TempImageList.Imagelist, 0
			RepaintLibraryList
			'CropTool.CurrentImage = LibraryImageList.CountImages - 1
			LibraryListView.CurrentImage = LibraryImageList.CountImages - 1
			CropTool.CurrentImage = LibraryListView.CurrentImage
			DoResetView
			LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
			fCropLoaded = true
			CropToolFull
			SetLiveHelp 3

			HPos = Cint(CropTool.ViewHPos/CropTool.ViewScale)
			VPos = Cint(CropTool.ViewVPos/CropTool.ViewScale)

			curHeight = Cint(AVATAR_HEIGHT/CropTool.ViewScale)

			LibraryFullMenu

' ************************* Drag and Drop ****************************
' ******** from gesture view
sub SetDropTargets
	' gesture view
	gvLeft = GestureView.offsetLeft + 2
	gvTop = GestureView.offsetTop + 2
	gvBot = GestureView.offsetTop + GestureView.offsetHeight - 1 + 2
	gvRight = GestureView.offsetLeft + (ackbase.countGestureFrames(currentGesture) * GestureView.ImageWidth) + _
						((ackbase.countGestureFrames(currentGesture) - 1) * GestureView.hSpacing) + 2
	' library list view
	llLeft = LibraryListView.offsetLeft + 2
	llTop = LibraryListView.offsetTop + 2
	llBot = LibraryListView.offsetTop + LibraryListView.offsetHeight - 1 + 2
	llRight = LibraryListView.offsetLeft + LibraryListView.offsetWidth - 1 + 2
	' current image view
	ctLeft = CropTool.offsetLeft + 2
	ctTop = CropTool.offsetTop + 2
	ctBot = CropTool.offsetTop + CropTool.offsetHeight - 1 + 2
	ctRight = CropTool.offsetLeft + CropTool.offsetWidth - 1 + 2
	' Thumbnail view
	thLeft = ThumbnailView.offsetLeft + 2
	thTop = ThumbnailView.offsetTop + 2
	thBot = ThumbnailView.offsetTop + ThumbnailView.offsetHeight - 1 + 2
	thRight = ThumbnailView.offsetLeft + ThumbnailView.offsetWidth - 1 + 2
end sub

sub GestureView_DragBegin(x,y)
	dim whichImage, newX

	SetDropTargets
	newX = x - gvLeft
	if newX >= 1 and newX <= 66 then
		whichImage = 0
	elseif newX >= 67 and newX <= 134 then
		whichImage = 1
	elseif newX >= 135 and newX <= 202 then
		whichImage = 2
	elseif newX >= 203 and newX <= 270 then
		whichImage = 3
	elseif newX >= 271 and newX <= 338 then
		whichImage = 4
	elseif newX >= 339 and newX <= 404 then
		whichImage = 5
	end if
	GestureIndex = ackbase.GestureFrameImage(currentGesture, whichImage)
	GestureIndex = ackbase.ImageEntryBitmapIndex(GestureIndex, 0)
	if whichImage < ackbase.countGestureFrames(currentState) then
		GestureView.BeginDrag -32, -32, 32, 32
	end if
end sub

sub GestureView_DragComplete(x,y)
	dim result
	SetDropTargets
	' check to see if drop is in library list view
	if y > llTop And y < llBot And x > llLeft And x < llRight then
		LibraryImageList.AddImage ACKImageList.ImageList, GestureIndex
		RepaintLibraryList
		LibraryListView.CurrentImage = LibraryImageList.CountImages - 1
		LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
		if fLibLoaded = false then
			fLibLoaded = true
			SetLiveHelp 3
			LibraryFullMenu
		end if
	elseif y > ctTop And y < ctBot And x > ctLeft And x < ctRight then
		' check to see if drop is in crop
		LibraryImageList.AddImage ACKImageList.ImageList, GestureIndex
		RepaintLibraryList
		LibraryListView.CurrentImage = LibraryImageList.CountImages - 1
		CropTool.CurrentImage = LibraryListView.CurrentImage
		DoResetView
		CropToolFull
		if fLibLoaded = false then
			fLibLoaded = true
			LibraryFullMenu
		end if
	elseif y > thTop And y < thBot And x > thLeft And x < thRight then
		MakeThumbnail "gesture"
	end if
end sub

' ******** from library view
sub LibraryListView_DragBegin(x,y)
	if fLibLoaded = true then
		LibraryListView.BeginDrag -32, -32, 32, 32
	end if
end sub

sub LibraryListView_DragComplete(x, y)
	' set boundary boxes for all potential drop targets
	SetDropTargets
	if y > gvTop And y < gvBot And x > gvLeft And x <= gvRight then
		'check to see if drop is in gesture view window
		DropCurrentOnGesture x, y, "library"
	elseif y >= thTop And y <= thBot And x >= thLeft And x <= thRight then
		'check to see if drop is in thumbnail view
		MakeThumbnail "library"
		SetLiveHelp 5
	elseif y >= ctTop And y <= ctBot And x >= ctLeft And x <= ctRight then
		'check to see if drop is in crop tool
		CropTool.CurrentImage = LibraryListView.CurrentImage
		DoResetView
		CropToolFull
		SetLiveHelp 3
	end if
end sub

' ******** from Crop Tool
sub CropTool_DragBegin(x,y)
	if fCropLoaded = true then
		CropTool.BeginDrag -32, -32, 32, 32
	end if
end sub

sub CropTool_DragComplete(x,y)
	SetDropTargets
	if y >= gvTop And y <= gvBot And x >= gvLeft And x <= gvRight then
		' check to see if drop is in gesture view
		DropCurrentOnGesture x, y, "crop"
		SetLiveHelp 4
	elseif y >= thTop And y <= thBot And x >= thLeft And x <= thRight then
		' check to see if drop is in thumbnail view
		MakeThumbnail "crop"
	elseif y > llTop And y < llBot And x > llLeft And x < llRight then
		LibraryImageList.AddImage CropTool.ImageList, CropTool.CurrentImage
		dim curWidth, curHeight, HPos, VPos, index, result
		HPos = Cint(CropTool.ViewHPos / CropTool.ViewScale)
		VPos = Cint(CropTool.ViewVPos / CropTool.ViewScale)
		curWidth  = Cint(AVATAR_WIDTH / CropTool.ViewScale)
		curHeight = Cint(AVATAR_HEIGHT / CropTool.ViewScale)
		result = LibraryImageList.ReplaceImageCropped(CropTool.ImageList, CropTool.CurrentImage, HPos, VPos, curWidth, curHeight, LibraryImageList.CountImages - 1, AVATAR_WIDTH, AVATAR_HEIGHT)
		RepaintLibraryList
		LibraryListView.CurrentImage = LibraryImageList.CountImages - 1
		LibScrolltoImage LibraryListView.CurrentImage ,BOT_ROW
		if fLibLoaded = false then
			fLibLoaded = true
			SetLiveHelp 2
			LibraryFullMenu
		end if
	end if
end sub

'***********************************
'Routine:    DropCurrentOnGesture
'
'ArgList:    x - horizontal position
'			 y - vertical position
'			 from - drag source
'***********************************
sub DropCurrentOnGesture(x, y, from)
	dim index, curWidth, curHeight, HPos, VPos, whichImage, result, newX

	'determine index into ACKImageList for selected drop position
	newX = x - gvLeft
	if newX >= 1 and newX <= 66 then
		whichImage = 0
	elseif newX >= 67 and newX <= 134 then
		whichImage = 1
	elseif newX >= 135 and newX <= 202 then
		whichImage = 2
	elseif newX >= 203 and newX <= 270 then
		whichImage = 3
	elseif newX >= 271 and newX <= 338 then
		whichImage = 4
	elseif newX >= 339 and newX <= 404 then
		whichImage = 5
	end if
	index = ackbase.GestureFrameImage(currentGesture, whichImage)
	index = ackbase.ImageEntryBitmapIndex(index, 0)
	if from = "library" then
		ACKImageList.ReplaceImage index, LibraryListView.ImageList, LibraryListView.CurrentImage
	else
		if (CropTool.ViewScale > 0) then
			HPos = Cint(CropTool.ViewHPos / CropTool.ViewScale)
			VPos = Cint(CropTool.ViewVPos / CropTool.ViewScale)
			curWidth  = Cint(AVATAR_WIDTH / CropTool.ViewScale)
			curHeight = Cint(AVATAR_HEIGHT / CropTool.ViewScale)
			result = CropTool.CopyCurrentImage(HPos, VPos, curWidth, curHeight, AVATAR_WIDTH, AVATAR_HEIGHT, ACKImageList.ImageList, index)
		end if
	end if
	ACKView.ImageList = ACKImageList.ImageList
	InstallStateInMultiFrame
	fModified = true
	setAvatarModified
end sub

sub LoadAv
	dim newname

	if fModified then
		select case msgbox("Avatar has been modified. Do you want to save changes?", vbYesNoCancel + vbQuestion, _
									sMsgTitle)
		case vbYes
			if fNoAvatarName then
				if not SaveAs then exit sub
			else
				SaveAvatar
			end if
		case vbCancel
			exit sub
		case else
		end select
	end if
	if DefaultPath <> "" then
		newname = ackbase.dlgchooseavatar (DefaultPath & "*.spr", false)
	else
		newname = ackbase.dlgchooseavatar (DefaultPath, false)
	end if
	if newname <> "" then
		'check for valid file type (not case sensitive)
		if StrComp(right(newname, 3), "spr", vbTextCompare) = 0 then
			if ackbase.SetSpriteFilename(newName) = true then
				if fGifOK then
					imgIdle.click
					newname = left(newname, instr(newname, ".") - 1)
					AvatarFilePath = left(newname, InstrRev(newname, "\"))
					AvatarName = right(newname, len(newname) - InstrRev(newname, "\"))
					divMenuBar.innerText = AvatarName & ".spr"
					ackbase.ImageFileName = AvatarName & ".gif"
					setAvatarModified
					ClearThumbnail
					ThumbnailImageList.ImageFile = ACKbase.ThumbNailImage
					ThumbnailView.ImageList = ThumbnailImageList.ImageList
					ThumbnailView.CurrentImage = 0
					DefaultPath = "" 'will not overide user set folder
				end if
			else
				' error reading spr file
				msgbox "Failed to load avatar!", vbExclamation, sMsgTitle
			end if
		else
			msgbox "Invalid file extension for avatar!", vbExclamation, sMsgTitle
		end if
	end if
end sub

sub LoadBlank
	if fModified then
		select case msgbox("Avatar has been modified. Do you want to save changes?", vbYesNoCancel + vbQuestion, _
									sMsgTitle)
		case vbYes
			if fNoAvatarName then
				if not SaveAs then exit sub
			else
				SaveAvatar
			end if
		case vbCancel
			exit sub
		case else

	end if
	if ackbase.SetSpriteFilename(ACKhomePath & "blank.spr") = true then
		'set new default avatar information
		imgIdle.click
		AvatarFilePath = ACKhomePath

function SaveAs
	dim newname

	SaveAs = false
	if fFirstTimeDlg then
		newname = ACKImageList.DlgChooseImage (DefaultPath & AvatarName & ".spr", true)
		fFirstTimeDlg = false
	else
		newname = ACKImageList.DlgChooseImage (AvatarName & ".spr", true)
	end if
	if newname <> "" then
		newname = left(newname, instr(newname, ".") - 1)
		AvatarFilePath = left(newname, InstrRev(newname, "\"))
		AvatarName = right(newname, len(newname) - InstrRev(newname, "\"))
		divMenuBar.innerText = AvatarName & ".spr"
		ACKbase.ImageFileName = AvatarName & ".gif"
		ACKbase.ThumbNailImage = "t" & AvatarName & ".gif"
		SaveAvatar
		fNoAvatarName = false
		SaveAs = true
		imgIdle.click

sub AnimateState
	dim FrameDur, iBank

	' start it
	fAnimating = true
	if AnimateFrame < ackbase.countGestureFrames(currentState) then
		if cint(currentState) = cint(imgIdle.GestureNum) then
			FrameDur = 500
		else
			if AnimateFrame = 0 then
				FrameDur = ackbase.gestureframeduration(currentState, AnimateFrame)
			else
				FrameDur = ackbase.gestureframeduration(currentState, AnimateFrame) - _
					ackbase.gestureframeduration(currentState, AnimateFrame - 1)
			end if
		end if
		iBank = ackbase.gestureframeImage(currentState, AnimateFrame)
		ackview.currentImage = ackbase.imageEntryBitmapIndex(iBank, 0)
		AnimateFrame = AnimateFrame + 1

		timerID = setTimeout("AnimateState", FrameDur)
	else
		fAnimating = false
		AnimateFrame = 0
		iBank = ackbase.gestureframeImage(imgIdle.GestureNum, AnimateFrame)
		ackview.currentImage = ackbase.imageEntryBitmapIndex(iBank, 0)
	end if
end sub

sub ACKbase_OnFileChanged
	loopcounter = loopcounter+1
	ACKImageList.ImageFile = ACKbase.ImageFilePath

         ' handle the broken GIF file
         msgbox "Invalid gif file!", vbExclamation, sMsgTitle
         'ACKbase.ImageFilePath = ACKhomePath
         if loopcounter > 2 then
			' can't load blank avatar
			msgbox "Failed to load blank avatar!", vbExclamation, sMsgTitle
			loopcounter = 0
         else
			LoadBlank
         end if

         fGifOK = false
    else

 		ACKView.ImageList = ACKImageList.ImageList
		' state view stuff

		currentState = 0
		InstallStateInMultiFrame

sub InstallStateInMultiFrame
	GestureView.ClearImages
	dim frameText, imageBank, image, numFrames, i

	numFrames = ackbase.countGestureFrames(currentState)
	for i = 0 to numFrames - 1
		imageBank = ackbase.gestureframeimage(currentState, i)
		image = ackbase.ImageEntryBitmapIndex(imageBank, 0)
		frameText = "Bank " + CStr(imageBank)
		GestureView.AddImage image, frameText
	next
	GestureView.CurrentImage = currentFrame
end sub

sub SetCurrentFrame(whichFrame)
	currentFrame = whichFrame
	GestureView.CurrentImage = currentFrame
	currentBank = ackbase.GestureFrameImage(currentState, currentFrame)

' *************************** Thumbnail **************************

'***********************************
'Routine:    MakeThumbnail
'
'ArgList:    from - drag source
'***********************************
sub MakeThumbnail(from)
	dim curWidth, curHeight, HPos, VPos, index, result

	ClearThumbnail
	if from = "library" then
		ThumbnailView.viewscale = THUMB_WIDTH / AVATAR_WIDTH
		result = ThumbnailImageList.ReplaceImage(0, LibraryListView.ImageList, LibraryListView.CurrentImage)
	elseif from = "gesture" then
		ThumbnailView.viewscale = THUMB_WIDTH / AVATAR_WIDTH
		result = ThumbnailImageList.ReplaceImage(0, ACKImageList.ImageList, GestureIndex)
	elseif from = "crop" then
		HPos = Cint(CropTool.ViewHPos / CropTool.ViewScale)
		VPos = Cint(CropTool.ViewVPos / CropTool.ViewScale)
		curWidth  = Cint(AVATAR_WIDTH / CropTool.ViewScale)
		curHeight = Cint(AVATAR_HEIGHT / CropTool.ViewScale)
		result = CropTool.CopyCurrentImage(HPos, VPos, curWidth, curHeight, THUMB_WIDTH, THUMB_HEIGHT, ThumbnailImageList.ImageList, 0)
	end if
	if result = false then
		msgbox "Failed to copy image!", vbExclamation, sMsgTitle
	else
		ThumbnailView.ImageList = ThumbnailImageList.ImageList
		ThumbnailView.CurrentImage = 0
		fModified = true
		setAvatarModified
	end if
end sub

sub ClearThumbnail
	ThumbnailView.viewhpos = 0
	ThumbnailView.viewvpos = 0
	ThumbnailView.viewscale = 1.0
end sub

sub ZoomSlider(ZoomPos)
	parent.CurScale = (ZoomPos * 5.0) / 80.0
	if parent.CropTool.viewhpos <> parent.LastHpos or parent.CropTool.viewvpos <> parent.LastVpos then
		parent.CurHcenter = (parent.CropTool.viewhpos + 64) / parent.LastScale
		parent.CurVcenter = (parent.CropTool.viewvpos + 64) / parent.LastScale
	end if
		parent.CropTool.viewhpos = parent.CurHcenter * parent.CurScale - 64.0
		parent.CropTool.viewvpos = parent.CurVcenter * parent.CurScale - 64.0
	parent.CropTool.ViewScale = parent.CurScale
	parent.LastHpos = parent.CropTool.viewhpos
	parent.LastVpos = parent.CropTool.viewvpos
	parent.LastScale = parent.CurScale
end sub

	dim xPos

	if window.event.button = 1 and inpSlider.style.filter = "" then
		xPos = window.event.offsetX
		if xPos < 4 then
			xPos = 0
		elseif xPos > 71 then
			xPos = 68
		else
			xPos = xPos - 3
		end if
		ptr.style.left = inpSlider.offsetLeft + xPos
		ZoomSlider xPos + 6
	end if
end sub
