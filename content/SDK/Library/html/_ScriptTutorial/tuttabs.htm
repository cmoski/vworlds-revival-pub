	.selected{ font-family: Arial; font-size: 8pt;color:"#000000";font-weight:bold}
	.tabStyle {cursor:hand; Font-Size: 8pt;Font-Family: verdana;Color: #336666;}
	.Highlight {cursor:hand; Font-Size: 8pt;Font-Family: verdana;Color: white;font-weight:bold}
	.vHighlightinput1 {Font-Size: 8pt;Font-Family: verdana;Color:#993300;cursor:hand}
	.bHilite{Font-Size: 8pt;Font-Family: verdana;Color:white;cursor:hand;background-color:#336666}

</style>
<title>C:\PROGRA~1\MICROS~4\HTML\EDITORS\CORE\OBJTABS.HTM</title>
<script language=vbs>

dim curElement
dim mouseClicked
mouseClicked = false
curElement=null

sub document_OnMouseOver
	select case window.event.srcElement.className
	case "tabStyle"
		if window.event.srcElement.tagName = "FONT" then
			window.event.srcElement.parentElement.className = "vHighlightinput1"
		else
			if window.event.srcElement.children.length then
				window.event.srcElement.children(0).className = "vHighlightinput1"
			end if
		end if
		window.event.srcElement.className = "vHighlightinput1"
	case else
	end select
end sub

sub document_OnMouseOut
	select case window.event.srcElement.className
	case "vHighlightinput1"
		if window.event.srcElement.tagName = "FONT" then
			window.event.srcElement.parentElement.className = "tabStyle"
		else
			if window.event.srcElement.children.length then
				window.event.srcElement.children(0).className = "tabStyle"
			end if
		end if
		window.event.srcElement.className = "tabStyle"
	case else
	end select
end sub

sub HighlightItem(sItem)
	if curElement.id <> "div" & sItem then
		if document.all("div" & sItem).parentElement.style.display = "none" then
			document.all("div" & sItem).parentElement.style.display = ""
			document.all("div" & left(document.all("div" & sItem).parentElement.id, 6)).all.tags("font")(0).innerText = "6"
		end if
		SetHighlight document.all("div" & sItem)
	end if
end sub

sub MenuAction(el)
	if idLoadTimer <> 0 then
		window.clearTimeout idLoadTimer
	end if
	if el.parentElement.style.display = "none" then
		i = 0
		select case document.all("div" & mid(el.id,4)).gPos
		case "-1" 'first item in last group
			if curElement.id = document.all("divGroup" & mid(el.parentElement.id, 6, 1)).id then i = 1
		case "0"	'first item in group
			i = 1
		case else
			'this will handle when gPos=1 which is set for the last item in group
		end select
		document.all("optGroup" & mid(el.parentElement.id, 6, 1) + i).checked = true
		document.all("optGroup" & mid(el.parentElement.id, 6, 1) + i).focus
		MenuAction document.all("optGroup" & mid(el.parentElement.id, 6, 1) + i)
	else
		idLoadTimer = window.setTimeout("top.frames(""tutorial"").location.href = """ & mid(el.id, 4) & ".htm"" : idLoadTimer = 0", 200)
		SetHighlight document.all("div" & mid(el.id,4))
	end if
end sub

sub SetHighlight(el)
	el.className = "bHilite"
	el.all.tags("label")(0).className = "bHilite"
	if el.all.tags("label")(0).children.length then
		el.all.tags("label")(0).children(0).className = "bHilite"
	end if
	if (IsObject(curElement)) then
		if curElement.id <> el.id then
			curElement.className = "tabStyle"
			curElement.all.tags("label")(0).className = "tabStyle"
			if curElement.all.tags("label")(0).children.length then
				curElement.all.tags("label")(0).children(0).className = "tabStyle"
			end if
		end if
	end if
	set curElement = el
end sub

sub window_onload
	SetHighlight divGroup0
	window.settimeout "optGroup0.focus", 0, "vbs"
end sub

sub document_onMouseUp
	mouseClicked = true
end sub

sub ShowHide

	if (window.event.srcElement.id=null) then
		exit sub
	end if

	select case mid(window.event.srcElement.id, 4, 5)
	case "Group"
		if document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = "" then
			document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = "none"
			document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "4"
		else
			document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = ""
			document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "6"
		end if
	case else
	end select
end sub

sub document_ondblclick
	if (window.event.srcElement.id=null) then
		exit sub
	end if

	select case left(window.event.srcElement.id, 3)
	case "div", "lbl"
		ShowHide
	case else
	end select
end sub

sub document_onclick
	if (window.event.srcElement.id=null) then
		exit sub
	end if

	select case left(window.event.srcElement.id, 3)
	case "opt", "div", "fnt"
		MenuAction window.event.srcElement
		if mouseClicked and left(window.event.srcElement.id, 3) = "fnt" then
			ShowHide
		end if
		if document.body.clientHeight + document.body.scrollTop < curElement.offsetTop + curElement.offsetHeight then
			curElement.scrollIntoView false
		end if
		mouseClicked = false
	case else
	end select

end sub

sub document_onkeypress
	if (window.event.srcElement.id=null) then
		exit sub
	end if

	select case left(window.event.srcElement.id, 8)
	case "optGroup"
		select case window.event.keycode
		case 13
			if document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = "" then
				document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = "none"
				document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "4"
			else
				document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = ""
				document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "6"
			end if
		case 45	'minus key
			document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = "none"
			document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "4"
		case 43, 61	'plus or equal key
			document.all(mid(window.event.srcElement.id, 4) & "Children").style.display = ""
			document.all("div" & mid(window.event.srcElement.id, 4)).all.tags("font")(0).innerText = "6"
		case else
		end select
	case else
	end select
end sub

</script>
</head>
