function MM_swapImage() { //v1.2
  var i,j=0,objStr,obj,swapArray=new Array,oldArray=document.MM_swapImgData;
  for (i=0; i < (MM_swapImage.arguments.length-2); i+=3) {
    objStr = MM_swapImage.arguments[(navigator.appName == 'Netscape')?i:i+1];
    if ((objStr.indexOf('document.layers[')==0 && document.layers==null) ||
        (objStr.indexOf('document.all[')   ==0 && document.all   ==null))
      objStr = 'document'+objStr.substring(objStr.lastIndexOf('.'),objStr.length);
    obj = eval(objStr);
    if (obj != null) {
      swapArray[j++] = obj;
      swapArray[j++] = (oldArray==null || oldArray[j-1]!=obj)?obj.src:oldArray[j];
      obj.src = MM_swapImage.arguments[i+2];
  } }
  document.MM_swapImgData = swapArray; //used for restore
}
//-->
</script>

<body bgcolor=#660000 text="#CC9900" link="#CC6600" vlink="#669900" alink="#CC6600">
<OBJECT ID="Helper" CLASSID="clsid:7E3832CF-4F4E-11D0-89AB-00A0C9054129">
</OBJECT>
<script LANGUAGE="VBSCRIPT">
dim our_world
				' the variable to hold the world should be declared out here
				' so it is global to all the subs in the file.
				' Now, once this variable  is initialized
				' (when the window loads--- see 'window_onload'),
				' all our subs can get to it to do things in the world...
				' note that to have any web page talk to the world it always needs
				' to have the helper object declared above in the '<OBJECT>' tag

sub Ant_Mover (Instruction_Number)
	dim ant
	set ant = our_world.user.container.findwithin("lesson_5")
	select case Instruction_Number
		case 1:  'positive x
			ant.direction.set .99,0,.01
			ant.position.x = ant.position.x + 10
		case 2:   'negative x
			ant.direction.set -.99,0,.01
			ant.position.x = ant.position.x - 10
		case 3:   'positive z
			ant.direction.set .01,0,.99
			ant.position.z = ant.position.z + 10
		case 4:    'negative z
			ant.direction.set .01,0,-.99
			ant.position.z = ant.position.z - 10
	end select
end sub


sub Window_OnLoad
	set our_world = helper.client.world
			'this line gets the world via the helper, so we can talk to it as we
			'would from any other script.
	our_world.fireUIEvent helper.client.world.user, "EventRequest", window
			'this line tells the world that a page is ready to get messages from it.
			'these messages will get passed into the 'Handle' subroutines below.
end sub

Sub window_onunload
    our_world.fireUIEvent helper.client.world.user, "EventRequestCancel", window
End sub

'here are the methods that respond to things the world is doing-
'tracing, reporting, or doing a custom 
'UImethod (the most common thing to handle)
'The subroutine names need to be named exactly as they appear here
'(although the arguments inside the parentheses can be called anything you like)
'you don't have to put any of them here, they are all optional and will work if
'placed in the script tag for this web page (as long as the 'event request'
' is sent in the window_onLoad subroutine, as above...)

Sub HandleTrace(theStr)
	'anything that is said in the world.trace command from any script will
	'execute this subroutine in the web page and the string that was traced will
	'show up in the variable 'theStr'
end sub

Sub HandleReport(theStr, reportTypeNum)
	'anything that is said in the world.report command from any script will
	'execute this subroutine in the web page and the string and report type will
	'be passed into the variables 'theStr' and 'reportTypeNum'
	
end sub


sub handleUIEvent (byVal who, what, byVal args)
    	'any time a world.fireUIEvent is called in a script, this subroutine will
    	'be executed in the web page. we only want it to look for our special events,
	'so we put in an if statement to filter other stuff.
	'the variable who is the v-worlds object that executed the uievent
	'the variable what is the name of the event (a string we passed)
	'the variable args is a vbscript array for other information you
	'might want to send along

	if what = "ant_control_showposition" then
		dim crlf
		crlf = chr(13) + chr(10) ' this is to make return characters be 
					  ' added into the form box to have reports appear right...

		MyForm.MytextArea.Value = MyForm.MytextArea.Value + _
			crlf + who.name + " reporting in from coords " + _
			cstr(cint(who.position.x))+","+ _
			cstr(cint(who.position.y))+","+ _
			cstr(cint(who.position.z))+"..." 
 	end if
end sub

</script>
