<HTML>
<HEAD>
<LINK Rel=Stylesheet href="..\..\..\client\shared\global.css">
<SCRIPT LANGUAGE=VBSCRIPT>

Public ctlBottom, ctlTop

sub window_OnLoad
	If Not IsObject(ctlTop) Then Set ctlTop = top.buttons.cancelbtn
	If Not IsObject(ctlBottom) Then Set ctlBottom = top.buttons.lnkHelp
	window.setTimeOut "LoadPage", 100, "VBScript"
end sub

sub LoadPage
	top.page=2
	top.buttons.UpdateButtons
end sub

function verify()
	verify = true
end function

sub Finish()
	top.main.kit.finish
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

sub document_onKeyPress()
	Select Case window.event.keyCode
	Case 27
		top.buttons.OnCancel
	Case 13
		If Not top.buttons.finishbtn.disabled Then
			top.buttons.OnFinish
		ElseIf Not top.buttons.nextbtn.disabled Then
			top.buttons.OnNext
		End If
	Case Else
	End Select
end sub

</SCRIPT>
</HEAD>
<body>
	<div style=position:absolute;left:0;top:0;height:273;width:95;overflow:hidden;>

	</div>

</body>
