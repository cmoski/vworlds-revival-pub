Sub window_onload
	Set ctlTop = lstStyle
	Set ctlBottom = lstStyle
	Set parent.ctlBottom = ctlBottom
End Sub

sub document_onKeyPress
	select case window.event.keycode
	case 27
		top.buttons.OnCancel
	case 13
		If Not top.buttons.finishbtn.disabled Then
			top.buttons.OnFinish
		ElseIf Not top.buttons.nextbtn.disabled Then
			top.buttons.OnNext
		End If
	case Else
	end select
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

sub elements_ondatasetcomplete
	set rs = elements.recordset
	fillin_select
end sub

function verify()
	verify = ready
end function

sub fillin_select()
	dim el

	rs.MoveFirst
	' interate on world templates
	Do Until rs.EOF
			set el = document.CreateElement("OPTION")
			el.value = rs.Fields(0).value
			el.text = rs.Fields(0).value
			lstStyle.add el
			rs.MoveNext
	Loop

	lstStyle.SelectedIndex = top.SelectedStyleIndex
	choseName
end sub


sub choseName()
	dim selected
	selected = lstStyle.selectedIndex

	rs.MoveFirst
	rs.Move selected
	ready = true

	top.RoomType = rs.fields(0)
	top.Quota = rs.fields(5)
	'the fifth field in the .csv file is the number of objects in the room
	top.Geometry = ""
end sub

sub CreatePortals()
 top.goWorld.trace "creating portals now"


	if not top.bNoPortal then

		PortalNameTo = "portal to " + top.NewRoomName
		PortalNameFrom = "portal to " + top.goUser.container.toascii

		' add portal objects to both rooms, pointing towards each other
		' create the objects
		Dim p_curr_new
		set p_curr_new = top.goWorld.CreateInstance(PortalNameTo, "Portal", CurrentRoom)
		p_curr_new.Description = "portal from "+currentRoom.name+" to "+newroom.name

		Dim p_new_curr
		set p_new_curr = top.goWorld.CreateInstance(PortalNameFrom, "Portal", NewRoom)
		p_new_curr.Description = "portal from "+newroom.name+" to "+currentRoom.name


		Select Case top.RoomType
			case "Classic Conference"

				p_curr_new.InitializeGraphics "SDK\Library\Models\_OfficeCl\portalcl.x", top.goUser.position.x+.2, 1.83, top.goUser.position.z+.2, 1.0, 0.0, 0.0
				p_curr_new.RenderQuality=4
				p_curr_new.EntryRadius = 0.5

				p_new_curr.InitializeGraphics "SDK\Library\Models\_OfficeCl\portalcl.x", -7.0, 1.38, 0.0, 1.0, 0.0, 0.0
				p_new_curr.EntryPoint.set -4.5,1,-0.625
				p_new_curr.EntryOrientation.set  0.965, 0.0, 0.263
				p_new_curr.RenderQuality=3
				p_new_curr.EntryRadius = 0.5

			case "High Tech Conference"

				p_curr_new.InitializeGraphics "SDK\Library\Models\_OfficeHT\portalht.x", top.goUser.position.x+.2, 1.83, top.goUser.position.z+.2, 1.0, 0.0, 0.0

				p_new_curr.InitializeGraphics "SDK\Library\Models\_OfficeHT\portalht.x", -7.3, 01.22, 0.0, 1.0, 0.0, 0.0
				p_new_curr.EntryPoint.set -4.992,0.9,-0.066
				p_new_curr.EntryOrientation.set  1,0,0.198
				p_new_curr.EntryRadius = 0.5

			case "Classic Lobby"

				p_curr_new.InitializeGraphics "SDK\Library\Models\_OfficeCl\portalcl.x", top.goUser.position.x+.2, 1.83, top.goUser.position.z+.2, 1.0, 0.0, 0.0
				p_curr_new.RenderQuality=4
				p_curr_new.EntryRadius = 0.5

				p_new_curr.InitializeGraphics "SDK\Library\Models\_OfficeCl\portalcl.x", -7.38, 1.38, -0.1, 1.0, 0.0, 0.0
				p_new_curr.RenderQuality=3
				p_new_curr.EntryRadius = 0.5

			case "High Tech Lobby"

				p_curr_new.InitializeGraphics "SDK\Library\Models\_OfficeHT\portalht.x", top.goUser.position.x+.2, 1.83, top.goUser.position.z+.2, 1.0, 0.0, 0.0
				p_curr_new.EntryRadius = 0.5

				p_new_curr.InitializeGraphics "SDK\Library\Models\_OfficeHT\portalht.x", -6.890, 1.25, 1.8, 1.0, 0.0, 0.0
				p_new_curr.EntryPoint.set -4.73, .9, 2.4
				p_new_curr.EntryOrientation.set 0.982, 0.0, -0.186
				p_new_curr.EntryRadius = 0.5

		End Select

		' Set position & orientation of new portal entry point in front of you to be similar as if you dropped it 
		' (as the Object Wizard does)	
		p_curr_new.EntryPoint.Set top.goUser.Position.X + 1, 1.83, top.goUser.Position.Z + 1
		p_curr_new.EntryOrientation.Set -top.goUser.Direction.X, 0, -top.goUser.Direction.Z

		'Create boundaries around each portal
		p_curr_new.IsSolid = True
		p_new_curr.IsSolid = True

		p_curr_new.Destinations.Add p_new_curr
		p_new_curr.Destinations.Add p_curr_new

	end if

end sub

' Review: can we move this into the top Finish sub?
' Also, we should move check for bNoPortal in this sub - don't want to even call CreatePortals
sub Finish()
	dim crlf
	crlf = chr(13) + chr(10)

	set CurrentRoom = top.goUser.container

	if top.goUser.objectquota >= 0 then
	 	if cint(top.goUser.objectquota) >= cint(top.quota) then
			CreateRoom
			CreatePortals
			if top.bTeleport then
				top.goUser.Teleport NewRoom
			else
				msgbox "Room " & top.NewRoomName & " was created successfully.", vbInformation, "Microsoft Virtual Worlds"
			end if
		else
			msgbox "Your avatar has an object quota of " & cstr(top.goUser.objectquota) & " objects." & crlf & "You do not have permission to make the " & cstr(top.quota) & " objects required to complete this room.", vbInformation, "Microsoft Virtual Worlds"
		end if
	else
		CreateRoom
		CreatePortals
		if top.bTeleport then
			top.goUser.Teleport NewRoom
		else
			msgbox "Room " & top.NewRoomName & " was created successfully.", vbInformation, "Microsoft Virtual Worlds"
		end if
	end if
end sub
