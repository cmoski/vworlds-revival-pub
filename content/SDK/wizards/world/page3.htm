<html>
<head>
<LINK Rel=Stylesheet href="..\..\..\client\shared\global.css">
<script language="VBSCRIPT">

option explicit

sub window_OnLoad()
	top.page=4
	top.buttons.UpdateButtons
end sub

sub window_OnUnLoad()
end sub

function verify()
	verify = kit.verify()
end function

sub document_onKeyPress
	select case window.event.keycode
	case 27
		parent.frames(1).OnCancel
	case 13
		parent.frames(1).OnFinish
	case Else
	end select
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

sub Finish()
	if verify then
		' build the world
		kit.buildworld()
		' top.client.disconnect()
		if not top.FailedToBuild then
			StatusMsg "Done Creating World"
		else
			StatusMsg "Error: Unable to Create World"
		end if
	end if
end sub

Sub StatusMsg(msg)
'	document.frames(2).document.body.innerText = msg
End Sub
</script>
