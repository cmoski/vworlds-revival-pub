<HTML>
<HEAD>
<LINK Rel=Stylesheet href="..\..\..\client\shared\global.css">
<script language="VBscript">

option explicit

public fMouseClicked

sub window_OnLoad
	top.page = 2
	txtNickName.value = top.adminNickName
	txtPassword1.value = top.adminPassword
	txtPassword2.value = top.adminPassword
	chkLogon.checked = top.Autologon
	top.buttons.UpdateButtons
	txtNickName.select
	txtNickName.Focus
	if len(txtPassword1.value) > 0 then
		txtPassword2.disabled = false
	else
		txtPassword2.disabled = true
		txtPassword2.value = ""
	end if
end sub

sub window_OnUnLoad
	top.adminNickName = txtNickName.value
	top.adminPassword = txtPassword1.value
	top.Autologon = chkLogon.checked
end sub

function verify()
	if txtNickName.value = "" then
		verify = false
		msgbox "Enter a name for the administrator of this world.", vbInformation, "Microsoft Virtual Worlds"
		txtNickName.focus
		exit function
	end if
	if not top.CheckLength(txtNickName.value) then
		verify = false
		MsgBox "Avatar nicknames must be between 3 and 12 characters in length. Enter a new nickname.", vbInformation, "Invalid Number of Characters"
		txtNickName.focus
		txtNickName.select
		exit function
	end if
	if not top.CheckChars(txtNickName.value) then
		verify = false
		msgbox "An avatar nickname can not contain a space, a tab, or any of the following characters:" & vbcrlf & " / \ : ? "" < > | & " & vbcrlf & "Enter a new nickname.", vbExclamation, "Microsoft Virtual Worlds"
		txtNickName.focus
		txtNickName.select
		exit function
	end if
	if StrComp(txtPassword1.value, txtPassword2.value, vbBinaryCompare) = 0 then
		verify = true
	else
		verify = false
		msgbox "The passwords entered do not match, Type the new password in both text boxes.", vbExclamation, "Microsoft Virtual Worlds"
		txtPassword1.select
		txtPassword1.focus
		exit function
	end if
	verify = true
end function

sub document_onblur
	' check confirm updating
	if len(txtPassword1.value) > 0 then
		txtPassword2.disabled = false
	else
		txtPassword2.disabled = true
		txtPassword2.value = ""
	end if
end sub

sub document_onKeyPress
	select case window.event.keycode
	case 27
		parent.frames(1).OnCancel
	case 13
		parent.frames(1).OnNext
	case Else
	end select
end sub

sub document_onKeyUp
	' check confirm updating
	if len(txtPassword1.value) > 0 then
		txtPassword2.disabled = false
	else
		txtPassword2.disabled = true
		txtPassword2.value = ""
	end if
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub

Sub document_onmousedown
	If window.event.srcElement.tagName = "INPUT" Then
		fMouseClicked = True
	End If
End Sub

Sub document_onmouseup
	fMouseClicked = False
End Sub

Sub TxtFocus
	If Not fMouseClicked Then
		window.event.srcElement.select
	End If
End Sub

</script>
</HEAD>
<body>
	<div style=position:absolute;left:0;top:0;height:273;width:95;overflow:hidden;>
		<img src=..\..\..\client\shared\menuclouds.gif>
	</div>
	<div class=vH2 style=left:18;top:9;>Setup your world administrator logon</div>
	<div class=vStepBackGround style=left:440;top:1;>=</div>
	<div class=vStep style=left:452;top:9;>Step 2 of 4</div>
	<div class=vLabel style=left:20;top:110;>Name:</div>
	<input id=txtNickName maxlength=12 class=vInput style=left:135;top:107;width:170; onfocus=TxtFocus>
	<div class=vLabel style=left:20;top:140;>Password:</div>
	<input type=password id=txtPassword1 class="vinput" maxlength=255 style=left:135;top:137;width:170; onfocus=TxtFocus>
	<div class=vLabel style=left:20;top:170;>Confirm password:</div>
	<input type=password id=txtPassword2 disabled class=vInput style=left:135;top:167;width:170; onfocus=TxtFocus>
	<div style=position:absolute;left:125;top:240;>
		<input type=checkbox id=chkLogon value=1 style=position:relative;left:6;>
		<label class=vInputLbl for=chkLogon>
			&nbsp;Automatically logon when wizard has finished&nbsp;
		</label>
	</div>
</BODY>
</HTML>
