'-------------------------------------------------------------------
' sub CreateBareWorld( filename )
'
' Sets up an initial world database with only the core exemplars installed
'
' Parameters:
'	filename	File to use for world database
'-------------------------------------------------------------------
function CreateBareWorld(filename)
	On Error Resume Next
	'Disconnect from temp world
	if (top.World.WorldName = "~Temp") then
		Client.World.Disconnect
		Client.Disconnect
	end if
	' Connect to server (with authentication)
	dim Admin
	set Admin = Client.ConnectToServer(worldServerURL, True)
	if not IsObject(Admin) then
		main.StatusMsg "Error: Unable to Create World."
		msgbox "Could not connect to the server. Check the server name entered and confirm that Virtual Worlds server is running on that computer.", vbExclamation, "Microsoft Virtual Worlds"
		CreateBareWorld = false
		Client.Disconnect
		'Reconnect to temporary world
		set World = Client.ConnectLocal("~Temp")
		ReloadFinishFrames
		exit function
	end if
	' Check for valid worldname
	Set World = Nothing
	Err.Clear
	' Create the world
	set World = Client.CreateWorld(filename)
	if World is Nothing then
		Dim ErrorMsg
		ErrorMsg = "Unable to create the world on " & worldServerURL
		main.StatusMsg "Error: Unable to Create World."
		Select Case Err.Number
			Case vb_VWSERVER_E_ERRORCREATINGWORLD
				ErrorMsg = ErrorMsg & ". Verify Virtual Worlds Server is properly installed and functioning correctly."
			Case vb_VWSERVER_E_WORLDPREVIOUSLYREGISTERED
				ErrorMsg = ErrorMsg & ": """ & filename & """ already exists. Choose another world name."
			Case vb_VWSERVER_E_INVALIDWORLDNAME
				ErrorMsg = ErrorMsg & ". Check that your world name is valid and does not exceed the maximum length."
			Case Else
				ErrorMsg = ErrorMsg & ". (Error returned: 0x" & Hex(Err.Number) & ")"
		End Select
		msgbox ErrorMsg, vbExclamation, "Microsoft Virtual Worlds"
		CreateBareWorld = false
		set Admin = Nothing
		Client.Disconnect
		'Reconnect to temporary world
		set World = Client.ConnectLocal("~Temp")
		ReloadFinishFrames
		exit function
	else
		CreateBareWorld = true
	end if
	' Set the Trace level for diagnostics
	World.TraceLevel("*") = 4
end function

'-------------------------------------------------------------------
' sub CreateWorld( filename )
'
' Sets up an initial world database
'
' Parameters:
'	filename	File to use for world database
'-------------------------------------------------------------------
function CreateWorld( filename )
	'On Error Resume Next
	if CreateBareWorld(worldName) then
		' Logon as the admin avatar
		Dim adminuser
		set adminuser = World.Connect(adminNickname, adminPassword)
		if not IsObject(adminuser) then
			msgbox "Error connecting avatar to the world.", vbCritical, "Microsoft Virtual Worlds"
			client.Disconnect
			createWorld = false
			failedtobuild = true
		end if
		main.StatusMsg "Done connecting Admin avatar"
		main.StatusMsg "Creating Exemplars..."
		Dim multimediaModule
		set multimediaModule = World.CreateCOMModule("Multimedia", "VWSYSTEM.MultimediaEx.1", World.MODULE_CLIENT + World.MODULE_SERVER)
		main.StatusMsg "Done Creating Multimedia"
		Dim studioModule
		set studioModule = World.CreateCOMModule("Studio", "VWSTUDIO.StudioEx.1", World.MODULE_CLIENT + World.MODULE_SERVER)
		main.StatusMsg "Done Creating Studio"
		Dim foundationModule
		set foundationModule = World.CreateCOMModule("Foundation", "VWEXEMP.FoundationExemplars.1", World.MODULE_CLIENT + World.MODULE_SERVER)
		main.StatusMsg "Done Creating Foundation Exemplars"
		main.StatusMsg "Done setting up world: " + filename
		' Set global properties
		World.Global.DefaultSpriteFile = "default.spr"
		' set avatar exemplar to defaults
		world.Global.DefaultAvatarExemplar.InitializeSpriteGraphics world.Global.DefaultSpriteFile, 0.0, 1.0, 0.0, 1.0, 0.0, 0.0
		main.StatusMsg "Done setting up global object methods"
		Dim worldpath
		worldpath = CreateWorldPath(filename, worldServerURL)
		UpdateAvatarProfile worldpath
		if rootURL <> "" then
			world.global.rootURL = rootURL
		end if
		createWorld = true
	else
		main.StatusMsg "Error: Unable to Create World."
		client.Disconnect
		createWorld = false
		failedtobuild = true
		exit function
	end if

end function

function buildworld()
	failedtobuild = false
	if CreateWorld(worldName) then
		buildworld = true
	else
		buildworld = false
		failedtobuild = true
	end if
end function
