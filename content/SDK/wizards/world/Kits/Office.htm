option explicit

dim rs
dim ready
Dim world

Dim p_Entry
Dim StyleName
Dim selected

ready = False

sub window_onload
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	else
		lstStyle.selectedIndex = 0
	end if
	choseName 'since we are selecting first element it will have same effect
end sub

sub elements_ondatasetcomplete
	set rs = elements.recordset
	fillin_select
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	end if
end sub

function verify()
	verify = ready
end function

sub fillin_select()
	dim el

	rs.MoveFirst
	' interate on world templates
	Do Until rs.EOF
			set el = document.CreateElement("OPTION")
			el.value = rs.Fields(0).value
			el.text = rs.Fields(0).value
			lstStyle.add el
			rs.MoveNext
	Loop
end sub

sub choseName()
	selected = lstStyle.selectedIndex
	rs.MoveFirst
	rs.Move selected
	StyleName = rs.fields(0)
	top.SelectedStyleIndex = selected
	ready = true
end sub

sub finish
	buildworld
end sub

sub buildworld
	if top.buildworld then
		set world = top.client.world

		parent.StatusMsg "creating lobby"
		CreateLobby

		parent.StatusMsg "creating conference room"
		CreateConferenceRoom

		parent.StatusMsg "creating portals"
		CreatePortals

		' set default room to lobby
		world.Global.DefaultRoom = Lobby

		'set default entry in lobby
		world.Global.DefaultPortal = p_Entry

		world.user.MoveInto Lobby

		world.SaveDatabase
		world.Trace "All done with SaveDatabase"
		world.Disconnect
	end if
end sub

sub CreatePortals
	set p_Entry = World.CreateInstance("office entry", "Portal", lobby)
	p_Entry.Description = ""

	' add portal objects to both rooms, pointing towards each other
	Dim p_lobby_conf
	set p_lobby_conf = World.CreateInstance("portal to conference room", "Portal", lobby)

	Dim p_conf_lobby
	set p_conf_lobby = World.CreateInstance("portal to lobby", "Portal", conf1)

	' Set portal properties and destinations (has to be done after both portals are created)
	p_lobby_conf.Description = "Takes you to the conference room."
	p_lobby_conf.Destinations.Add p_conf_lobby

	p_conf_lobby.Description = "Takes you to the lobby."
	p_conf_lobby.Destinations.Add p_lobby_conf

	Select Case StyleName
		case "Classic"
			p_Entry.InitializeGraphics "", -7.38, 1.83, -0.1, 1.0, 0.0, 0.0

			p_Entry.IsUIVisible = False

			p_lobby_conf.EntryRadius = 0.5

			p_conf_lobby.EntryPoint.set -4.5,1,-0.625
			p_conf_lobby.EntryOrientation.set  0.965, 0.0, 0.263
			p_conf_lobby.RenderQuality=3
			p_conf_lobby.EntryRadius = 0.5

		case "High Tech"
			p_Entry.InitializeGraphics "", -6.890, 1.25, 1.8, 1.0, 0.0, 0.0

			p_Entry.EntryOrientation.set 0.982, 0.0, -0.186

			p_Entry.IsUIVisible = False

sub document_onKeyPress
	select case window.event.keycode
	case 27
		top.frames(1).OnCancel
	case 13
		top.frames(1).OnFinish
	case Else
	end select
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub
