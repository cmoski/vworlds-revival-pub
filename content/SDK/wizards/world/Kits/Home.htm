ready = False

sub window_onload
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	else
		lstStyle.selectedIndex = 0
	end if
	choseName 'since we are selcting first element it will have same effect
end sub

sub elements_ondatasetcomplete
	set rs = elements.recordset
	fillin_select
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	end if
end sub

function verify()
	verify = ready
end function

sub fillin_select()
	dim el

	rs.MoveFirst
	' interate on world templates
	Do Until rs.EOF
			set el = document.CreateElement("OPTION")
			el.value = rs.Fields(0).value
			el.text = rs.Fields(0).value
			lstStyle.add el
			rs.MoveNext
	Loop
end sub

sub choseName()
	selected = lstStyle.selectedIndex
	rs.MoveFirst
	rs.Move selected
	StyleName = rs.fields(0)
	top.SelectedStyleIndex = selected
	ready = true
end sub

sub finish
	buildworld
end sub

sub buildworld
	if top.buildworld then

		set world = top.client.world

		parent.StatusMsg "creating Outside"
		CreateOutside


		parent.StatusMsg "creating Living Room"
		CreateInteriorRoom


		parent.StatusMsg "creating portals"
		CreatePortals

		' set default room to Outside
		world.Global.DefaultRoom = Outside

		' set default Portal to Outside
		world.Global.DefaultPortal = p_Entry

		world.user.MoveInto Outside

		world.SaveDatabase
		world.Trace "All done with SaveDatabase"
		world.disconnect
	end if
end sub

sub CreatePortals
	'Default world entry
	set p_Entry = World.CreateInstance("world entry", "Portal", Outside)
	p_Entry.Description = ""
	p_Entry.IsUIVisible = False

	Dim p_Outside_Interior
	set p_Outside_Interior = world.CreateInstance("portal to living room", "Portal", Outside)

	Dim p_Interior_Outside
	set p_Interior_Outside = world.CreateInstance("portal to outside", "Portal", LivingRoom)

	' Set portal properties and destinations (has to be done after both portals are created)
	p_Outside_Interior.Description = "Takes you to the living room."
	p_Outside_Interior.Destinations.Add p_Interior_Outside

	p_Interior_Outside.Description = "Takes you outside. 'outside' is considered to be another room."
	p_Interior_Outside.Destinations.Add p_Outside_Interior


	Select Case StyleName
		case "Classical"

			p_Entry.InitializeGraphics "", -3.39, 0.0, 35.55, -0.5, 0.0, 0.87
			p_Entry.EntryPoint.set -3.39, 1.8, 35.55
			p_Entry.EntryOrientation.set 0.38, 0.0, -0.92
			p_Entry.EntryRadius = 0.5

			p_Outside_Interior.InitializeGraphics "SDK\Library\Models\_HomeCl\door2.x", 13.675,3.25, -0.145, -0.5, 0.0, 0.87
			p_Outside_Interior.EntryPoint.set 10.36, 2.77, 5.27
			p_Outside_Interior.EntryOrientation.set -0.54,0.0,0.85
			p_Outside_Interior.scale.set 1.5,1.5,1.5
			p_Outside_Interior.EntryRadius = 0.5

			p_Interior_Outside.InitializeGraphics "SDK\Library\Models\_HomeCl\cleardr.x", -10.25, 3.56, 4.55, 0.626, 0.0, -0.78
			p_Interior_Outside.EntryPoint.set -9.15, 3.06, 2.7
			p_Interior_Outside.EntryOrientation.set  0.57,0.0,-0.82
			p_Interior_Outside.EntryRadius = 0.25
			p_Interior_Outside.Scale.set 1.91, 1.54, 1.91

		case "Modern"
			p_Entry.InitializeGraphics "", 19.41, .89, 37.25, -0.715, 0.0, -0.7
			p_Entry.EntryPoint.set 18.41, .89, 32.25
			p_Entry.EntryOrientation.set  -0.715, 0.0, -0.7
			p_Entry.EntryRadius = 0.5

			p_Outside_Interior.InitializeGraphics "SDK\Library\Models\_HomeMod\portalhm.x", -4.9, 2.6, 3.33, 0, 0, 1
			p_Outside_Interior.EntryPoint.set -4.94, 1.974, 6.582
			p_Outside_Interior.EntryOrientation.set 0.0, 0.0, 1.0
			p_Outside_Interior.EntryRadius = 0.5

			p_Interior_Outside.InitializeGraphics "SDK\Library\Models\_HomeMod\portalhm.x", -7.4, 2.6, 4, 0, 0.0, -1.0
			p_Interior_Outside.EntryPoint.set -6.73, 2, -0.159
			p_Interior_Outside.EntryOrientation.set 0.982, 0.0, 0.19
			p_Interior_Outside.EntryRadius = 0.5
	End Select
	
	'Create boundaries around each portal except for entry, which has no destinations
	p_Outside_Interior.IsSolid = True
	p_Interior_Outside.IsSolid = True

end sub

sub document_onKeyPress
	select case window.event.keycode
	case 27
		top.frames(1).OnCancel
	case 13
		top.frames(1).OnFinish
	case Else
	end select
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub
