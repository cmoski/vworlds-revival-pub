option explicit

dim rs
dim ready
Dim world
Dim Landscape
Dim StyleName
Dim selected
Dim p_Entry

ready = False

sub window_onload
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	else
		lstStyle.selectedIndex = 0
	end if
	choseName
end sub

sub elements_ondatasetcomplete
	set rs = elements.recordset
	fillin_select
	if top.SelectedStyleIndex <> -1 then
		lstStyle.selectedIndex = top.SelectedStyleIndex
	end if
end sub

function verify()
	verify = ready
end function

sub fillin_select()
	dim el

	rs.MoveFirst
	' iterate on world templates
	Do Until rs.EOF
			set el = document.CreateElement("OPTION")
			el.value = rs.Fields(0).value
			el.text = rs.Fields(0).value
			lstStyle.add el
			rs.MoveNext
	Loop
end sub

sub choseName()
	selected = lstStyle.selectedIndex
	rs.MoveFirst
	rs.Move selected
	StyleName = rs.fields(0)
	top.SelectedStyleIndex = selected
	ready = true
end sub

sub finish
	buildworld
end sub

sub buildworld
	if top.buildworld then
		set world = top.client.world

		parent.StatusMsg "creating Landscape"
		CreateLandscape

		' Call sub to create entry portal if in Hill Top landscape
		' Set the DefaultPortal to be the entry within this sub
		CreatePortals

		' set default room to Landscape
		world.Global.DefaultRoom = Landscape

		world.user.MoveInto Landscape

		world.SaveDatabase
		world.Trace "All done with SaveDatabase"
		world.disconnect
	end if
end sub

Sub CreateGround2Boundaries(thething)
	Dim theBoundaryList_t
	set theBoundaryList_t = World.CreateBoundary(Array(_
		-37.837, 52.7031, -36.9292, -2.21893, 14.3615, -3.12673, 35.6949, -0.857229, _
		34.7871, 31.8236, 13.9076, 53.6109))
	theBoundaryList_t.HeightUpper = 10.88011
	theBoundaryList_t.HeightLower = 1.88011
	thething.BoundaryList.Add theBoundaryList_t
End Sub

Sub CreateHillsBoundaries(thething)

		-10.2128, 22.5816, 12.0284, 23.0355, 25.6454, 13.0496, 24.2837, -9.19149_
		))
	theBoundaryList_t.HeightUpper = 6.02975
	theBoundaryList_t.HeightLower = 0.0
	thething.BoundaryList.Add theBoundaryList_t
End Sub

sub CreateCellFromArray( theCell, ptsBoundary(), numPts , upper, lower )
	Dim i
	Dim boundary
	Dim succ

	set boundary = World.CreateBoundary()

	for i = 0 To numPts - 1
'		World.Trace "CreateAFloor vertex " + cstr(i) +": " + cstr(ptsBoundary(i*2)) + ", " + cstr(ptsBoundary(i*2+1))
		succ = boundary.InsertVertexSafe(-1, ptsBoundary(i*2),ptsBoundary(i*2 +1))
'		World.Trace "InsVertSafe succ=" + cstr(succ)
	next
	boundary.IsClosed = True
	boundary.HeightUpper = upper
	boundary.HeightLower = lower
	theCell.Add(boundary)

end sub


' Note: if you later add an entry portal to the Valley Landscape, you will need to redo this sub
' to look more like the other kits and place the DefaultPortal statement in the BuildWorld sub
sub CreatePortals
	Select Case StyleName
		case "Hill Top"
			'Default world entry
			Set p_Entry = World.CreateInstance("world entry", "Portal", Landscape)
			p_Entry.Description = ""
			p_Entry.IsUIVisible = False
			p_Entry.InitializeGraphics "", -3.39, 0.0, 35.55, -0.5, 0.0, 0.87
			p_Entry.EntryPoint.Set -3.39, 1.8, 35.55
			p_Entry.EntryOrientation.set 0.88, 0.0, 0.471
			p_Entry.EntryRadius = 0.5

			' Now set default Portal to Landscape just for the Hilltop world
			World.Global.DefaultPortal = p_Entry
	End Select
end sub

sub document_onKeyPress
	select case window.event.keycode
	case 27
		top.frames(1).OnCancel
	case 13
		top.frames(1).OnFinish
	case Else
	end select
end sub

sub document_OnSelectStart
	Select Case window.event.srcElement.tagName
	case "INPUT", "TEXTAREA"
		select case window.event.srcElement.type
		case "text", "textarea", "file", "password"
		case else
			window.event.returnValue = false
		end select
	case Else
		window.event.returnValue = false
	end select
end sub
