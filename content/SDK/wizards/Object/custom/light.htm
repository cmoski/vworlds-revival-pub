<script language="VBSCRIPT">


dim Client
dim World
dim User

Sub window_OnLoad
	set client = top.frames(0).helper.client
	set world = client.world
	set user = world.user
	
	top.frames(0).page=1

	
End Sub

function GetPath( filename )
	' Test for a relative path, and make necessary correction to point to local content instead of html
	select case Left (filename, 4) 
		case "http"
			GetPath = filename
		case "file"
			GetPath = filename
		case else
			GetPath = World.Global.ContentPath + filename
	end select
end function

Sub Finish
	Dim Artifact1
	Dim vec

	set Artifact1 = World.CreateInstanceByType("new artifact", "artifact", World.User)
	Artifact1.Description = "a new artifact"
	Artifact1.GeometryName = "media\models\basics\col2.x"
	World.User.Drop Artifact1

	World.Synchronize

	Artifact1.editobject	

	'MsgBox("Finished Making Artifact. Right-click to adjust properties.")

End Sub
