<HTML>
<HEAD>
<TITLE>Customize your sign</TITLE>

<SCRIPT LANGUAGE=VBScript>
sub window_OnLoad
	parent.page=1
	parent.buttons.UpdateButtons

	TextField.Value = parent.TextSelection

	PointSizeField.Value = parent.PointSizeSelection
	PointSizeField.additem "16"
	PointSizeField.additem "20"
	PointSizeField.additem "24"
	PointSizeField.additem "28"
	PointSizeField.additem "32"
	PointSizeField.additem "36"
	PointSizeField.additem "40"
	SampleStuff.style.fontsize = Cstr(parent.PointSizeSelection) + "pt"

	if parent.ShadowSelection = True then
		ShadowField.Checked = True
		SampleStuff.style.filter = "dropshadow(Color=#000000, OffX=1, OffY=1, Positive=1, enabled=1)"
	else
		ShadowField.Checked = False
		SampleStuff.style.filter = ""
	end if

	SampleStuff.style.color = parent.FontColorSelection
	SampleTable.bgcolor = parent.BGColorSelection

end sub

sub window_OnUnload
	parent.UpdateSign
end sub
</SCRIPT>

</HEAD>

<BODY>

<CENTER>
