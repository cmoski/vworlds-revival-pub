<HEAD>
<TITLE>Document Title</TITLE>

<SCRIPT LANGUAGE=VBScript>
sub window_OnLoad
	parent.page=2
	parent.buttons.UpdateButtons

	SampleStuff.style.fontsize = Cstr(parent.PointSizeSelection) + "pt"
	if parent.ShadowSelection = True then
		SampleStuff.style.filter = "dropshadow(Color=#000000, OffX=1, OffY=1, Positive=1, enabled=1)"
	else
		SampleStuff.style.filter = ""
	end if
	SampleStuff.style.color = parent.FontColorSelection
	SampleTable.bgcolor = parent.BGColorSelection

	RedScroll.Value = parent.FontRSelection
	GreenScroll.Value = parent.FontGSelection
	BlueScroll.Value = parent.FontBSelection
	BGRedScroll.Value = parent.BGRSelection
	BGGreenScroll.Value = parent.BGGSelection
	BGBlueScroll.Value = parent.BGBSelection
	UpdateFontVals
	UpdateBGVals
end sub

sub window_OnUnload
	parent.UpdateColors
end sub

Sub RedScroll_Change()
   RedDec.Text=RedScroll.Value
   UpdateFontVals
End Sub

Sub GreenScroll_Change()
   GreenDec.Text=GreenScroll.Value
   UpdateFontVals
End Sub

Sub BlueScroll_Change()
   BlueDec.Text=BlueScroll.Value
   UpdateFontVals
End Sub

Sub RedDec_Change()
   RedScroll.Value=RedDec.Text
   UpdateFontVals
End Sub

Sub GreenDec_Change()
   GreenScroll.Value=GreenDec.Text
   UpdateFontVals
End Sub

Sub BlueDec_Change()
   BlueScroll.Value=BlueDec.Text
   UpdateFontVals
End Sub

Sub BGRedScroll_Change()
   BGRedDec.Text=BGRedScroll.Value
   UpdateBGVals
End Sub

Sub BGGreenScroll_Change()
   BGGreenDec.Text=BGGreenScroll.Value
   UpdateBGVals
End Sub

Sub BGBlueScroll_Change()
   BGBlueDec.Text=BGBlueScroll.Value
   UpdateBGVals
End Sub

Sub BGRedDec_Change()
   BGRedScroll.Value=BGRedDec.Text
   UpdateBGVals
End Sub

Sub BGGreenDec_Change()
   BGGreenScroll.Value=BGGreenDec.Text
   UpdateBGVals
End Sub

Sub BGBlueDec_Change()
   BGBlueScroll.Value=BGBlueDec.Text
   UpdateBGVals
End Sub

Sub UpdateFontVals
   ColorTextBox.Backcolor = RGB(RedScroll.Value, GreenScroll.Value, BlueScroll.Value)
End Sub

Sub UpdateBGVals
   BGColorTextBox.Backcolor = RGB(BGRedScroll.Value, BGGreenScroll.Value, BGBlueScroll.Value)
End Sub

sub window_OnUnload
	parent.UpdateColors
end sub

</SCRIPT>
