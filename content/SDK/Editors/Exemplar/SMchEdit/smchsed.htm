<HTML>
<STYLE> BODY {font: 10pt Arial} </STYLE>
<BODY LEFTMARGIN=7 TOPMARGIN=7 ONLOAD="ShowIt" LANGUAGE="VBScript">
<FORM NAME="StateForm"><B>
<SCRIPT LANGUAGE="VBScript">document.write(parent.GetStateProp())</SCRIPT>
 is <INPUT TYPE="TEXT" SIZE=20 NAME="StateValue"></B>
</FORM>
<SCRIPT LANGUAGE="VBSCRIPT">
Dim oldValue

sub ShowIt
	oldValue = parent.GetStateMachine().Property(parent.GetStateProp())
	StateForm.StateValue.Value = oldValue
	parent.ReloadDone
end sub

sub SaveIt
	if StateForm.StateValue.Value <> oldValue then
		parent.GetStateMachine().SetAState parent.GetStateProp(), StateForm.StateValue.Value
	end if
end sub

</SCRIPT>
</BODY>
</HTML>
