<HTML>
<HEAD>
<TITLE>Choose a new painting</TITLE>

<SCRIPT LANGUAGE=VBScript>
sub window_OnLoad
	parent.page=1
	parent.buttons.UpdateButtons
	PaintComboBox.additem "http://vwg/Worlds/godzilla/gw1.gif"
	PaintComboBox.additem "http://vwg/Worlds/ContentTesting/Home/kids.gif"
	PaintComboBox.additem "http://vwg/Worlds/ContentTesting/rainbow/herhome2.gif"
	PaintComboBox.additem "http://vwg/Worlds/Avatars/kiss.gif"
	PaintComboBox.additem "http://vwg/Worlds/kathtest/sched430.gif"

	painting.src = parent.PaintingSelection

	PaintComboBox.value = parent.PaintingSelection

end sub

sub window_OnUnload
	parent.UpdatePainting
end sub

</SCRIPT>

</HEAD>
<BODY>
<CENTER>
