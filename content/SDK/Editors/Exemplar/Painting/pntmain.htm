<SCRIPT LANGUAGE=VBScript>
sub document_OnMouseOver
	if (window.event.srcElement.className = "bStyle") then 
		window.event.srcElement.className = "bHighlightStyle"
	end if
end sub

sub window_OnLoad
	painting.src = GetPath(paintingSelection)
	PaintComboBox.value = PaintingSelection
	frame1rep.src = GetPath(FrameSelection)
	frame2rep.src = frame1rep.src
	frame3rep.src = frame1rep.src
End sub 

sub document_OnMouseOut
	if (window.event.srcElement.className = "bHighlightStyle") then 
		window.event.srcElement.className = "bStyle"
	end if
end sub

</script>
<script language = "vbscript">
Dim page
Dim PageArray
Dim PageArraySize
Dim PaintingSelection
Dim FrameSelection
Dim world
Dim room
Dim PaintingObject
Dim BlankFile

page = 0
PageArray = Array("painting.htm", "frame.htm")
PageArraySize = 2

set room = Helper.Arg.container
set world = Helper.Client.World
set PaintingObject = Helper.Arg

PaintingSelection = PaintingObject.painting
FrameSelection = PaintingObject.Frame

function GetPath( filename )
	' Test for a relative path, and make necessary correction to point to local content instead of html
	if Len(filename) > 0 then
		select case Left (filename, 4) 
			case "http"
				GetPath = filename
			case "file"
				GetPath = filename
			case else
				' Review: using world-specific content path, will only work for plazas currently...
				GetPath = World.Global.WorldContentPath +  filename
		end select
	else
		GetPath = "blank.gif"
	end if
end function

sub UpdatePainting
	if PaintComboBox.value <> "Type a new URL here, or choose from the dropdown list" then
		painting.src = GetPath(PaintComboBox.value)
		PaintingSelection = PaintComboBox.value
	end if
end sub

sub UpdateFrame
	if PaintComboBox.value <> "Type a new URL here, or choose from the dropdown list" then
		frame1rep.src = GetPath(PaintComboBox.value)
		frame2rep.src = frame1rep.src
		frame3rep.src = frame1rep.src
		FrameSelection = PaintComboBox.value
	end if
end sub

sub update()
	if (canvas.checked=true) then
		UpdatePainting
	else
		UpdateFrame
	end if
End sub	

sub onApply()
	if (canvas.checked=true) then
		UpdatePainting
	else
		UpdateFrame
	end if
	PaintingObject.Painting = GetPath(PaintingSelection)
	PaintingObject.Frame = GetPath(FrameSelection)
	helper.closewindow
End sub	

sub loadfunc(choice)
 	if choice=1 then
		PaintComboBox.Clear
		painting.src = GetPath(paintingSelection)
		PaintComboBox.value = PaintingSelection
	else 
		PaintComboBox.Clear
		frame1rep.src = GetPath(FrameSelection)
		frame2rep.src = frame1rep.src
		frame3rep.src = frame1rep.src
		PaintComboBox.value = FrameSelection
	end if
 End sub

sub properties
	Helper.Arg.EditObject
	Helper.closewindow
end sub
  
sub OnHelp
	on error resume next
	' currently vworlds specific, should it be generalized?
	Dim client
	set client = Helper.client
	dim helptopic

	Dim helpstringsList
	set helpstringsList = client.world.global.CreatePropertyList
	helpstringsList.add "Authoring Guide"
	helpstringsList.add "Painting"

	client.world.FireUIEvent client.world.user, "Help", helpstringsList
end sub

sub OnCancel
	helper.closewindow
end sub

</SCRIPT></HEAD>
