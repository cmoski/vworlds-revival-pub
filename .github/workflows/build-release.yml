name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install MFC/ATL components
        run: |
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
            --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" `
            --add Microsoft.VisualStudio.Component.VC.ATLMFC `
            --quiet --norestart --wait 2>$null
        shell: pwsh
        continue-on-error: true

      - name: Configure CMake (Win32/x86)
        run: cmake -B build -G "Visual Studio 17 2022" -A Win32 -DVWORLDS_BUILD_GRAPHICS=ON

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage distribution
        run: |
          mkdir dist\bin
          mkdir dist\worlds
          mkdir dist\scripts

          :: Binaries
          copy build\Release\*.dll dist\bin\
          copy build\Release\*.exe dist\bin\
          copy third_party\d3drm_legacy\x86\bin\d3drm.dll dist\bin\

          :: Content (sprites, models, SDK, HTML client)
          :: Exclude AC/Dungeon content from release (kept in source tree only)
          xcopy /E /I /Q content dist\content /EXCLUDE:content\_exclude.txt

          :: Batch launchers in root
          copy scripts\dist\*.bat dist\

          :: World creation scripts
          copy scripts\create_allworlds.vbs dist\scripts\
          copy scripts\create_desktopworld.vbs dist\scripts\
        shell: cmd

      - name: Create release zip
        run: |
          Compress-Archive -Path dist\* -DestinationPath VWorlds-Revival-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VWorlds-Revival
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VWorlds-Revival-*.zip
          body: |
            ## VWorlds Revival ${{ github.ref_name }}

            Microsoft Virtual Worlds v1.5 (2000) modernized for Windows 11 + Visual Studio 2022.

            ### Quick Start
            1. Extract the zip anywhere
            2. Run `install.bat` as Administrator (registers COM DLLs + sets registry paths)
            3. Run `launch.bat` to start the Gallery world
            4. Run `launch.bat DesktopWorld` for the full lobby experience

            ### What's included
            - Pre-built x86 binaries (8 COM DLLs + 4 executables)
            - d3drm.dll legacy Direct3D Retained Mode runtime
            - Full content: sprites, 3D models, avatar graphics, SDK world kits
            - World creation scripts (Gallery, Home, Landscape, Office, DesktopWorld)
            - Launcher batch files (single-user, multi-user)
            - Source code available in the repository

            ### Requirements
            - Windows 10/11 (x64 — runs as 32-bit)
            - [Visual C++ 2022 Redistributable (x86)](https://aka.ms/vs/17/release/vc_redist.x86.exe)
            - Administrator privileges for install (COM registration + registry)

            ### Features
            - 5 renderable 3D worlds with real geometry from the original SDK
            - Multi-user: multiple clients connect to same server, see each other
            - Object Explorer with live property editing
            - Command Window (live VBScript console)
            - Actor bone animation (Asheron's Call creature with 79 animations)
            - Sound playback (DirectSound)
            - World persistence (Ctrl+S save/load)
            - Studio editing tools (translate, rotate, scale, boundaries)
