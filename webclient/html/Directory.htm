<html>
<head>

<body scroll=no style="margin:7px 18px;">
	<table class=vwText cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
		<tr>
			<td>
				<div style=padding-bottom:6px;>
					Select a Virtual World or related Web page to visit.

					<tr>
						<td align=left style=padding-left:3px;width:170px;>
							<div id=divCol1 style=color:white;cursor:hand; title="Sort by Virtual World" SortID=1 ColName="Virtual World">Virtual World</div>

							<div id=divCol2 style=color:white;cursor:hand; title="Sort by number of connected Avatars" SortID=2 ColName="Avatars">Avatars</div>

					</tr>
				</table>
				<iframe id=fraServerList src="DSListing.htm" style=width:100%;height:180px;></iframe>

					Querying Directory... Please Wait...
				</div>
			</td>
		</tr>
		<tr>
			<td align=right valign=bottom style="border-top:1 solid gray;padding-top:4px;">
				<button id=btnRefresh class=vwButton>Refresh</button>&nbsp;&nbsp;
				<button id=btnClose onclick=window.close class=vwButton>Close</button>

		</tr>
