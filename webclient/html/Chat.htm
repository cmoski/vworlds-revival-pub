<html>
<head>
<link rel=stylesheet href=global.css>
<script language=vbs src=scripts/NoSelection.vbs></script>
<script language=vbs src=scripts/ContextMenu.vbs></script>
<script language=vbs src=scripts/Chat.vbs></script>
</head>
<body scroll=no style="margin:2 2 0 2;">
	<table cellspacing=0 cellpadding=0 width=100% height=100%>
		<tr>
			<td colspan=2>
				<iframe src=ChatHist.htm style=width:100%;height:100%;></iframe>
			</td>
		<tr height=22px>
			<td valign=top style=padding-right:2px;padding-top:0px;>
				<input id=txtChat class=vwInput style=width:100%; maxlength=256 disabled=true value="Type here and press Enter to speak">
			</td>
			<td width=50px>
				<nobr>
					<img alt=Speak
							 id=btnSay
							 src=images/say.gif
							 class=vwChatButton
							 mOver=images/sayo.gif
							 mOut=images/say.gif
							 enabled=false>
					<img alt=Emote
							 id=btnEmote
							 src=images/emote.gif
							 class=vwChatButton
							 mOver=images/emoteo.gif
							 mOut=images/emote.gif
							 enabled=false>
				</nobr>
			</td>
		</tr>
	</table>
</body>
</html>
