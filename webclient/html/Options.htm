<html>
<head>
<title>Options</title>
<link rel=stylesheet href=global.css>
<script language=vbs src=scripts/NoSelection.vbs></script>
<script language=vbs src=scripts/Options.vbs></script>
</head>
<body scroll=no style="margin:7px 18px;">
	<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td class=vwHead1 width=10px>
							Audio
						</td>
						<td style=padding-left:3px;>
							<hr color=#A7A795 size=1 width=100%>
						</td>
						<td width=30px>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td width=5px>
							<input type=checkbox id=chkSndFX>
						</td>
						<td>
							<label class=vwText for=chkSndFX>
								&nbsp;Play sound effects&nbsp;
							</label>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td class=vwHead1 width=10px>
							Text&nbsp;History&nbsp;Display
						</td>
						<td style=padding-left:3px;>
							<hr color=#A7A795 size=1 width=100%>
						</td>
						<td width=30px>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td width=5px>
							<input type=checkbox id=chkShowGest>
						</td>
						<td>
							<label class=vwText for=chkShowGest>
								&nbsp;Show gestures&nbsp;
							</label>
						</td>
					</tr>
					<tr>
						<td>
							<input type=checkbox id=chkShowEvent>
						</td>
						<td>
							<label class=vwText for=chkShowEvent>
								&nbsp;Show events&nbsp;
							</label>
						</td>
					</tr>
					<tr>
						<td>
							<input type=checkbox id=chkShowMsg>
						</td>
						<td>
							<label class=vwText for=chkShowMsg>
								&nbsp;Show system messages&nbsp;
							</label>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td class=vwHead1 width=10px>
							Performance
						</td>
						<td style=padding-left:3px;>
							<hr color=#A7A795 size=1 width=100%>
						</td>
						<td width=30px>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td width=5px>
							<input type=checkbox id=chkAutoDl>
						</td>
						<td>
							<label class=vwText for=chkAutoDl>
								&nbsp;Auto download new avatar graphics&nbsp;
							</label>
						</td>
					</tr>
					<tr>
						<td>
							<input type=checkbox id=chkTurnOffHW>
						</td>
						<td>
							<label class=vwText for=chkTurnOffHW>
								&nbsp;Turn off hardware acceleration&nbsp;
							</label>
						</td>
					</tr>
					<tr>
						<td>
							<input type=checkbox id=chkForceBB>
						</td>
						<td>
							<label id=lblForceBB class=vwText for=chkForceBB>
								&nbsp;Force back buffering&nbsp;
							</label>
						</td>
					</tr>
					<tr>
						<td>
							<input type=checkbox id=chkDrawFast>
						</td>
						<td>
							<label id=lblDrawFast class=vwText for=chkDrawFast>
								&nbsp;Switch to lower resolution when moving&nbsp;
							</label>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td id=lblOptimize class=vwText>
				&nbsp;Optimize for:
			</td>
		</tr>
		<tr>
			<td style=padding-left:3px;padding-bottom:2px;>
				<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
					<tr>
						<td>
							<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
								<tr>
									<td width=5px>
										<input type=radio name=Optimize id=optGraphics>
									</td>
									<td>
										<label id=lblGraphics class=vwText for=optGraphics>
											&nbsp;Best graphics quality&nbsp;
										</label>
									</td>
								</tr>
							</table>
						</td>
						<td>
							<table cellspacing=0 cellpadding=0 style=height:100%;width:100%;>
								<tr>
									<td width=5px>
										<input type=radio name=Optimize id=optPerformance>
									</td>
									<td>
										<label id=lblPerformance class=vwText for=optPerformance>
											&nbsp;Best performance&nbsp;
										</label>
									</td>
								</tr>
							</table>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td align=right valign=bottom style="border-top:1 solid gray;padding-top:4px;">
				<button id=btnOK class=vwButton>OK</button>&nbsp;&nbsp;
				<button id=btnCancel onclick=window.close class=vwButton>Cancel</button>
			</td>
		</tr>
	</table>
</body>
</html>
